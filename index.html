    function clickableQuestionText(text, vocabulary = null) {
      const parts = String(text || "").split(/([A-Za-z][A-Za-z'’-]*)/g);
      return parts.map(part => {
        if (/^[A-Za-z][A-Za-z'’-]*$/.test(part)) {
          const word = normalizeWord(part);
          const found = vocabulary && vocabulary[normalizeLookup(word)];
          return '<button type="button" class="word-token" data-word="' + escapeHtml(word) + '"' + (found ? ' data-vocab-key="' + escapeHtml(normalizeLookup(word)) + '"' : '') + (found?.isInWordbook ? ' data-added-word="true"' : '') + '>' + escapeHtml(part) + '</button>';
        }
        return escapeHtml(part);
      }).join("");
    }

    function renderArticleTokenText(text, baseOffset = 0, vocabulary = null) {
      const parts = String(text || "").split(/([A-Za-z][A-Za-z'’-]*)/g);
      let cursor = 0;
      return parts.map(part => {
        const start = baseOffset + cursor;
        cursor += part.length;
        if (/^[A-Za-z][A-Za-z'’-]*$/.test(part)) {
          const word = normalizeWord(part);
          const key = normalizeLookup(word);
          const found = vocabulary && vocabulary[key];
          return '<button type="button" class="word-token" data-word="' + escapeHtml(word) + '" data-selected-text="' + escapeHtml(part) + '" data-start="' + start + '" data-end="' + (start + part.length) + '"' + (found ? ' data-vocab-key="' + escapeHtml(key) + '"' : '') + '>' + escapeHtml(part) + '</button>';
        }
        return escapeHtml(part);
      }).join("");
    }

    function renderArticleSegmentWithHighlights(segment, baseOffset, vocabulary, entries) {
      const localEntries = (entries || [])
        .filter(entry => !entry.unresolved && Number(entry.start) >= baseOffset && Number(entry.start) < baseOffset + segment.length)
        .sort((a, b) => a.start - b.start || b.end - a.end);
      let cursor = 0;
      let html = "";
      localEntries.forEach(entry => {
        const localStart = Math.max(0, entry.start - baseOffset);
        const localEnd = Math.min(segment.length, entry.end - baseOffset);
        if (localStart < cursor || localEnd <= localStart) return;
        html += renderArticleTokenText(segment.slice(cursor, localStart), baseOffset + cursor, vocabulary);
        const selectedText = segment.slice(localStart, localEnd);
        html += '<button type="button" class="word-token article-saved-highlight status-' + escapeHtml(entry.status) + '" data-word="' + escapeHtml(entry.item.word || entry.text || selectedText) + '" data-selected-text="' + escapeHtml(selectedText) + '" data-start="' + entry.start + '" data-end="' + entry.end + '" data-word-id="' + escapeHtml(entry.item.id) + '" data-source-key="' + escapeHtml(entry.key) + '" title="Kelime defterinde kayıtlı">' + escapeHtml(selectedText) + '</button>';
        cursor = localEnd;
      });
      html += renderArticleTokenText(segment.slice(cursor), baseOffset + cursor, vocabulary);
      return html;
    }

    function normalizeArticleTextForReading(text) {
      const rawLines = String(text || "")
        .replace(/\r\n?/g, "\n")
        .replace(/\u00a0/g, " ")
        .replace(/[“”]/g, '"')
        .replace(/[‘’]/g, "'")
        .replace(/[–—]/g, "-")
        .split(/\n/);
      const paragraphs = [];
      let current = "";
      rawLines.forEach(rawLine => {
        const line = rawLine
          .replace(/[ \t]+/g, " ")
          .replace(/\s+([,.!?;:])/g, "$1")
          .replace(/([([{])\s+/g, "$1")
          .replace(/\s+([)\]}])/g, "$1")
          .trim();
        if (!line) {
          if (current) {
            paragraphs.push(current.trim());
            current = "";
          }
          return;
        }
        const startsNewQuote = /^["'“‘]/.test(line);
        const shouldContinue = current && !/[.!?]"?$/.test(current) && !startsNewQuote;
        if (shouldContinue) current += " " + line;
        else {
          if (current) paragraphs.push(current.trim());
          current = line;
        }
      });
      if (current) paragraphs.push(current.trim());
      return paragraphs
        .map(paragraph => paragraph.replace(/\s{2,}/g, " ").trim())
        .filter(Boolean)
        .join("\n\n");
    }

    function articleDisplayTitle(article) {
      const rawTitle = String(article?.title || "").replace(/\.pdf$/i, "").replace(/_/g, " ").trim();
      if ((!rawTitle || /^Yeni Makale$/i.test(rawTitle)) && /pigeons?/i.test(article?.text || "")) return "Pigeons";
      return rawTitle || "Metin";
    }

    function articleKind(article) {
      return article?.kind === "yds" || article?.contentType === "yds-passage" ? "yds" : "external";
    }

    function normalizeArticleRecord(article) {
      const now = new Date().toISOString();
      const kind = articleKind(article);
      const normalized = {
        ...article,
        id: article?.id || "article-" + Date.now() + "-" + Math.random().toString(16).slice(2),
        kind,
        sourceType: kind === "yds" ? (article?.examType || article?.sourceType || "YDS") : (article?.sourceType || "Serbest Okuma"),
        title: article?.title || (kind === "yds" ? "YDS Okuma Parçası" : "Metin"),
        topic: article?.topic || "",
        level: article?.level || "",
        text: article?.text || "",
        savedWords: Array.isArray(article?.savedWords) ? article.savedWords : [],
        readingProgress: Number(article?.readingProgress || 0),
        status: article?.status || "new",
        createdAt: article?.createdAt || now,
        updatedAt: article?.updatedAt || article?.createdAt || now,
        translationStatus: ["none", "draft", "complete"].includes(article?.translationStatus) ? article.translationStatus : "none",
        titleTr: typeof article?.titleTr === "string" && article.titleTr.trim() ? article.titleTr.trim() : null,
        bilingualParagraphs: Array.isArray(article?.bilingualParagraphs) ? article.bilingualParagraphs
          .filter(item => item && typeof item.en === "string")
          .map((item, index) => ({ id: String(item.id || "paragraph-" + (index + 1)), en: item.en, tr: typeof item.tr === "string" ? item.tr : "" })) : [],
      };
      if (kind === "yds") {
        normalized.examType = article?.examType || article?.sourceType || "YDS";
        normalized.year = article?.year || "";
        normalized.session = article?.session || "";
        normalized.passageNumber = article?.passageNumber || "";
        normalized.questions = Array.isArray(article?.questions) ? article.questions : [];
        normalized.answerKey = article?.answerKey || {};
        normalized.userAnswers = article?.userAnswers || {};
        normalized.lastStudiedAt = article?.lastStudiedAt || article?.lastReadAt || "";
      } else {
        normalized.sourceName = article?.sourceName || article?.source || "";
        normalized.sourceUrl = article?.sourceUrl || "";
        normalized.publicationDate = article?.publicationDate || "";
        normalized.notes = article?.notes || "";
        normalized.lastReadAt = article?.lastReadAt || article?.lastStudiedAt || "";
      }
      normalized.wordCount = Number(article?.wordCount || articleWordCount(normalized.text));
      normalized.readingTime = Number(article?.readingTime || articleReadMinutes(normalized.text));
      return normalized;
    }

    function articleTranslationStatus(article) {
      return ["none", "draft", "complete"].includes(article?.translationStatus) ? article.translationStatus : "none";
    }

    function articleEnglishParagraphs(article) {
      return String(article?.text || "").replace(/\r\n?/g, "\n").split(/\n\s*\n/).filter(paragraph => paragraph.trim().length > 0);
    }

    function articleBilingualParagraphs(article) {
      const english = articleEnglishParagraphs(article);
      const current = Array.isArray(article?.bilingualParagraphs) ? article.bilingualParagraphs : [];
      const currentEnglish = normalizeArticleTextForReading(current.map(item => item?.en || "").join("\n\n"));
      const articleEnglish = normalizeArticleTextForReading(article?.text || "");
      if (current.length && currentEnglish === articleEnglish) return current.map((item, index) => ({ id: String(item.id || "paragraph-" + (index + 1)), en: item.en, tr: typeof item.tr === "string" ? item.tr : "" }));
      return english.map((en, index) => ({ id: String(current[index]?.id || "paragraph-" + (index + 1)), en, tr: typeof current[index]?.tr === "string" ? current[index].tr : "" }));
    }

    function articleHasTranslation(article) { return articleTranslationStatus(article) !== "none" && articleBilingualParagraphs(article).length > 0; }

    function articleLanguageBadge(article) {
      const status = articleTranslationStatus(article);
      if (status === "complete") return "EN/TR";
      if (status === "draft") return "TR Taslak";
      return "EN";
    }

    function articleSourceLabel(article) {
      if (articleKind(article) === "yds") {
        return [article.examType || "YDS", article.year, article.session].filter(Boolean).join(" · ") || "Çıkmış YDS";
      }
      const sourceName = String(article.sourceName || "").trim();
      return /^dış kaynak$/i.test(sourceName) || /^serbest okuma$/i.test(sourceName) ? "Kendi Metinlerim" : (sourceName || "Kendi Metinlerim");
    }

    function articleTypeLabel(article) {
      return articleKind(article) === "yds" ? "Çıkmış YDS" : "Kendi Metinlerim";
    }

    function articleWordCount(text) {
      const matches = String(text || "").match(/[A-Za-zÇĞİÖŞÜçğıöşü][A-Za-zÇĞİÖŞÜçğıöşü'’-]*/g);
      return matches ? matches.length : 0;
    }

    function articleReadMinutes(text) {
      const count = articleWordCount(text);
      return count ? Math.max(1, Math.round(count / 180)) : 0;
    }

    function articleReadingStatus(article) {
      if (article?.status === "completed" || Number(article?.readingProgress || 0) >= 98) return { key: "completed", label: "Tamamlandı" };
      if (article?.status === "reading" || Number(article?.readingProgress || 0) > 0) return { key: "reading", label: "Okunuyor" };
      return { key: "new", label: "Yeni" };
    }

    function articleContentType(article) {
      return articleKind(article) === "yds" ? "past_exam_reading" : "added_text";
    }

    function wordHighlightStatus(item) {
      const status = wordStatus(item).key;
      if (status === "review") return "hard";
      if (status === "learned") return "learned";
      if (status === "learning") return "learning";
      return "new";
    }

    function wordSources(item) {
      return Array.isArray(item?.sources) ? item.sources.filter(Boolean) : [];
    }

    function sourceMatchesArticle(source, article) {
      if (!source || !article) return false;
      const contentId = String(source.contentId || source.articleId || source.questionId || "");
      if (contentId && contentId === String(article.id)) return true;
      const titleKey = normalizeLookup(articleDisplayTitle(article));
      return normalizeLookup(source.contentTitle || source.sourceArticle || source.source || "") === titleKey;
    }

    function sourceKeyFor(source, index = 0) {
      if (source?.id) return String(source.id);
      return [
        source?.id || "",
        source?.contentId || source?.articleId || "",
        source?.startOffset ?? "",
        source?.endOffset ?? "",
        normalizeLookup(source?.selectedText || ""),
        index,
      ].join("|");
    }

    function makeArticleSourceLocator(article, selectedText, startOffset, endOffset, fullText) {
      const start = Math.max(0, Number(startOffset) || 0);
      const end = Math.max(start, Number(endOffset) || start);
      const text = String(fullText || "");
      return {
        id: "src-" + Date.now() + "-" + Math.random().toString(16).slice(2),
        contentId: article.id,
        contentType: articleContentType(article),
        contentTitle: articleDisplayTitle(article),
        selectedText: String(selectedText || "").trim(),
        startOffset: start,
        endOffset: end,
        contextBefore: text.slice(Math.max(0, start - 42), start),
        contextAfter: text.slice(end, Math.min(text.length, end + 42)),
        savedAt: new Date().toISOString(),
      };
    }

    function findTextOccurrences(text, needle) {
      const haystack = String(text || "");
      const query = String(needle || "").trim();
      if (!query) return [];
      let escaped = query.replace(/[.*+?^()|[\]\\]/g, "\\$&");
      escaped = escaped.replace(/\$/g, "\\$").replace(/\{/g, "\\{").replace(/\}/g, "\\}");
      const isWordish = /^[A-Za-z][A-Za-z'’ -]*$/.test(query);
      const pattern = isWordish ? "\\b" + escaped + "\\b" : escaped;
      const flags = "gi";
      const regex = new RegExp(pattern, flags);
      const matches = [];
      let match;
      while ((match = regex.exec(haystack))) {
        matches.push({ start: match.index, end: match.index + match[0].length, text: match[0] });
        if (match.index === regex.lastIndex) regex.lastIndex++;
      }
      return matches;
    }

    function resolveArticleSourceRange(source, normalizedText) {
      const text = String(normalizedText || "");
      const selected = String(source?.selectedText || "").trim();
      const start = Number(source?.startOffset);
      const end = Number(source?.endOffset);
      if (Number.isFinite(start) && Number.isFinite(end) && end > start && text.slice(start, end).trim()) {
        return { start, end, text: text.slice(start, end), confidence: "offset" };
      }
      const before = String(source?.contextBefore || "");
      const after = String(source?.contextAfter || "");
      if (selected && (before || after)) {
        const contextNeedle = before + selected + after;
        const contextIndex = text.indexOf(contextNeedle);
        if (contextIndex >= 0) {
          const nextStart = contextIndex + before.length;
          return { start: nextStart, end: nextStart + selected.length, text: text.slice(nextStart, nextStart + selected.length), confidence: "context" };
        }
      }
      const matches = findTextOccurrences(text, selected);
      if (matches.length === 1) return { ...matches[0], confidence: "unique" };
      return null;
    }

    function savedArticleEntries(article) {
      const normalizedText = normalizeArticleTextForReading(article?.text || "");
      const entries = [];
      const articleId = String(article?.id || "");
      const titleKey = normalizeLookup(articleDisplayTitle(article));
      wordbook.forEach(item => {
        const sources = wordSources(item).filter(source => sourceMatchesArticle(source, article));
        const legacyMatches = !sources.length && (
          item.articleId === articleId ||
          item.questionId === articleId ||
          normalizeLookup(item.source || "") === titleKey ||
          normalizeLookup(item.sourceArticle || "") === titleKey
        );
        const usableSources = sources.length ? sources : (legacyMatches ? [{
          id: "legacy-" + item.id,
          contentId: articleId,
          contentType: articleContentType(article),
          contentTitle: articleDisplayTitle(article),
          selectedText: item.word || "",
          sourceArticle: item.sourceArticle || item.source || "",
        }] : []);
        usableSources.forEach((source, index) => {
          const resolved = resolveArticleSourceRange(source, normalizedText);
          if (!resolved) {
            entries.push({ item, source, key: sourceKeyFor(source, index), status: wordHighlightStatus(item), unresolved: true });
            return;
          }
          entries.push({
            item,
            source,
            key: sourceKeyFor(source, index),
            status: wordHighlightStatus(item),
            start: resolved.start,
            end: resolved.end,
            text: resolved.text,
            confidence: resolved.confidence,
          });
        });
      });
      return entries.sort((a, b) => Number(a.start ?? 999999) - Number(b.start ?? 999999) || Number(b.end ?? 0) - Number(a.end ?? 0));
    }

    function articleHasSource(item, article, locator = null) {
      return wordSources(item).some(source => {
        if (!sourceMatchesArticle(source, article)) return false;
        if (!locator) return true;
        return Number(source.startOffset) === Number(locator.startOffset) &&
          Number(source.endOffset) === Number(locator.endOffset) &&
          normalizeLookup(source.selectedText || "") === normalizeLookup(locator.selectedText || "");
      });
    }

    function addSourceToWord(item, source) {
      item.sources = wordSources(item);
      const duplicate = item.sources.some(existing =>
        existing.contentId === source.contentId &&
        Number(existing.startOffset) === Number(source.startOffset) &&
        Number(existing.endOffset) === Number(source.endOffset) &&
        normalizeLookup(existing.selectedText || "") === normalizeLookup(source.selectedText || "")
      );
      if (!duplicate) item.sources.push(source);
    }

    function removeSourceFromWord(item, sourceKey) {
      const before = wordSources(item);
      item.sources = before.filter((source, index) => sourceKeyFor(source, index) !== sourceKey);
      return item.sources.length !== before.length;
    }

    function articleAddedWordCount(article) {
      return savedArticleEntries(article).filter(entry => !entry.unresolved).length;
    }

    function articleMetadataHtml(article) {
      const parts = [];
      const minutes = articleReadMinutes(article?.text || "");
      const added = articleAddedWordCount(article);
      if (minutes) parts.push(minutes + " dk okuma");
      if (added) parts.push("Deftere eklenen: " + added + " kelime");
      return parts.length ? '<div class="article-reader-metadata" style="color: var(--text-secondary)">' + parts.map(item => '<span class="rounded-full border" style="border-color: var(--border-color); background: var(--bg-surface-secondary); color: var(--text-secondary)">' + escapeHtml(item) + '</span>').join("") + '</div>' : "";
    }

    function sortedFilteredArticles() {
      const query = normalizeLookup(articleSearchQuery);
      return [...articles].filter(article => {
        if (articleStatusFilter !== "all" && articleReadingStatus(article).key !== articleStatusFilter) return false;
        if (articleTypeFilter !== "all" && articleKind(article) !== articleTypeFilter) return false;
        if (articleLanguageFilter === "translated" && articleTranslationStatus(article) !== "complete") return false;
        if (articleLanguageFilter === "missing" && articleTranslationStatus(article) !== "none") return false;
        if (articleLanguageFilter === "draft" && articleTranslationStatus(article) !== "draft") return false;
        if (!query) return true;
        return [articleDisplayTitle(article), articleSourceLabel(article), article.topic, article.level, article.text]
          .some(value => normalizeLookup(value || "").includes(query));
      }).sort((a, b) => {
        const aDone = articleReadingStatus(a).key === "completed" ? 1 : 0;
        const bDone = articleReadingStatus(b).key === "completed" ? 1 : 0;
        if (aDone !== bDone) return aDone - bDone;
        if (articleSortMode === "az") return articleDisplayTitle(a).localeCompare(articleDisplayTitle(b), "tr");
        if (articleSortMode === "short") return articleWordCount(a.text) - articleWordCount(b.text);
        if (articleSortMode === "long") return articleWordCount(b.text) - articleWordCount(a.text);
        if (articleSortMode === "studied") return new Date(b.lastStudiedAt || b.lastReadAt || b.updatedAt || 0) - new Date(a.lastStudiedAt || a.lastReadAt || a.updatedAt || 0);
        return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
      });
    }

    function inferWordType(word) {
      const clean = normalizeLookup(word);
      if (/ly$/.test(clean)) return "Zarf";
      if (/(tion|ment|ness|ity|ship|ance|ence)$/.test(clean)) return "İsim";
      if (/(ive|ous|al|ic|able|ible|less|ful)$/.test(clean)) return "Sıfat";
      if (/(ate|ify|ise|ize|en)$/.test(clean)) return "Fiil";
      return "Kelime";
    }

    function articleParagraphRanges(text) {
      const normalized = normalizeArticleTextForReading(text);
      const paragraphs = normalized.split(/\n{2,}/)
        .map(paragraph => paragraph.trim())
        .filter(Boolean);
      const ranges = [];
      let searchFrom = 0;
      (paragraphs.length ? paragraphs : [normalized]).forEach(paragraph => {
        const start = normalized.indexOf(paragraph, searchFrom);
        const safeStart = start >= 0 ? start : searchFrom;
        ranges.push({ text: paragraph, start: safeStart, end: safeStart + paragraph.length });
        searchFrom = safeStart + paragraph.length;
      });
      return { normalized, ranges };
    }

    function renderArticleParagraphs(article, vocabulary = null, entries = null) {
      const { ranges } = articleParagraphRanges(article?.text || "");
      const savedEntries = entries || savedArticleEntries(article);
      return ranges.map(paragraph =>
        '<p>' + renderArticleSegmentWithHighlights(paragraph.text, paragraph.start, vocabulary, savedEntries) + '</p>'
      ).join("");
    }

    function renderTranslatedArticleBody(article, view, vocabulary, entries) {
      const pairs = articleBilingualParagraphs(article);
      if (view === "en") return renderArticleParagraphs(article, vocabulary, entries);
      if (view === "tr") return pairs.map(pair => '<p class="article-bilingual-tr">' + escapeHtml(pair.tr || "Çeviri taslakta bekliyor.") + '</p>').join("");
      const normalized = normalizeArticleTextForReading(article.text || "");
      let searchFrom = 0;
      return '<div class="article-bilingual-grid">' + pairs.map(pair => {
        const english = normalizeArticleTextForReading(pair.en || "");
        const offset = Math.max(0, normalized.indexOf(english, searchFrom));
        searchFrom = offset + english.length;
        return '<section class="article-bilingual-pair" data-paragraph-id="' + escapeHtml(pair.id) + '"><div class="article-bilingual-copy"><span class="article-bilingual-label">EN</span><p>' + renderArticleSegmentWithHighlights(english, offset, vocabulary, entries) + '</p></div><div class="article-bilingual-copy article-bilingual-tr"><span class="article-bilingual-label">TR</span><p>' + escapeHtml(pair.tr || "Çeviri taslakta bekliyor.") + '</p></div></section>';
      }).join("") + '</div>';
    }

    function questionPaletteHtml(questions) {
      return '<aside class="question-palette hidden self-start rounded-2xl border border-slate-200 bg-white p-3 shadow-sm xl:block" aria-label="Soru haritası">' +
        '<div class="mb-3 flex items-center justify-between gap-2"><div><p class="text-xs font-black uppercase tracking-wide text-blue-500">Soru Haritası</p><p class="mt-0.5 text-xs font-semibold text-slate-500">' + questions.length + ' soru</p></div><span class="rounded-lg bg-blue-50 px-2 py-1 text-xs font-black text-blue-700">' + (currentIndex + 1) + ' / ' + questions.length + '</span></div>' +
        '<div class="grid grid-cols-5 gap-1.5">' + questions.map((item, index) => {
          const isActive = index === currentIndex;
          const selectedKey = selectedAnswerForQuestion(item);
          const isAnswered = isAnswerKey(selectedKey);
          const isCorrect = Boolean(isAnswered && item.correctAnswer && selectedKey === item.correctAnswer);
          const isWrong = Boolean(isAnswered && item.correctAnswer && selectedKey !== item.correctAnswer);
          const color = isCorrect
            ? 'border-emerald-300 bg-emerald-50 text-emerald-700 hover:border-emerald-400'
            : isWrong
              ? 'border-red-300 bg-red-50 text-red-700 hover:border-red-400'
              : isActive
                ? 'border-blue-600 bg-blue-600 text-white shadow-sm'
                : isAnswered
                  ? 'border-cyan-300 bg-cyan-50 text-cyan-800 hover:border-cyan-400'
                  : 'border-slate-200 bg-slate-50 text-slate-600 hover:border-blue-300 hover:bg-blue-50';
          const state = isCorrect ? 'doğru cevaplandı' : isWrong ? 'yanlış cevaplandı' : isActive ? 'aktif soru' : isAnswered ? 'cevaplandı' : 'henüz çözülmedi';
          return '<button class="question-palette-item flex h-9 items-center justify-center rounded-lg border text-xs font-black transition focus-visible:outline focus-visible:outline-2 focus-visible:outline-blue-500 ' + color + '" data-index="' + index + '" aria-label="Soru ' + (index + 1) + ', ' + state + '"' + (isActive ? ' aria-current="step"' : '') + '>' + (index + 1) + '</button>';
        }).join("") + '</div>' +
        '<div class="mt-3 grid gap-1 text-[11px] font-semibold text-slate-500"><span><i class="mr-1 inline-block h-2 w-2 rounded-full bg-blue-600"></i>Aktif</span><span><i class="mr-1 inline-block h-2 w-2 rounded-full bg-emerald-500"></i>Doğru</span><span><i class="mr-1 inline-block h-2 w-2 rounded-full bg-red-500"></i>Yanlış</span><span><i class="mr-1 inline-block h-2 w-2 rounded-full bg-slate-300"></i>Boş</span></div>' +
      '</aside>';
    }

    function renderQuestion() {
      pageTitle.textContent = solveMode === "wrong" ? "Yanlış Sorular" : "Etkileşimli Soru Çözme";
      answered = false;
      const questions = getCategoryQuestions();
      const question = questions[currentIndex];
      const documentInfo = question ? (documents.find(item => item.id === question.documentId) || activeDocument()) : activeDocument();
      renderMenu();
      renderStats();
      document.body.classList.toggle("question-focus-mode", questionFocusMode && activeView === "solve");

      if (!question) {
        renderFinishScreen();
        return;
      }
      rememberCurrentQuestion(question);
      const selectedAnswer = selectedAnswerForQuestion(question);
      const fontSize = Math.max(17, Math.min(23, questionFontSize || 19));
      const questionDocDisplay = documentInfo ? friendlyDocumentDisplay(documentInfo, questions.length) : { title: "Soru" };

      appArea.innerHTML =
        '<div class="grid gap-4 xl:grid-cols-[220px_minmax(0,1fr)]">' +
        questionPaletteHtml(questions) +
        '<article class="question-reader-surface article-reader-surface ' + (questionFocusMode ? 'is-focus-mode ' : '') + 'rounded-2xl border p-4 lg:p-5">' +
          '<div class="mb-6 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">' +
            '<div>' +
              '<p class="text-sm font-semibold uppercase tracking-wider text-blue-500">' + escapeHtml(solveMode === "wrong" ? "Yanlış Sorular" : questionDocDisplay.title) + '</p>' +
              '<h3 class="mt-1 text-lg font-semibold" style="color: var(--text-primary)">Soru ' + (currentIndex + 1) + ' / ' + questions.length + '</h3>' +
            '</div>' +
            '<div class="flex flex-wrap items-center justify-end gap-2">' +
              '<button id="questionFontDownBtn" class="article-toolbar-btn flex h-10 w-10 items-center justify-center rounded-xl text-sm font-black" title="Yazı boyutunu azalt" aria-label="Yazı boyutunu azalt">A-</button>' +
              '<button id="questionFontUpBtn" class="article-toolbar-btn flex h-10 w-10 items-center justify-center rounded-xl text-sm font-black" title="Yazı boyutunu artır" aria-label="Yazı boyutunu artır">A+</button>' +
              '<button id="questionFocusBtn" class="article-toolbar-btn flex h-10 w-10 items-center justify-center rounded-xl text-lg font-black ' + (questionFocusMode ? 'ring-2 ring-blue-300' : '') + '" title="Odak moduna geç" aria-label="Odak moduna geç">' + (questionFocusMode ? '↔' : '◎') + '</button>' +
              '<button id="questionQuickNoteBtn" class="article-toolbar-btn flex h-10 items-center justify-center rounded-xl px-3 text-xs font-black" title="Bu soru için not ekle" aria-label="Not Ekle">Not Ekle</button>' +
              '<button id="questionBackBtn" class="article-toolbar-btn flex h-10 w-10 items-center justify-center rounded-xl text-lg font-black" title="Kaynaklara dön" aria-label="Kaynaklara dön">←</button>' +
            '</div>' +
          '</div>' +
          (question.passage
            ? '<section class="mx-auto mb-5 max-w-[900px] rounded-2xl border px-5 py-5 sm:px-7 lg:px-8" style="border-color: var(--border-color); background: var(--bg-surface-secondary); color: var(--text-primary); font-size: ' + fontSize + 'px; line-height: 1.76;">' +
                '<div class="mb-3 text-xs font-bold uppercase tracking-wider text-blue-500">Okuma Parçası</div>' +
                '<p class="whitespace-pre-line text-left">' + clickableQuestionText(question.passage) + '</p>' +
              '</section>'
            : '') +
          '<div class="mx-auto max-w-[900px]">' +
          '<p id="questionText" class="mb-5 whitespace-pre-line text-left font-medium" style="color: var(--text-primary); font-size: ' + fontSize + 'px; line-height: 1.72;">' + clickableQuestionText(question.question) + '</p>' +
          '<div id="optionsArea" class="space-y-3">' +
            Object.entries(question.options || {}).map(([key, value]) => {
              const isSelected = selectedAnswer === key;
              const isCorrect = Boolean(selectedAnswer && question.correctAnswer && key === question.correctAnswer);
              const isWrong = Boolean(selectedAnswer && question.correctAnswer && isSelected && key !== question.correctAnswer);
              const borderColor = isCorrect ? '#059669' : isWrong ? '#dc2626' : isSelected ? '#2563eb' : 'var(--border-color)';
              const background = isCorrect ? '#ecfdf5' : isWrong ? '#fef2f2' : isSelected ? '#eff6ff' : 'var(--bg-surface-secondary)';
              const letterColor = isCorrect ? 'bg-emerald-600 text-white' : isWrong ? 'bg-red-600 text-white' : isSelected ? 'bg-blue-600 text-white' : 'bg-slate-100 text-blue-600 group-hover:bg-blue-600 group-hover:text-white';
              return '<div class="option-btn group flex w-full cursor-pointer items-start gap-3 rounded-2xl border p-3.5 text-left transition hover:border-blue-300 hover:bg-blue-50' + ((isCorrect || isWrong || isSelected) ? ' ring-1' : '') + '" style="border-color: ' + borderColor + '; background: ' + background + '; color: var(--text-primary)" role="button" aria-pressed="' + (isSelected ? 'true' : 'false') + '" data-key="' + escapeHtml(key) + '">' +
                '<span class="option-letter flex h-9 w-9 shrink-0 items-center justify-center rounded-xl ' + letterColor + ' font-bold">' + escapeHtml(key) + '</span>' +
                '<span class="block flex-1 pt-1 leading-relaxed" style="font-size: ' + Math.max(16, fontSize - 1) + 'px;">' + clickableQuestionText(value) + '</span>' +
              '</div>';
            }).join("") +
          '</div>' +
          '<div id="feedbackArea" class="mt-6"></div>' +
          '<div id="questionNavArea" class="mt-5 flex justify-end">' + nextButtonHtml() + '</div>' +
          '</div>' +
        '</article></div>';

      document.querySelectorAll(".question-palette-item").forEach(button => {
        button.addEventListener("click", () => {
          currentIndex = Number(button.dataset.index || 0);
          answered = false;
          renderQuestion();
        });
      });

      document.querySelectorAll(".option-btn").forEach(button => {
        button.addEventListener("click", event => {
          if (event.target.closest(".word-token")) return;
          checkAnswer(button, question);
        });
      });
      document.querySelectorAll(".word-token").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          openWordModal(button.dataset.word, question);
        });
      });
      document.getElementById("questionFontDownBtn").addEventListener("click", () => {
        questionFontSize = Math.max(17, fontSize - 1);
        localStorage.setItem("yds-question-font-size-v1", String(questionFontSize));
        renderQuestion();
      });
      document.getElementById("questionFontUpBtn").addEventListener("click", () => {
        questionFontSize = Math.min(23, fontSize + 1);
        localStorage.setItem("yds-question-font-size-v1", String(questionFontSize));
        renderQuestion();
      });
      document.getElementById("questionFocusBtn").addEventListener("click", () => {
        setQuestionFocusMode(!questionFocusMode);
        renderQuestion();
      });
      document.getElementById("questionQuickNoteBtn").addEventListener("click", () => {
        openQuickNoteDrawer({
          context: {
            sourceType: "question",
            sourceId: documentInfo?.id || null,
            sourceTitle: questionDocDisplay.title || null,
            questionId: question.id || null,
            questionNumber: Number(question.questionNumber) || currentIndex + 1,
          },
          onSaved: () => showToast("Not kaydedildi."),
        });
      });
      document.getElementById("questionBackBtn").addEventListener("click", () => {
        setQuestionFocusMode(false);
        if (solveMode === "wrong") {
          setView("wrong");
          return;
        }
        setView(activeDocument()?.builtIn || activeDocument()?.collection === "yds" ? "yds" : "exams");
      });
      bindNextQuestionButton();
    }

    function paintButton(button, type) {
      button.removeAttribute("style");
      if (type === "correct") {
        button.className = "option-btn flex w-full items-start gap-3 rounded-2xl border border-emerald-600 bg-emerald-50 p-3.5 text-left text-emerald-950";
        button.querySelector(".option-letter").className = "option-letter flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-emerald-600 font-bold text-white";
      }
      if (type === "wrong") {
        button.className = "option-btn flex w-full items-start gap-3 rounded-2xl border border-red-500 bg-red-50 p-3.5 text-left text-red-950";
        button.querySelector(".option-letter").className = "option-letter flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-red-600 font-bold text-white";
      }
      if (type === "manual") {
        button.className = "option-btn flex w-full items-start gap-3 rounded-2xl border border-blue-500 bg-blue-50 p-3.5 text-left text-blue-950";
        button.querySelector(".option-letter").className = "option-letter flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-blue-600 font-bold text-white";
      }
    }

    function checkAnswer(selectedButton, question) {
      const selectedKey = selectedButton.dataset.key;
      if (!isAnswerKey(selectedKey)) return;
      const hadAnswer = isAnswerKey(selectedAnswerForQuestion(question));
      saveSelectedAnswer(question, selectedKey);
      answered = true;
      if (!hadAnswer) markDailyTaskItem("difficultWords", question.id);
      if (question.correctAnswer) {
        if (selectedKey === question.correctAnswer) removeWrongQuestion(question.id);
        else if (selectedKey !== question.correctAnswer) addWrongQuestion(question.id);
      }
      const result = selectedAnswerSummary();
      stats.correct = result.correct;
      stats.wrong = result.wrong;
      renderQuestion();
    }

    function nextButtonHtml() {
      const questions = getCategoryQuestions();
      const label = currentIndex + 1 >= questions.length ? "Bölümü Bitir" : "Sonraki Soru";
      return '<button id="nextQuestionBtn" class="rounded-2xl bg-blue-600 px-6 py-3 font-semibold text-white shadow-lg shadow-blue-950/40 transition hover:bg-blue-500">' + label + '</button>';
    }

    function bindNextQuestionButton() {
      const nextButton = document.getElementById("nextQuestionBtn");
      if (!nextButton) return;
      nextButton.addEventListener("click", () => {
        currentIndex++;
        renderQuestion();
      });
    }

    function renderFinishScreen() {
      const documentInfo = solveMode === "wrong" ? { title: "Yanlış Sorular" } : activeDocument();
      const result = selectedAnswerSummary();
      stats.correct = result.correct;
      stats.wrong = result.wrong;
      renderStats();
      const total = result.correct + result.wrong;
      const rate = total === 0 ? 0 : Math.round((result.correct / total) * 100);
      appArea.innerHTML =
        '<div class="rounded-3xl border border-slate-800 bg-slate-900/80 p-10 text-center shadow-2xl shadow-black/30">' +
          '<div class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-2xl bg-emerald-500/20 text-3xl">✓</div>' +
          '<h3 class="text-3xl font-bold text-white">Tebrikler, bu bölümü tamamladınız!</h3>' +
          '<p class="mt-3 text-slate-400">' + escapeHtml(documentInfo.title) + ' bölümündeki ' + getCategoryQuestions().length + ' soru tamamlandı.</p>' +
          '<div class="mt-8 grid gap-4 md:grid-cols-3">' +
            '<div class="rounded-2xl bg-slate-800 p-5"><p class="text-sm text-slate-400">Doğru</p><p class="mt-1 text-3xl font-bold text-emerald-400">' + result.correct + '</p></div>' +
            '<div class="rounded-2xl bg-slate-800 p-5"><p class="text-sm text-slate-400">Yanlış</p><p class="mt-1 text-3xl font-bold text-red-400">' + result.wrong + '</p></div>' +
            '<div class="rounded-2xl bg-slate-800 p-5"><p class="text-sm text-slate-400">Başarı Oranı</p><p class="mt-1 text-3xl font-bold text-blue-400">%' + rate + '</p></div>' +
          '</div>' +
          '<button onclick="restartCategory()" class="mt-8 rounded-2xl bg-blue-600 px-6 py-3 font-semibold text-white shadow-lg shadow-blue-950/40 transition hover:bg-blue-500">Bu Bölümü Tekrar Çöz</button>' +
        '</div>';
    }

    function restartCategory() {
      currentIndex = 0;
      answered = false;
      renderQuestion();
    }

    function openWordModal(word, question, suggested = null) {
      pendingWord = { word: normalizeWord(word), questionId: question?.id || null };
      const existing = wordbook.find(item => item.word.toLowerCase() === pendingWord.word.toLowerCase());
      wordModalTitle.textContent = pendingWord.word || "Yeni kelime";
      wordInput.value = existing?.word || pendingWord.word;
      turkishInput.value = existing?.turkish || existing?.meaning || suggested?.turkish || "";
      meaningInput.value = existing?.meaningNote || suggested?.meaningNote || "";
      exampleInput.value = wordExample(existing) || suggested?.example || suggested?.exampleSentence || suggested?.sentence || (Array.isArray(suggested?.examples) ? suggested.examples[0] : "") || "";
      wordModal.classList.remove("hidden");
      wordModal.classList.add("flex");
      turkishInput.focus();
    }

    function openBlankWordModal() {
      openWordModal("", null);
      wordModalTitle.textContent = "Yeni kelime";
      wordInput.focus();
    }

    function closeWordModal() {
      wordModal.classList.add("hidden");
      wordModal.classList.remove("flex");
      pendingWord = null;
    }

    function saveWord() {
      const word = normalizeWord(wordInput.value);
      const turkish = turkishInput.value.trim();
      const meaningNote = meaningInput.value.trim();
      const example = exampleInput.value.trim();
      if (!word || !turkish) return;
      const existingIndex = wordbook.findIndex(item => item.word.toLowerCase() === word.toLowerCase());
      const existing = existingIndex >= 0 ? wordbook[existingIndex] : null;
      const record = {
        ...(existing || {}),
        id: existing ? existing.id : "word-" + Date.now(),
        word,
        turkish,
        meaning: turkish,
        meaningNote,
        example,
        questionId: pendingWord?.questionId || existing?.questionId || null,
        createdAt: existing ? existing.createdAt : new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        seen: existing ? existing.seen || 0 : 0,
        needsReview: existing ? !!existing.needsReview : false,
      };
      if (existingIndex >= 0) wordbook[existingIndex] = record;
      else wordbook.unshift(record);
      saveJson(STORAGE_WORDS, wordbook);
      queueSupabaseAutoBackup();
      closeWordModal();
      renderStats();
      if (activeView === "words") renderWordbook();
      if (activeView === "study") renderWordStudy();
    }

    function wordTurkish(item) {
      return item?.turkish || item?.meaning || "";
    }

    function wordMeaningNote(item) {
      return item?.meaningNote || "";
    }

    function wordPartOfSpeech(item) {
      const value = String(item?.category || item?.source || "").toLowerCase();
      if (value.includes("fiil") || value.includes("verb")) return "Fiil";
      if (value.includes("sıfat") || value.includes("sifat") || value.includes("adjective")) return "Sıfat";
      if (value.includes("bağlaç") || value.includes("baglac") || value.includes("conjunction")) return "Bağlaç";
      if (value.includes("preposition") || value.includes("edat")) return "Edat";
      return "Kelime";
    }

    function wordExample(item) {
      return item?.example || item?.exampleSentence || item?.sentence || "";
    }

    function wordTabsHtml(activeTab, showAddButton = true) {
      const tabClass = tab =>
        activeTab === tab
          ? "rounded-xl bg-blue-600 px-4 py-2 text-sm font-bold text-white shadow-lg shadow-blue-200"
          : "rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-50";
      return '<div class="mb-3 rounded-2xl border border-slate-200 bg-white p-3 shadow-sm">' +
        '<div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">' +
          '<div class="flex flex-wrap gap-2">' +
            '<button class="word-tab-btn ' + tabClass("list") + '" data-tab="list">Kelime Defteri</button>' +
            '<button class="word-tab-btn ' + tabClass("cards") + '" data-tab="cards">Kart Çalışması</button>' +
            '<button class="word-tab-btn ' + tabClass("quiz") + '" data-tab="quiz">Çoktan Seçmeli</button>' +
          '</div>' +
          (showAddButton ? '<button id="wordPrimaryAddBtn" class="rounded-xl border border-blue-200 bg-blue-50 px-4 py-2 text-sm font-black text-blue-700 hover:bg-blue-100" aria-label="Yeni kelime ekle">Yeni Kelime</button>' : '') +
        '</div>' +
      '</div>';
    }

    function bindWordTabs() {
      document.querySelectorAll(".word-tab-btn").forEach(button => {
        button.addEventListener("click", () => {
          if (button.dataset.tab === "list") setView("words");
          else {
            startWordStudy(button.dataset.tab === "quiz" ? "quiz" : "cards", true);
          }
        });
      });
      const addButton = document.getElementById("wordPrimaryAddBtn");
      if (addButton) addButton.addEventListener("click", openBlankWordModal);
    }

    function startWordStudy(mode = "cards", fresh = false) {
      wordStudyScopeIds = null;
      wordStudyScopeLabel = "";
      wordStudyMode = mode === "quiz" ? "quiz" : "cards";
      wordStudyIndex = 0;
      wordCardRevealed = false;
      wordQuizQuestion = null;
      if (wordStudyMode === "quiz") resetWordQuizSessionResults();
      if (fresh) buildWordSession(true, wordStudyMode);
      setView("study");
    }

    function filteredWordbook() {
      let items = [...wordbook];
      const query = normalizeLookup(wordSearchQuery);
      if (query) {
        items = items.filter(item =>
          normalizeLookup(item.word).includes(query) ||
          normalizeLookup(wordTurkish(item)).includes(query) ||
          normalizeLookup(wordMeaningNote(item)).includes(query)
        );
      }
      if (wordStatusFilter !== "all") {
        items = items.filter(item => wordStatus(item).key === wordStatusFilter);
      }
      items.sort((a, b) => {
        if (wordSortMode === "shuffle") return Math.random() - 0.5;
        if (wordSortMode === "za") return String(b.word || "").localeCompare(String(a.word || ""), "tr");
        if (wordSortMode === "created") return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
        if (wordSortMode === "review") return new Date(a.updatedAt || 0) - new Date(b.updatedAt || 0);
        return String(a.word || "").localeCompare(String(b.word || ""), "tr");
      });
      return items;
    }

    function createNoteId() {
      return typeof crypto !== "undefined" && typeof crypto.randomUUID === "function"
        ? crypto.randomUUID()
        : "note-" + Date.now() + "-" + Math.random().toString(36).slice(2, 10);
    }

    function normalizeNote(note = {}) {
      const now = new Date().toISOString();
      const validSourceTypes = ["manual", "question", "reading"];
      const text = value => typeof value === "string" ? value : "";
      const questionNumber = Number(note.questionNumber);
      const legacyContent = [note.title, note.meaning, note.structure, note.sourceText, note.personalExample]
        .map(text)
        .map(value => value.trim())
        .filter(Boolean)
        .join("\n\n");
      return {
        id: text(note.id) || createNoteId(),
        content: text(note.content) || legacyContent,
        sourceType: validSourceTypes.includes(note.sourceType) ? note.sourceType : "manual",
        sourceId: text(note.sourceId) || null,
        sourceTitle: text(note.sourceTitle) || null,
        questionId: text(note.questionId) || null,
        questionNumber: Number.isFinite(questionNumber) && questionNumber > 0 ? questionNumber : null,
        selectedText: text(note.selectedText) || null,
        createdAt: text(note.createdAt) || now,
        updatedAt: text(note.updatedAt) || now,
      };
    }

    function saveNotes() {
      saveJson(STORAGE_NOTES, notes);
    }

    async function copyNoteContent(note) {
      const content = String(note?.content || "");
      try {
        await navigator.clipboard.writeText(content);
        showToast("Not kopyalandı.");
      } catch {
        const input = document.createElement("textarea");
        input.value = content;
        input.style.position = "fixed";
        input.style.opacity = "0";
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
        showToast("Not kopyalandı.");
      }
    }

    function filteredNotes() {
      const query = normalizeLookup(noteSearchQuery);
      return notes
        .filter(note => !query || normalizeLookup(note.content).includes(query) || normalizeLookup(note.sourceTitle).includes(query) || normalizeLookup(String(note.questionNumber || "")).includes(query))
        .sort((a, b) => {
          if (noteSortMode === "oldest") return new Date(a.createdAt || 0) - new Date(b.createdAt || 0);
          if (noteSortMode === "source") return String(a.sourceTitle || "").localeCompare(String(b.sourceTitle || ""), "tr");
          return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
        });
    }

    function closeNoteDrawer() {
      document.getElementById("noteDrawerOverlay")?.remove();
    }

    function noteSourceLabel(note) {
      if (!note?.sourceTitle) return "";
      return note.sourceTitle + (note.questionNumber ? " · Soru " + note.questionNumber : note.sourceType === "reading" ? " · Okuma Merkezi" : "");
    }

    function noteSourceExists(note) {
      if (note?.sourceType === "question") {
        return questionBank.some(question => question.id === note.questionId || question.documentId === note.sourceId);
      }
      if (note?.sourceType === "reading") return articles.some(article => article.id === note.sourceId);
      return false;
    }

    function goToNoteSource(note) {
      if (!noteSourceExists(note)) return;
      if (note.sourceType === "reading") {
        activeArticleId = note.sourceId;
        articleLanguageView = "en";
        setView("articles");
        return;
      }
      const question = questionBank.find(item => item.id === note.questionId) || questionBank.find(item => item.documentId === note.sourceId && Number(item.questionNumber) === Number(note.questionNumber)) || questionBank.find(item => item.documentId === note.sourceId);
      if (!question) return;
      const documentQuestions = questionBank.filter(item => item.documentId === question.documentId);
      activeDocumentId = question.documentId;
      currentIndex = Math.max(0, documentQuestions.findIndex(item => item.id === question.id));
      answered = false;
      solveMode = "document";
      wrongReviewIds = [];
      setView("solve");
    }

    function noteTitle(note) {
      return String(note?.content || "").split(/\r?\n/).find(line => line.trim())?.trim() || "Başlıksız not";
    }

    function notePreview(note) {
      const lines = String(note?.content || "").split(/\r?\n/);
      const titleIndex = lines.findIndex(line => line.trim());
      return titleIndex < 0 ? "" : lines.slice(titleIndex + 1).join("\n").trim();
    }

    function formatNoteDate(value) {
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? "" : date.toLocaleDateString("tr-TR", { day: "numeric", month: "short", year: "numeric" });
    }

    function openQuickNoteDrawer({ note = null, context = null, onSaved = null } = {}) {
      closeNoteDrawer();
      const item = note ? normalizeNote(note) : normalizeNote({ ...context, content: context?.selectedText ? context.selectedText + "\n\n" : "" });
      const overlay = document.createElement("div");
      overlay.id = "noteDrawerOverlay";
      overlay.className = "fixed inset-0 z-[90] bg-slate-950/45";
      const source = noteSourceLabel(item);
      overlay.innerHTML =
        '<aside class="absolute inset-y-0 right-0 flex w-full max-w-2xl flex-col border-l border-slate-200 bg-white shadow-2xl" role="dialog" aria-modal="true" aria-label="' + (note ? "Notu düzenle" : "Yeni not") + '">' +
          '<div class="flex items-start justify-between border-b border-slate-200 px-5 py-4 sm:px-6">' +
            '<div><p class="text-xs font-black uppercase tracking-wider text-blue-600">Not Defteri</p><h2 class="mt-1 text-xl font-black text-slate-950">' + (note ? "Notu Düzenle" : "Yeni Not") + '</h2></div>' +
            '<button type="button" data-note-drawer-close class="flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 text-xl font-black text-slate-700 hover:bg-slate-50" aria-label="Kapat">×</button>' +
          '</div>' +
          '<form id="noteEditorForm" class="min-h-0 flex-1 overflow-y-auto p-5 sm:p-6">' +
            '<label class="grid h-full min-h-[360px] gap-2 text-sm font-bold text-slate-700"><span>Not <span class="text-rose-600">*</span></span><textarea id="noteContent" required class="min-h-[320px] flex-1 resize-y rounded-xl border border-slate-200 bg-slate-50 p-4 font-medium leading-relaxed text-slate-800 outline-none placeholder:text-slate-400 focus:border-blue-500 focus:bg-white" placeholder="allow sb to do sth&#10;&#10;Birinin bir şey yapmasına izin vermek.&#10;&#10;Örnek:&#10;The system allows users to save their work.">' + escapeHtml(item.content) + '</textarea></label>' +
            (source ? '<p class="mt-3 text-xs font-bold text-slate-500">Kaynak: ' + escapeHtml(source) + '</p>' : "") +
            '<p id="noteEditorError" class="mt-3 hidden text-sm font-bold text-rose-600"></p>' +
          '</form>' +
          '<div class="flex flex-col-reverse gap-2 border-t border-slate-200 p-4 sm:flex-row sm:justify-end sm:px-6">' +
            '<button type="button" data-note-drawer-close class="rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-black text-slate-700 hover:bg-slate-50">İptal</button>' +
            '<button type="submit" form="noteEditorForm" class="rounded-xl bg-blue-600 px-4 py-2.5 text-sm font-black text-white shadow-lg shadow-blue-200 hover:bg-blue-500">' + (note ? "Kaydet" : "Notu Kaydet") + '</button>' +
          '</div>' +
        '</aside>';
      document.body.appendChild(overlay);
      overlay.addEventListener("click", event => { if (event.target === overlay) closeNoteDrawer(); });
      overlay.querySelectorAll("[data-note-drawer-close]").forEach(button => button.addEventListener("click", closeNoteDrawer));
      overlay.addEventListener("keydown", event => {
        if (event.key === "Escape") closeNoteDrawer();
        if (event.key === "Enter" && (event.metaKey || event.ctrlKey)) {
          event.preventDefault();
          overlay.querySelector("#noteEditorForm").requestSubmit();
        }
      });
      overlay.querySelector("#noteEditorForm").addEventListener("submit", event => {
        event.preventDefault();
        const content = overlay.querySelector("#noteContent").value;
        const error = overlay.querySelector("#noteEditorError");
        if (!content.trim()) {
          error.textContent = "Not alanı boş bırakılamaz.";
          error.classList.remove("hidden");
          return;
        }
        const now = new Date().toISOString();
        const record = normalizeNote({
          ...item,
          content,
          createdAt: note?.createdAt || now,
          updatedAt: now,
        });
        notes = note ? notes.map(existing => existing.id === note.id ? record : existing) : [record, ...notes];
        saveNotes();
        closeNoteDrawer();
        if (typeof onSaved === "function") onSaved(record);
        else if (activeView === "notes") renderNotebook();
      });
      overlay.querySelector("#noteContent").focus();
    }

    function noteCardHtml(note) {
      const source = noteSourceLabel(note);
      const preview = notePreview(note);
      const hasSource = note.sourceType !== "manual";
      const sourceExists = noteSourceExists(note);
      return '<article class="note-card relative flex min-h-[180px] cursor-pointer flex-col rounded-2xl border border-slate-200 bg-white p-5 transition hover:border-blue-200" data-note-open="' + escapeHtml(note.id) + '">' +
        '<div class="flex items-start justify-between gap-3"><p class="text-xs font-bold text-slate-500">' + escapeHtml(formatNoteDate(note.createdAt)) + '</p>' +
        '<button class="note-menu-toggle flex h-8 w-8 shrink-0 items-center justify-center rounded-lg text-lg font-black text-slate-500 hover:bg-slate-100 hover:text-blue-700" data-note-id="' + escapeHtml(note.id) + '" aria-label="Not işlemleri">…</button></div>' +
        '<h3 class="mt-3 line-clamp-2 break-words text-[26px] font-bold leading-[1.25] text-blue-700">' + escapeHtml(noteTitle(note)) + '</h3>' +
        (preview ? '<p class="mt-3 whitespace-pre-wrap line-clamp-6 text-[19px] font-medium leading-relaxed text-slate-700">' + escapeHtml(preview) + '</p>' : "") +
        (hasSource ? '<div class="mt-auto pt-5 text-sm font-bold">' + (sourceExists ? '<button class="note-source-link inline-flex items-center gap-2 text-left text-blue-700 hover:text-blue-800 hover:underline" data-note-source="' + escapeHtml(note.id) + '">' + (note.sourceType === "reading" ? "Metne Git" : "Kaynağa Git") + (source ? '<span class="font-medium text-slate-600">' + escapeHtml(source) + '</span>' : "") + '</button>' : '<span class="text-slate-400">Kaynak bulunamadı</span>') + '</div>' : "") +
        '<div class="note-action-menu hidden absolute right-4 top-14 z-10 w-48 rounded-xl border border-slate-200 bg-white p-1.5 shadow-xl" data-note-menu="' + escapeHtml(note.id) + '">' +

    function toggleWordMeaning(card) {
      const meaning = card.querySelector(".meaning");
      const button = card.querySelector(".show-meaning");
      meaning.classList.toggle("hidden");
      if (button) button.textContent = meaning.classList.contains("hidden") ? "Anlamı Göster" : "Anlamı Gizle";
    }

    function shuffleArray(items) {
      return [...items].sort(() => Math.random() - 0.5);
    }

    function wordPracticeWords() {
      return wordbook.filter(item => item.word && wordTurkish(item));
    }

    function isWordDueForStudy(item) {
      if (!item?.dueAt) return true;
      if (item?.needsReview) return true;
      const dueTime = new Date(item.dueAt).getTime();
      if (!Number.isFinite(dueTime)) return true;
      return dueTime <= Date.now();
    }

    function studyWords() {
      return wordPracticeWords().filter(isWordDueForStudy);
    }

    function dueRank(item) {
      const status = wordStatus(item).key;
      if (status === "review") return 0;
      if (status === "new") return 1;
      if (status === "learning") return 2;
      return 3;
    }

    function activeStudyPool() {
      if (!Array.isArray(wordStudyScopeIds)) return studyWords();
      const scopedIds = new Set(wordStudyScopeIds);
      return wordPracticeWords().filter(item => scopedIds.has(item.id));
    }

    function allStudyWords() {
      return activeStudyPool().sort((a, b) =>
        dueRank(a) - dueRank(b) ||
        new Date(a.dueAt || a.updatedAt || a.createdAt || 0) - new Date(b.dueAt || b.updatedAt || b.createdAt || 0) ||
        String(a.word || "").localeCompare(String(b.word || ""), "tr")
      );
    }

    function sessionSizeValue() {
      if (wordSessionSize === "custom") return Math.max(1, Math.min(200, Number(wordCustomSessionSize) || 20));
      return Math.max(1, Number(wordSessionSize) || 20);
    }

    function activeWordSessionSize(poolLength = allStudyWords().length) {
      if (!poolLength) return 0;
      return Math.max(1, Math.min(sessionSizeValue(), poolLength));
    }

    function wordSessionLimitMessage(poolLength = allStudyWords().length) {
      return sessionSizeValue() > poolLength && poolLength > 0
        ? "Havuzda yalnızca " + poolLength + " uygun kelime bulundu."
        : "";
    }

    function wordSessionOptionsHtml(poolLength) {
      const activeSize = activeWordSessionSize(poolLength);
      const options = [10, 20, 30].filter(size => size <= poolLength);
      if (activeSize && !options.includes(activeSize)) options.unshift(activeSize);
      return options.map(size =>
        '<option value="' + size + '"' + (String(wordSessionSize) !== "custom" && activeSize === size ? " selected" : "") + '>' + size + (wordStudyMode === "quiz" ? " soru" : " kart") + '</option>'
      ).join("") +
      '<option value="custom"' + (String(wordSessionSize) === "custom" ? " selected" : "") + '>Özel</option>';
    }

    function buildWordSession(force = false, mode = wordStudyMode) {
      const orderedPool = allStudyWords();
      const pool = force ? shuffleArray(orderedPool) : orderedPool;
      const poolIds = new Set(pool.map(item => item.id));
      const size = activeWordSessionSize(pool.length);
      const validIds = wordSessionIds.filter(id => poolIds.has(id));
      const targetLength = Math.min(size, pool.length);
      if (!force && validIds.length === targetLength) {
        wordSessionIds = validIds.slice(0, size);
      } else {
        wordSessionIds = pool.slice(0, size).map(item => item.id);
      }
      if (wordSessionIds.length > size) wordSessionIds = wordSessionIds.slice(0, size);
      saveJson("yds-word-session-ids-v1", wordSessionIds);
      keepWordStudyIndexInRange(currentSessionWords());
    }

    function resetWordQuizSessionResults() {
      wordQuizSessionResults = {};
      saveJson("yds-word-quiz-session-results-v1", wordQuizSessionResults);
    }

    function recordWordQuizResult(wordId, correct) {
      if (!wordId) return;
      wordQuizSessionResults[wordId] = {
        correct: !!correct,
        markedHard: !correct,
        answeredAt: new Date().toISOString(),
      };
      saveJson("yds-word-quiz-session-results-v1", wordQuizSessionResults);
      markDailyTaskItem("multipleChoice", wordId);
    }

    function wordQuizSessionSummary(words) {
      const answered = words.map(item => wordQuizSessionResults[item.id]).filter(Boolean);
      const correct = answered.filter(item => item.correct).length;
      const wrong = answered.filter(item => !item.correct).length;
      const hard = answered.filter(item => item.markedHard).length;
      const rate = answered.length ? Math.round((correct / answered.length) * 100) : 0;
      return { answered: answered.length, correct, wrong, hard, rate };
    }

    function currentSessionWords() {
      const byId = new Map(wordPracticeWords().map(item => [item.id, item]));
      const selected = wordSessionIds.map(id => byId.get(id)).filter(Boolean);
      return selected.length ? selected : allStudyWords().slice(0, activeWordSessionSize());
    }

    function nextReviewText(minutes) {
      if (minutes < 60) return minutes + " dk sonra";
      if (minutes < 1440) return Math.round(minutes / 60) + " saat sonra";
      return Math.round(minutes / 1440) + " gün sonra";
    }

    const srsOptions = [
      { key: "easy", label: "Kolay", minutes: 10080, className: "border-emerald-200 bg-emerald-50 text-emerald-800 hover:bg-emerald-100" },
      { key: "good", label: "Orta", minutes: 4320, className: "border-blue-200 bg-blue-50 text-blue-800 hover:bg-blue-100" },
      { key: "hard", label: "Zor", minutes: 1440, className: "border-amber-300 bg-amber-50 text-amber-900 hover:bg-amber-100" },
    ];

    function applySrsRating(id, rating, source = "flashcards") {
      const option = srsOptions.find(item => item.key === rating) || srsOptions[1];
      const item = wordbook.find(word => word.id === id);
      if (!item) return;
      item.seen = (item.seen || 0) + 1;
      item.lastRating = rating;
      item.needsReview = false;
      item.dueAt = new Date(Date.now() + option.minutes * 60000).toISOString();
      item.updatedAt = new Date().toISOString();
      saveJson(STORAGE_WORDS, wordbook);
      if (source === "flashcards") {
        markDailyTaskItem("flashcards", id);
      }
    }

    function keepWordStudyIndexInRange(words) {
      if (!words.length) {
        wordStudyIndex = 0;
        return;
      }
      if (wordStudyIndex < 0) wordStudyIndex = words.length - 1;
      if (wordStudyIndex >= words.length) wordStudyIndex = 0;
    }

    function markWordSeenById(id, options = {}) {
      const item = wordbook.find(word => word.id === id);
      if (item) {
        item.seen = (item.seen || 0) + 1;
        if ("needsReview" in options) item.needsReview = !!options.needsReview;
        item.updatedAt = new Date().toISOString();
        saveJson(STORAGE_WORDS, wordbook);
      }
    }

    function renderStudyEmpty(message) {
      appArea.innerHTML =
        wordTabsHtml(wordStudyMode === "quiz" ? "quiz" : "cards", false) +
        '<div class="rounded-2xl border border-slate-200 bg-white p-8 text-center shadow-sm">' +
          '<h3 class="text-2xl font-bold text-slate-950">' + escapeHtml(message) + '</h3>' +
          '<p class="mt-3 text-slate-500">Deftere elle kelime ekleyebilir veya soru metnindeki kelimelere tıklayarak kayıt oluşturabilirsin.</p>' +
        '</div>';
      bindWordTabs();
    }

    function renderWordStudy() {
      pageTitle.textContent = "Kelime Çalışması";
      renderMenu();
      renderStats();
      const pool = allStudyWords();
      const totalPracticeWords = wordPracticeWords().length;
      const desiredSessionLength = activeWordSessionSize(pool.length);
      if (!wordSessionIds.length || currentSessionWords().length !== desiredSessionLength) buildWordSession(true, wordStudyMode);
      let words = currentSessionWords();
      if (!words.length) {
        renderStudyEmpty(wordPracticeWords().length ? "Bugün çalışılacak kelime yok" : "Çalışılacak kelime yok");
        return;
      }
      if (wordStudyMode === "cards" || wordStudyMode === "quiz") {
        if (wordStudyIndex < 0) wordStudyIndex = 0;
        if (wordStudyIndex > words.length) wordStudyIndex = words.length;
      } else {
        if (wordStudyIndex >= words.length) wordStudyIndex = 0;
        keepWordStudyIndexInRange(words);
      }
      const displayIndex = Math.min(wordStudyIndex + 1, words.length);
      const limitMessage = wordSessionLimitMessage(pool.length);

      appArea.innerHTML =
        wordTabsHtml(wordStudyMode === "quiz" ? "quiz" : "cards", false) +
        '<section class="mb-3 rounded-2xl border border-slate-200 bg-white p-3 shadow-sm">' +
          '<div class="flex flex-col gap-3 xl:flex-row xl:items-center xl:justify-between">' +
            '<div>' +
              '<p class="text-sm font-black uppercase tracking-wide text-blue-500">' + (wordStudyMode === "quiz" ? "SORU" : "KART") + ' ' + displayIndex + ' / ' + words.length + '</p>' +
              '<p class="mt-1 text-xs font-semibold text-slate-500">' + (wordStudyMode === "quiz" ? "Oturum: " + words.length + " soru" : "Çalışılabilir havuz: " + pool.length + " kelime") + '</p>' +
              (wordStudyScopeLabel
                ? '<p class="mt-1 text-xs font-black text-blue-600">' + escapeHtml(wordStudyScopeLabel) + '</p>'
                : '<p class="mt-1 text-xs font-semibold text-slate-400">Genel havuz: ' + totalPracticeWords + ' kelime</p>') +
              (limitMessage ? '<p class="mt-1 text-xs font-bold text-amber-700">' + escapeHtml(limitMessage) + '</p>' : '') +
            '</div>' +
            '<div class="flex flex-wrap items-center gap-2 rounded-2xl border border-slate-200 bg-slate-50 p-2">' +

    function buildWordQuizQuestion(words) {
      const target = words[wordStudyIndex];
      const targetPart = wordPartOfSpeech(target);
      const samePart = wordbook.filter(item => item.id !== target.id && wordTurkish(item) && wordPartOfSpeech(item) === targetPart);
      const closeLevel = samePart.filter(item => Math.abs((Number(item.seen || 0)) - (Number(target.seen || 0))) <= 2);
      const distractorPool = closeLevel.length >= 3 ? closeLevel : samePart.length >= 3 ? samePart : wordbook.filter(item => item.id !== target.id && wordTurkish(item));
      const distractors = shuffleArray(distractorPool).slice(0, 3);
      const choices = shuffleArray([target, ...distractors]).map(item => ({
        id: item.id,
        label: wordTurkish(item),
        part: wordPartOfSpeech(item),
      }));
      wordQuizQuestion = {
        targetId: target.id,
        selectedId: null,
        checked: false,
        choices,
      };
    }

    function articleVocabularyMap(article) {
      const map = {};
      (article?.vocabulary || []).forEach(item => {

      });
      wordbook.forEach(item => {
        const key = normalizeLookup(item.word);

        map[key] = { ...(map[key] || {}), ...item, isInWordbook: true };
      });
      return map;
    }

    function splitArticleSections(text) {
      const normalizedText = String(text || "")
        .replace(/\r\n?/g, "\n")
        .replace(/\u00a0/g, " ")
        .replace(/[“”]/g, '"')
        .replace(/[‘’]/g, "'")
        .replace(/[–—]/g, "-");
      const lines = normalizedText.split(/\n+/).map(line => line
        .replace(/[ \t]+/g, " ")
        .replace(/\s+([,.!?;:])/g, "$1")
        .trim()
      ).filter(Boolean);
      const vocabulary = [];
      const mainLines = [];
      let inVocabulary = false;
      let current = null;

      lines.forEach(line => {
        const lower = line.toLowerCase();
        if (/vocabulary\b|^kelime\b/.test(lower)) {
          inVocabulary = true;
          return;
        }
        if (!inVocabulary) {
          mainLines.push(line);
          return;
        }

        const header = line.match(/^([A-Za-z][A-Za-z'’\- ]{1,50})\s*\(([^)]*)\)/);
        if (header && !/^türkçe|^eş\s*anlam/i.test(line)) {
          if (current?.word) vocabulary.push(current);
          current = { word: normalizeWord(header[1]), turkish: "", meaningNote: "", examples: [] };
          return;
        }
        if (!current) return;
        const turkish = line.match(/Türkçe\s*Anlam[ıi]\s*:\s*(.+)$/i);
        if (turkish) {
          current.turkish = turkish[1].trim();
          return;
        }
        const synonyms = line.match(/Eş\s*Anlamlıları\s*\(Synonyms\)\s*:\s*(.+)$/i);
        if (synonyms) {
          current.meaningNote = synonyms[1].trim();
          return;
        }
        if (!/dilkocum\.com/i.test(line)) current.examples.push(line);
      });
      if (current?.word) vocabulary.push(current);

      const cleanMain = mainLines
        .filter(line => !/^(reading|vocabulary)\b/i.test(line))
        .filter(line => !/dilkocum\.com/i.test(line))
        .join("\n\n");
      return { text: normalizeArticleTextForReading(cleanMain || lines.join("\n\n")), vocabulary };
    }

    async function extractPdfText(file, status = null) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const pages = [];
      for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
        if (status) status.textContent = "PDF okunuyor: " + pageNumber + " / " + pdf.numPages;
        const page = await pdf.getPage(pageNumber);
        const content = await page.getTextContent();
        pages.push(content.items.map(item => item.str).join(" "));
      }
      return pages.join("\n\n");
    }

          '<div id="articlePreviewSummary" class="mb-2 rounded-xl border px-3 py-2 text-sm font-bold" style="border-color: var(--border-color); background: var(--bg-surface); color: var(--text-secondary)"></div>' +
          '<textarea id="articlePreviewText" class="min-h-56 w-full rounded-xl border px-4 py-3 text-base leading-7 outline-none focus:border-blue-500" style="border-color: var(--border-color); background: var(--bg-surface); color: var(--text-primary)"></textarea>' +
        '</div>' +
        '<div class="mt-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">' +

        '</div>' +
      '</div>';
    }

    function articleQuestionStats(article) {
      const questions = Array.isArray(article?.questions) ? article.questions : [];
      const answers = article?.userAnswers || {};
      const keyMap = article?.answerKey || {};
      const answered = questions.filter(question => answers[question.questionNumber]).length;
      const correct = questions.filter(question => {
        const key = keyMap[question.questionNumber];
        return key && answers[question.questionNumber] === key;
      }).length;
      return { total: questions.length, answered, correct, success: answered ? Math.round((correct / answered) * 100) : 0 };
    }

    function articleCardActionLabel(article) {
      const status = articleReadingStatus(article);
      if (articleKind(article) === "yds" && Array.isArray(article.questions) && article.questions.length) return "Oku ve Soruları Çöz";
      if (status.key === "completed") return "Tekrar Oku";
      if (status.key === "reading") return "Devam Et";
      return "Oku";
    }

      const kind = articleKind(article);
      const status = articleReadingStatus(article);
      const added = articleAddedWordCount(article);
      const progress = Math.max(0, Math.min(100, Math.round(Number(article.readingProgress || 0))));
      const qStats = articleQuestionStats(article);
      const metaParts = [
        added ? "Kaydedilen: " + added : "",
      ].filter(Boolean);
      if (kind === "yds" && qStats.total) {
        metaParts.push(qStats.total + " soru");
        metaParts.push(qStats.answered + " çözüldü");
        metaParts.push("%" + qStats.success);

      return '<article class="reading-content-card relative rounded-2xl border p-4 shadow-sm transition hover:border-blue-200 hover:bg-blue-50/40" style="border-color: var(--border-color); background: var(--bg-surface)">' +

          '<span class="rounded-full border px-3 py-1 text-xs font-black" style="border-color: var(--border-color); color: var(--text-secondary); background: var(--bg-surface-secondary)">' + status.label + '</span>' +
        '</div>' +

        '<p class="mt-2 line-clamp-2 text-sm font-semibold" style="color: var(--text-secondary)">' + escapeHtml(normalizeArticleTextForReading(article.text || "").slice(0, 180)) + (article.text && article.text.length > 180 ? '...' : '') + '</p>' +
        (metaParts.length ? '<div class="mt-3 flex flex-wrap gap-2">' + metaParts.map(item => '<span class="rounded-full border px-2.5 py-1 text-xs font-bold" style="border-color: var(--border-color); color: var(--text-secondary); background: var(--bg-surface-secondary)">' + escapeHtml(item) + '</span>').join("") + '</div>' : '') +

          '<button class="article-card-menu-btn article-icon-btn flex h-10 w-10 items-center justify-center rounded-xl text-xl font-black" data-id="' + escapeHtml(article.id) + '" aria-label="İçerik işlemleri" title="Diğer işlemler">⋯</button>' +
        '</div>' +
        '<div class="article-card-menu word-action-menu absolute bottom-14 right-4 z-30 min-w-52 rounded-xl border p-2 text-sm font-bold shadow-xl" style="border-color: var(--border-color); background: var(--bg-surface); color: var(--text-primary)" data-id="' + escapeHtml(article.id) + '">' +
          '<button class="article-card-rename block w-full rounded-lg px-3 py-2 text-left hover:bg-slate-100" data-id="' + escapeHtml(article.id) + '">Yeniden adlandır</button>' +
          '<button class="article-card-edit block w-full rounded-lg px-3 py-2 text-left hover:bg-slate-100" data-id="' + escapeHtml(article.id) + '">Düzenle</button>' +
          '<button class="article-card-translation block w-full rounded-lg px-3 py-2 text-left hover:bg-slate-100" data-id="' + escapeHtml(article.id) + '">' + (articleHasTranslation(article) ? 'Türkçe Çeviriyi Düzenle' : 'Türkçe Çeviri Ekle') + '</button>' +

      return filtered.length
        ? '<div class="mt-4 grid gap-3 lg:grid-cols-2">' + filtered.map(renderArticleCard).join("") + '</div>'
        : '<div class="mt-4 rounded-2xl border border-dashed p-8 text-center" style="border-color: var(--border-color); background: var(--bg-surface-secondary)"><h3 class="text-lg font-black" style="color: var(--text-primary)">Bu filtrede içerik yok</h3><p class="mt-2 text-sm font-semibold" style="color: var(--text-secondary)">Filtreleri değiştir veya yeni içerik ekle.</p></div>';

                '<select id="articleStatusFilter" class="rounded-xl border px-3 py-2 text-sm font-bold outline-none focus:border-blue-500" style="border-color: var(--border-color); background: var(--bg-surface-secondary); color: var(--text-primary)"><option value="all">Okuma durumu</option><option value="new">Yeni</option><option value="reading">Okunuyor</option><option value="completed">Tamamlandı</option></select>' +

                '<select id="articleLanguageFilter" class="rounded-xl border px-3 py-2 text-sm font-bold outline-none focus:border-blue-500" style="border-color: var(--border-color); background: var(--bg-surface-secondary); color: var(--text-primary)"><option value="all">Dil durumu</option><option value="translated">Çevirisi olanlar</option><option value="missing">Çevirisi olmayanlar</option><option value="draft">Taslak çeviriler</option></select>' +
                '<select id="articleSortMode" class="rounded-xl border px-3 py-2 text-sm font-bold outline-none focus:border-blue-500" style="border-color: var(--border-color); background: var(--bg-surface-secondary); color: var(--text-primary)"><option value="recent">Son eklenen</option><option value="az">A-Z</option><option value="short">En kısa</option><option value="long">En uzun</option><option value="studied">Son çalışılan</option></select>' +
