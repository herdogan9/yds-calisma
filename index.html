<!doctype html>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("yds-theme-v1");
        var theme = stored || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
      } catch {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>

      --bg-surface-secondary: #eef4fb;
      --text-primary: #172033;
      --text-secondary: #475569;

    .sidebar-utility {
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: .5rem;
      padding: .5rem .25rem;
    }

    .sidebar-utility-item {
      display: inline-flex;
      height: 2.5rem;
      width: 2.5rem;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--theme-border);
      border-radius: .8rem;
      padding: 0;
      color: var(--sidebar-text) !important;
      background: var(--theme-bg);
      box-shadow: none;
    }

    .sidebar-utility-item:hover {
      border-color: #93c5fd;
      background: var(--theme-hover);
    }

    [data-theme="dark"] .sidebar-utility-item:hover {
      background: var(--theme-hover);
    }

    .sidebar-utility-item.is-active {
      border-color: #60a5fa;
      background: rgb(37 99 235 / 16%);
      color: #2563eb !important;
      box-shadow: inset 0 0 0 1px rgb(37 99 235 / 18%);
    }

    .sidebar-utility-icon {
      display: inline-flex;
      height: 100%;
      width: 100%;
      align-items: center;
      justify-content: center;
      border-radius: inherit;
      border: 0;
      background: transparent;
      color: inherit;
      font-size: .95rem;
      line-height: 1;
    }

    .sidebar-utility-icon svg {
      height: 1.05rem;
      width: 1.05rem;
      stroke: currentColor;
      stroke-width: 2;
    }

    .theme-toggle {
      display: flex;
      height: 2.5rem;
      width: 2.5rem;
      align-items: center;
      justify-content: center;
      border-radius: .8rem;
      border: 1px solid var(--theme-border) !important;
      background: var(--theme-bg) !important;
      color: var(--theme-text) !important;
      box-shadow: none !important;
    }

    .theme-toggle:hover {
      background: var(--theme-hover) !important;
      border-color: #93c5fd !important;
    }

    .theme-toggle:focus-visible {
      outline: 2px solid #2563eb;
      outline-offset: 2px;
    }

    .theme-toggle:active {
      background: var(--theme-hover) !important;
    }

    .theme-toggle-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: inherit !important;
      line-height: 1;
    }

    .theme-toggle-icon svg {
      height: 1.05rem;
      width: 1.05rem;
      stroke: currentColor;
      stroke-width: 2;
    }

    [data-theme="light"] .theme-toggle-icon {
      color: #d97706 !important;
    }

    [data-theme="dark"] .theme-toggle-icon {
      color: #bfdbfe !important;
    }

    .soon-badge {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      border-radius: 999px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      padding: .1rem .45rem;
      color: #2563eb !important;
      font-size: .68rem;
      font-weight: 900;
      line-height: 1.15;
    }

    .yds-sidebar .module-title .soon-badge {

    [data-theme="dark"] .soon-badge {

      color: #bfdbfe !important;

    [data-theme="dark"] .yds-sidebar .module-title .soon-badge {
      color: #bfdbfe !important;
    }

      background-color: #1f2937 !important;
      border-color: #475569 !important;
      color: #94a3b8 !important;
      opacity: 1;
    }

    .word-token {
      display: inline;
      border: 0;
      background: transparent;
      padding: 0;
      margin: 0;
      color: inherit;
      font: inherit;
      letter-spacing: inherit;
      line-height: inherit;
      vertical-align: baseline;
      cursor: pointer;
    }

    .word-token:hover {
      color: #60a5fa;
      text-decoration: underline;
      text-decoration-style: dotted;
      text-underline-offset: 4px;
    }

    .word-token[data-vocab-key] {
      color: inherit;
    }

    .word-token[data-added-word="true"] {
      border-radius: .35rem;
      background: rgb(37 99 235 / 10%);
      box-shadow: inset 0 -2px 0 rgb(37 99 235 / 25%);
    }

    .pdf-justify-text {
      text-align: justify;
      text-align-last: left;
      word-spacing: normal;
      letter-spacing: normal;
      hyphens: auto;
      overflow-wrap: break-word;
    }

    .article-body {
      text-align: left;
      text-align-last: auto;
      word-spacing: normal;
      letter-spacing: normal;
      hyphens: none;
      overflow-wrap: break-word;
    }

    .article-body p {
      margin: 0 0 1.45rem;
    }

    .article-body p:last-child {
      margin-bottom: 0;
    }

    .article-reader-surface {
      background: var(--bg-surface);
      border-color: var(--border-color);
      color: var(--text-primary);
    }

    .article-reader-surface.is-focus-mode,
    .question-reader-surface.is-focus-mode {
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
    }

    body.article-focus-mode #appSidebar,
    body.question-focus-mode #appSidebar,
    body.article-focus-mode #sidebarOverlay,
    body.question-focus-mode #sidebarOverlay,
    body.article-focus-mode .yds-top-dashboard,
    body.question-focus-mode .yds-top-dashboard {
      display: none !important;
    }

    body.article-focus-mode main,
    body.question-focus-mode main {
      margin-left: 0 !important;
      padding-left: 1rem;
      padding-right: 1rem;
    }

    .sentence-study-panel {
      position: fixed;
      inset: 1rem 1rem 1rem auto;
      z-index: 75;
      width: min(390px, calc(100vw - 2rem));
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      box-shadow: 0 24px 60px rgb(15 23 42 / 22%);
    }

    @media (max-width: 768px) {
      .sentence-study-panel {
        inset: auto .75rem .75rem .75rem;
        width: auto;
        max-height: 80vh;
      }
    }

    .article-toolbar-btn,
    .article-icon-btn {
      background: var(--button-secondary-bg);
      border: 1px solid var(--border-color);
      color: var(--button-secondary-text);
    }

    .article-toolbar-btn:hover,

      try {
        const value = localStorage.getItem(key);
        return value ? JSON.parse(value) : fallback;
      } catch {
        return fallback;
      }
    }

    function saveJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function removeBundledVocabularyOnce() {
      if (localStorage.getItem(STORAGE_REMOVE_BUILTIN_SEEDS) === "done") return;
      const bundledSources = [
        "Son_3_Yilda_Sorulmus_Tum_Kelimeler",
        "KELİME_KARTLARI",
        "KELİME_KARTLARI",
        "kamilhoca",
        "bolkelime",
        "PDF kelime listesi",
      ];
      const before = wordbook.length;
      wordbook = wordbook.filter(item => {
        const id = String(item?.id || "");
        const source = String(item?.source || "");
        if (id.startsWith("seed-") || id.startsWith("seed-word-")) return false;
        return !bundledSources.some(marker => source.includes(marker));
      });
      if (wordbook.length !== before) {
        saveJson(STORAGE_WORDS, wordbook);
        wordSessionIds = wordSessionIds.filter(id => wordbook.some(item => item.id === id));
        saveJson("yds-word-session-ids-v1", wordSessionIds);
      }
      localStorage.setItem(STORAGE_REMOVE_BUILTIN_SEEDS, "done");
      localStorage.removeItem(STORAGE_WORD_SEED_VERSION);
    }

    function mergeVocabularySeed() {
      if (!vocabularySeed.length || localStorage.getItem(STORAGE_WORD_SEED_VERSION) === VOCABULARY_SEED_VERSION) return;
      const existingByWord = new Map(wordbook.map(item => [String(item.word || "").toLowerCase(), item]));
      const now = new Date().toISOString();
      let added = 0;
      let updated = 0;
      vocabularySeed.forEach(item => {
        const key = String(item.word || "").toLowerCase();
        if (!key) return;
        const existing = existingByWord.get(key);
        if (existing) {
          let changed = false;
          if (!wordExample(existing) && (item.example || item.exampleSentence || item.sentence)) {
            existing.example = item.example || item.exampleSentence || item.sentence;
            changed = true;
          }
          if (!wordMeaningNote(existing) && item.meaningNote) {
            existing.meaningNote = item.meaningNote;
            changed = true;
          }
          if (!wordTurkish(existing) && (item.turkish || item.meaning)) {
            existing.turkish = item.turkish || item.meaning;
            existing.meaning = item.turkish || item.meaning;
            changed = true;
          }
          if (changed) {
            existing.updatedAt = now;
            updated++;
          }
          return;
        }
        added++;
        const record = {
          id: item.id || "seed-word-" + added + "-" + Date.now(),
          word: item.word,
          turkish: item.turkish || item.meaning || "",
          meaning: item.turkish || item.meaning || "",
          meaningNote: item.meaningNote || "",
          example: item.example || item.exampleSentence || item.sentence || "",
          source: item.source || "PDF kelime listesi",
          category: item.category || "PDF kelimeleri",
          questionId: null,
          createdAt: now,
          updatedAt: now,
          seen: item.seen || 0,
        };
        existingByWord.set(key, record);
        wordbook.push(record);
      });
      localStorage.setItem(STORAGE_WORD_SEED_VERSION, VOCABULARY_SEED_VERSION);
      if (added || updated) saveJson(STORAGE_WORDS, wordbook);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeWord(value) {
      return String(value || "").trim().replace(/^['"“”‘’.,;:!?()[\]{}]+|['"“”‘’.,;:!?()[\]{}]+$/g, "");
    }

    function normalizeLookup(value) {
      return normalizeWord(value).toLowerCase();
    }

    function todayKey() {
      const now = new Date();
      const offset = now.getTimezoneOffset() * 60000;
      return new Date(now.getTime() - offset).toISOString().slice(0, 10);
    }

    function titleCaseFromSlug(value) {
      return String(value || "")
        .replace(/\.[a-z0-9]+$/i, "")
        .replace(/^upload-\d+-?/i, "")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .split(" ")
        .filter(Boolean)
        .map(part => {
          const lower = part.toLocaleLowerCase("tr");
          if (/^yds$/i.test(part)) return "YDS";
          if (/^e$/i.test(part)) return "e";
          if (/^pdf$/i.test(part)) return "PDF";
          if (/^\d+$/.test(part)) return part;
          return lower.charAt(0).toLocaleUpperCase("tr") + lower.slice(1);
        })
        .join(" ")
        .replace(/Academic Vocabulary\s+(\d+)\s+Test/i, "Academic Vocabulary – $1 Questions")
        .replace(/Academis Vocabulary\s+(\d+)\s+Test/i, "Academic Vocabulary – $1 Questions")
        .replace(/Ankara Dil Akademisi\s+/i, "");
    }

      const count = questionCount || doc?.questionCount || 0;
      return {

        meta: [source, count ? count + " soru" : ""].filter(Boolean).join(" · "),
      };
    }

    function dailyWordDifficulty(item) {
      if (item?.needsReview || item?.lastRating === "again" || item?.lastRating === "hard") return { label: "Zor", className: "border-amber-300 bg-amber-50 text-amber-900" };
      if (item?.lastRating === "easy") return { label: "Kolay", className: "border-emerald-200 bg-emerald-50 text-emerald-800" };
      if (item?.lastRating === "good") return { label: "Orta", className: "border-blue-200 bg-blue-50 text-blue-800" };
      return { label: wordStatus(item).label, className: wordStatus(item).className };
    }

    function isHardDailyWord(item) {
      return !!item && (item.needsReview || item.lastRating === "hard" || item.lastRating === "again" || wordStatus(item).key === "review");
    }

    function dailyWordItems() {
      const date = todayKey();
      const hardWords = wordbook.filter(isHardDailyWord);
      const hardById = new Map(hardWords.map(item => [item.id, item]));
      const stored = loadJson(STORAGE_DAILY_HARD_WORDS, null);
      if (stored?.date === date) {
        const existing = (stored.wordIds || []).map(id => hardById.get(id)).filter(Boolean).slice(0, 3);
        if (existing.length || !hardWords.length) return existing;
      }
      if (!hardWords.length) {
        saveJson(STORAGE_DAILY_HARD_WORDS, { date, wordIds: [], completedIds: [], shownAt: stored?.shownAt || {} });
        return [];
      }
      const shownAt = { ...(stored?.shownAt || {}) };
      const previousIds = new Set(stored?.wordIds || []);
      const sorted = [...hardWords].sort((a, b) => {
        const aShown = shownAt[a.id] || "";
        const bShown = shownAt[b.id] || "";
        if (aShown !== bShown) return aShown.localeCompare(bShown);
        return new Date(a.dueAt || a.updatedAt || a.createdAt || 0) - new Date(b.dueAt || b.updatedAt || b.createdAt || 0) ||
          String(a.word || "").localeCompare(String(b.word || ""), "tr");
      });
      const nonRepeats = sorted.filter(item => !previousIds.has(item.id));
      const source = nonRepeats.length >= Math.min(3, hardWords.length) ? nonRepeats : sorted;
      const selected = source.slice(0, Math.min(3, hardWords.length));
      selected.forEach(item => { shownAt[item.id] = date; });
      saveJson(STORAGE_DAILY_HARD_WORDS, {
        date,
        wordIds: selected.map(item => item.id),
        completedIds: [],
        shownAt,
      });
      return selected;
    }

    function backupPayload() {
      return {
        app: "YDS Çalışma",
        owner: "Hakan Erdoğan",
        version: 1,
        exportedAt: new Date().toISOString(),
        data: {
          uploadedBank,
          wordbook,
          articles,
          wrongQuestionIds,
          preferences: {
            theme: localStorage.getItem(STORAGE_THEME) || "light",
            wordSessionSize,
            wordCustomSessionSize,
          },
        },
      };
    }

    function downloadBackupJson() {
      const payload = backupPayload();
      const fileName = "yds-calisma-yedek-" + new Date().toISOString().slice(0, 10) + ".json";
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = fileName;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
      const status = document.getElementById("backupStatus");
      if (status) status.textContent = "Yedek dosyası hazırlandı: " + fileName;
    }

    function normalizeBackupPayload(payload) {
      const data = payload?.data || payload || {};
      return {
        uploadedBank: data.uploadedBank || data.uploads || { documents: [], questions: [] },
        wordbook: Array.isArray(data.wordbook) ? data.wordbook : [],
        articles: Array.isArray(data.articles) ? data.articles : [],
        wrongQuestionIds: Array.isArray(data.wrongQuestionIds) ? data.wrongQuestionIds : [],
        preferences: data.preferences || {},
      };
    }

    function restoreBackupPayload(payload) {
      const normalized = normalizeBackupPayload(payload);
      const confirmed = window.confirm("Bu yedek mevcut PDF, kelime, makale ve yanlış soru verilerinin üzerine yazacak. Devam edilsin mi?");
      if (!confirmed) return;
      uploadedBank = normalized.uploadedBank;
      wordbook = normalized.wordbook;
      articles = normalized.articles;
      wrongQuestionIds = normalized.wrongQuestionIds;
      if (normalized.preferences.theme) localStorage.setItem(STORAGE_THEME, normalized.preferences.theme);
      if (normalized.preferences.wordSessionSize) {
        wordSessionSize = normalized.preferences.wordSessionSize;
        localStorage.setItem("yds-word-session-size-v1", String(wordSessionSize));
      }
      if (normalized.preferences.wordCustomSessionSize) {
        wordCustomSessionSize = Number(normalized.preferences.wordCustomSessionSize) || 20;
        localStorage.setItem("yds-word-custom-session-size-v1", String(wordCustomSessionSize));
      }
      saveJson(STORAGE_UPLOADS, uploadedBank);
      saveJson(STORAGE_WORDS, wordbook);
      saveJson(STORAGE_ARTICLES, articles);
      saveWrongQuestions();
      rebuildBank();
      applyTheme(initialThemePreference());
      activeDocumentId = documents[0]?.id || "";
      activeArticleId = articles[0]?.id || "";
      currentIndex = 0;
      answered = false;
      solveMode = "document";
      wrongReviewIds = [];
      renderSettingsPage("Yedek başarıyla geri yüklendi.");
    }

      return String(value || "").trim().replace(/\/+$/, "");

      };

    function supabaseStatus(message, tone = "info") {
      const status = document.getElementById("supabaseStatus");
      if (!status) return;
      const toneClass = tone === "error"
        ? "border-red-200 bg-red-50 text-red-700"
        : tone === "success"
          ? "border-emerald-200 bg-emerald-50 text-emerald-700"
          : "border-slate-200 bg-slate-50 text-slate-600";
      status.className = "mt-4 rounded-xl border p-3 text-sm font-semibold " + toneClass;
      status.textContent = message;
    }

    function validateSupabaseConfig(config) {
      if (!config.url || !config.anonKey || !config.syncId) {
        throw new Error("Supabase URL, anon public key ve eşitleme kodu birlikte doldurulmalı.");
      }
      if (!/^https:\/\/.+\.supabase\.co$/i.test(config.url)) {
        throw new Error("Supabase URL şu biçimde olmalı: https://proje-ref.supabase.co");
      }
      if (config.syncId.length < 8) {
        throw new Error("Eşitleme kodu en az 8 karakter olmalı. Bunu küçük bir parola gibi düşün.");
      }
      return config;
    }

    function supabaseHeaders(config, extra = {}) {
      return {
        apikey: config.anonKey,
        Authorization: "Bearer " + config.anonKey,
        "Content-Type": "application/json",
        ...extra,
      };
    }

    async function testSupabaseConnection() {
      try {
        const config = validateSupabaseConfig(currentSupabaseFormConfig());
        supabaseStatus("Bağlantı test ediliyor...");
        const response = await fetch(config.url + "/rest/v1/yds_cloud_backups?select=sync_id&limit=1", {
          headers: supabaseHeaders(config),
        });
        if (!response.ok) throw new Error(await response.text() || "Supabase bağlantısı başarısız.");
        supabaseStatus("Bağlantı başarılı. Artık buluta yedek alabilirsin.", "success");
      } catch (error) {
        supabaseStatus(error.message || "Bağlantı test edilemedi.", "error");
      }
    }

    async function uploadSupabaseBackup() {
      try {
        const config = validateSupabaseConfig(currentSupabaseFormConfig());
        supabaseStatus("Veriler buluta yedekleniyor...");
        const response = await fetch(config.url + "/rest/v1/yds_cloud_backups?on_conflict=sync_id", {
          method: "POST",
          headers: supabaseHeaders(config, { Prefer: "resolution=merge-duplicates,return=representation" }),
          body: JSON.stringify([{
            sync_id: config.syncId,
            payload: backupPayload(),
            updated_at: new Date().toISOString(),
          }]),
        });
        if (!response.ok) throw new Error(await response.text() || "Buluta yedek alınamadı.");
        supabaseStatus("Bulut yedeği güncellendi.", "success");
      } catch (error) {
        supabaseStatus(error.message || "Buluta yedek alınamadı.", "error");
      }
    }

    async function restoreSupabaseBackup() {
      try {
        const config = validateSupabaseConfig(currentSupabaseFormConfig());
        supabaseStatus("Bulut yedeği okunuyor...");
        const response = await fetch(config.url + "/rest/v1/yds_cloud_backups?sync_id=eq." + encodeURIComponent(config.syncId) + "&select=payload,updated_at&limit=1", {
          headers: supabaseHeaders(config),
        });
        if (!response.ok) throw new Error(await response.text() || "Bulut yedeği okunamadı.");
        const rows = await response.json();
        if (!rows.length || !rows[0].payload) throw new Error("Bu eşitleme koduyla kayıtlı bulut yedeği bulunamadı.");
        restoreBackupPayload(rows[0].payload);
      } catch (error) {
        supabaseStatus(error.message || "Bulut yedeği geri yüklenemedi.", "error");
      }
    }

    function wordStatus(item) {
      const dueAt = item?.dueAt ? new Date(item.dueAt).getTime() : null;
      if (item?.needsReview || item?.lastRating === "again" || item?.lastRating === "hard" || (dueAt && dueAt <= Date.now())) return { key: "review", label: "Zor", className: "border-amber-200 bg-amber-50 text-amber-800" };
      const seen = Number(item?.seen || 0);
      if (seen >= 2) return { key: "learned", label: "Öğrenildi", className: "border-emerald-200 bg-emerald-50 text-emerald-800" };
      if (seen === 1) return { key: "learning", label: "Öğreniliyor", className: "border-blue-200 bg-blue-50 text-blue-800" };
      return { key: "new", label: "Yeni", className: "border-slate-200 bg-slate-100 text-slate-700" };
    }

      return { learned, learning, fresh, dailyTarget: activeWordSessionSize(studyWords().length) };

    function clickableQuestionText(text, vocabulary = null) {
      const parts = String(text || "").split(/([A-Za-z][A-Za-z'’-]*)/g);
      return parts.map(part => {
        if (/^[A-Za-z][A-Za-z'’-]*$/.test(part)) {
          const word = normalizeWord(part);
          const found = vocabulary && vocabulary[normalizeLookup(word)];
          return '<button type="button" class="word-token" data-word="' + escapeHtml(word) + '"' + (found ? ' data-vocab-key="' + escapeHtml(normalizeLookup(word)) + '"' : '') + (found?.isInWordbook ? ' data-added-word="true"' : '') + '>' + escapeHtml(part) + '</button>';
        }
        return escapeHtml(part);
      }).join("");
    }

    function normalizeArticleTextForReading(text) {
      const rawLines = String(text || "")
        .replace(/\r\n?/g, "\n")
        .replace(/\u00a0/g, " ")
        .replace(/[“”]/g, '"')
        .replace(/[‘’]/g, "'")
        .replace(/[–—]/g, "-")
        .split(/\n/);
      const paragraphs = [];
      let current = "";
      rawLines.forEach(rawLine => {
        const line = rawLine
          .replace(/[ \t]+/g, " ")
          .replace(/\s+([,.!?;:])/g, "$1")
          .replace(/([([{])\s+/g, "$1")
          .replace(/\s+([)\]}])/g, "$1")
          .trim();
        if (!line) {
          if (current) {
            paragraphs.push(current.trim());
            current = "";
          }
          return;
        }
        const startsNewQuote = /^["'“‘]/.test(line);
        const shouldContinue = current && !/[.!?]"?$/.test(current) && !startsNewQuote;
        if (shouldContinue) current += " " + line;
        else {
          if (current) paragraphs.push(current.trim());
          current = line;
        }
      });
      if (current) paragraphs.push(current.trim());
      return paragraphs
        .map(paragraph => paragraph.replace(/\s{2,}/g, " ").trim())
        .filter(Boolean)
        .join("\n\n");
    }

    function articleDisplayTitle(article) {
      const rawTitle = String(article?.title || "").replace(/\.pdf$/i, "").replace(/_/g, " ").trim();
      if ((!rawTitle || /^Yeni Makale$/i.test(rawTitle)) && /pigeons?/i.test(article?.text || "")) return "Pigeons";
      return rawTitle || "Makale";
    }

    function articleWordCount(text) {
      const matches = String(text || "").match(/[A-Za-zÇĞİÖŞÜçğıöşü][A-Za-zÇĞİÖŞÜçğıöşü'’-]*/g);
      return matches ? matches.length : 0;
    }

    function articleReadMinutes(text) {
      const count = articleWordCount(text);
      return count ? Math.max(1, Math.round(count / 180)) : 0;
    }

    function articleReadingStatus(article) {
      if (article?.status === "completed" || Number(article?.readingProgress || 0) >= 98) return { key: "completed", label: "Tamamlandı" };
      return { key: "new", label: "Yeni" };
    }

    function articleAddedWordCount(article) {
      const titleKey = normalizeLookup(articleDisplayTitle(article));
      return wordbook.filter(item =>
        item.articleId === article?.id ||
        item.questionId === article?.id ||
        normalizeLookup(item.source || "") === titleKey ||
        normalizeLookup(item.sourceArticle || "") === titleKey
      ).length;
    }

    function articleMetadataHtml(article) {
      const parts = [];
      const minutes = articleReadMinutes(article?.text || "");
      const added = articleAddedWordCount(article);
      if (minutes) parts.push(minutes + " dk okuma");
      if (added) parts.push("Deftere eklenen: " + added + " kelime");
      return parts.length ? '<div class="mt-2 flex flex-wrap gap-2 text-sm font-semibold" style="color: var(--text-secondary)">' + parts.map(item => '<span class="rounded-full border px-3 py-1" style="border-color: var(--border-color); background: var(--bg-surface-secondary); color: var(--text-secondary)">' + escapeHtml(item) + '</span>').join("") + '</div>' : "";
    }

    function sortedFilteredArticles() {
      return [...articles].sort((a, b) => {
        const aDone = articleReadingStatus(a).key === "completed" ? 1 : 0;
        const bDone = articleReadingStatus(b).key === "completed" ? 1 : 0;
        if (aDone !== bDone) return aDone - bDone;
        return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
      });
    }

    function inferWordType(word) {
      const clean = normalizeLookup(word);
      if (/ly$/.test(clean)) return "Zarf";
      if (/(tion|ment|ness|ity|ship|ance|ence)$/.test(clean)) return "İsim";
      if (/(ive|ous|al|ic|able|ible|less|ful)$/.test(clean)) return "Sıfat";
      if (/(ate|ify|ise|ize|en)$/.test(clean)) return "Fiil";
      return "Kelime";
    }

    function renderArticleParagraphs(text, vocabulary = null) {
      const normalized = normalizeArticleTextForReading(text);
      const paragraphs = normalized
        .split(/\n{2,}/)
        .map(paragraph => paragraph.trim())
        .filter(Boolean);
      return (paragraphs.length ? paragraphs : [normalized]).map(paragraph =>
        '<p>' + clickableQuestionText(paragraph, vocabulary) + '</p>'
      ).join("");
    }

    function paintButton(button, type) {
      button.removeAttribute("style");
      if (type === "correct") {
        button.className = "option-btn flex w-full items-start gap-3 rounded-2xl border border-emerald-600 bg-emerald-50 p-3.5 text-left text-emerald-950";
        button.querySelector(".option-letter").className = "option-letter flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-emerald-600 font-bold text-white";
      }
      if (type === "wrong") {
        button.className = "option-btn flex w-full items-start gap-3 rounded-2xl border border-red-500 bg-red-50 p-3.5 text-left text-red-950";
        button.querySelector(".option-letter").className = "option-letter flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-red-600 font-bold text-white";
      }
      if (type === "manual") {
        button.className = "option-btn flex w-full items-start gap-3 rounded-2xl border border-blue-500 bg-blue-50 p-3.5 text-left text-blue-950";
        button.querySelector(".option-letter").className = "option-letter flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-blue-600 font-bold text-white";
      }
    }

    function checkAnswer(selectedButton, question) {
      if (answered) return;
      answered = true;
      const selectedKey = selectedButton.dataset.key;
      const optionButtons = document.querySelectorAll(".option-btn");
      const feedbackArea = document.getElementById("feedbackArea");

      optionButtons.forEach(button => {
        button.setAttribute("aria-disabled", "true");
        button.classList.remove("hover:border-blue-500", "hover:bg-slate-800", "hover:shadow-lg");
      });

      if (!question.correctAnswer) {
        paintButton(selectedButton, "manual");
        feedbackArea.innerHTML =
          '<div class="rounded-2xl border border-blue-200 bg-blue-50 p-4 font-semibold text-blue-950">Bu yüklenen PDF için cevap anahtarı yok. Seçimin işaretlendi; skor değişmedi.</div>';
      } else if (selectedKey === question.correctAnswer) {
        stats.correct++;
        if (solveMode === "wrong") removeWrongQuestion(question.id);
        paintButton(selectedButton, "correct");
        feedbackArea.innerHTML =
          '<div class="rounded-2xl border border-emerald-200 bg-emerald-50 p-4 font-semibold text-emerald-950">Doğru cevap.' + (solveMode === "wrong" ? ' Bu soru yanlış havuzundan çıkarıldı.' : '') + '</div>';
      } else {
        stats.wrong++;
        addWrongQuestion(question.id);
        paintButton(selectedButton, "wrong");
        optionButtons.forEach(button => {
          if (button.dataset.key === question.correctAnswer) paintButton(button, "correct");
        });
        feedbackArea.innerHTML =
          '<div class="rounded-2xl border border-red-200 bg-red-50 p-4 font-semibold text-red-950">Yanlış cevap. Doğru seçenek yeşil olarak gösterildi.</div>';
      }

      renderStats();
      renderMenu();
    }

    function nextButtonHtml() {
      const questions = getCategoryQuestions();
      const label = currentIndex + 1 >= questions.length ? "Bölümü Bitir" : "Sonraki Soru";
      return '<button id="nextQuestionBtn" class="rounded-2xl bg-blue-600 px-6 py-3 font-semibold text-white shadow-lg shadow-blue-950/40 transition hover:bg-blue-500">' + label + '</button>';
    }

    function bindNextQuestionButton() {
      const nextButton = document.getElementById("nextQuestionBtn");
      if (!nextButton) return;
      nextButton.addEventListener("click", () => {
        currentIndex++;
        renderQuestion();
      });
    }

    function renderFinishScreen() {
      const documentInfo = solveMode === "wrong" ? { title: "Yanlış Sorular" } : activeDocument();
      const total = stats.correct + stats.wrong;
      const rate = total === 0 ? 0 : Math.round((stats.correct / total) * 100);
      appArea.innerHTML =
        '<div class="rounded-3xl border border-slate-800 bg-slate-900/80 p-10 text-center shadow-2xl shadow-black/30">' +
          '<div class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-2xl bg-emerald-500/20 text-3xl">✓</div>' +
          '<h3 class="text-3xl font-bold text-white">Tebrikler, bu bölümü tamamladınız!</h3>' +
          '<p class="mt-3 text-slate-400">' + escapeHtml(documentInfo.title) + ' bölümündeki ' + getCategoryQuestions().length + ' soru tamamlandı.</p>' +
          '<div class="mt-8 grid gap-4 md:grid-cols-3">' +
            '<div class="rounded-2xl bg-slate-800 p-5"><p class="text-sm text-slate-400">Doğru</p><p class="mt-1 text-3xl font-bold text-emerald-400">' + stats.correct + '</p></div>' +
            '<div class="rounded-2xl bg-slate-800 p-5"><p class="text-sm text-slate-400">Yanlış</p><p class="mt-1 text-3xl font-bold text-red-400">' + stats.wrong + '</p></div>' +
            '<div class="rounded-2xl bg-slate-800 p-5"><p class="text-sm text-slate-400">Başarı Oranı</p><p class="mt-1 text-3xl font-bold text-blue-400">%' + rate + '</p></div>' +
          '</div>' +
          '<button onclick="restartCategory()" class="mt-8 rounded-2xl bg-blue-600 px-6 py-3 font-semibold text-white shadow-lg shadow-blue-950/40 transition hover:bg-blue-500">Bu Bölümü Tekrar Çöz</button>' +
        '</div>';
    }

    function restartCategory() {
      currentIndex = 0;
      answered = false;
      renderQuestion();
    }

    function openWordModal(word, question, suggested = null) {
      pendingWord = { word: normalizeWord(word), questionId: question?.id || null };
      const existing = wordbook.find(item => item.word.toLowerCase() === pendingWord.word.toLowerCase());
      wordModalTitle.textContent = pendingWord.word || "Yeni kelime";
      wordInput.value = existing?.word || pendingWord.word;
      turkishInput.value = existing?.turkish || existing?.meaning || suggested?.turkish || "";
      meaningInput.value = existing?.meaningNote || suggested?.meaningNote || "";
      exampleInput.value = wordExample(existing) || suggested?.example || suggested?.exampleSentence || suggested?.sentence || (Array.isArray(suggested?.examples) ? suggested.examples[0] : "") || "";
      wordModal.classList.remove("hidden");
      wordModal.classList.add("flex");
      turkishInput.focus();
    }

    function openBlankWordModal() {
      openWordModal("", null);
      wordModalTitle.textContent = "Yeni kelime";
      wordInput.focus();
    }

    function closeWordModal() {
      wordModal.classList.add("hidden");
      wordModal.classList.remove("flex");
      pendingWord = null;
    }

    function saveWord() {
      const word = normalizeWord(wordInput.value);
      const turkish = turkishInput.value.trim();
      const meaningNote = meaningInput.value.trim();
      const example = exampleInput.value.trim();
      if (!word || !turkish) return;
      const existingIndex = wordbook.findIndex(item => item.word.toLowerCase() === word.toLowerCase());
      const existing = existingIndex >= 0 ? wordbook[existingIndex] : null;
      const record = {
        ...(existing || {}),
        id: existing ? existing.id : "word-" + Date.now(),
        word,
        turkish,
        meaning: turkish,
        meaningNote,
        example,
        questionId: pendingWord?.questionId || existing?.questionId || null,
        createdAt: existing ? existing.createdAt : new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        seen: existing ? existing.seen || 0 : 0,
        needsReview: existing ? !!existing.needsReview : false,
      };
      if (existingIndex >= 0) wordbook[existingIndex] = record;
      else wordbook.unshift(record);
      saveJson(STORAGE_WORDS, wordbook);
      closeWordModal();
      renderStats();
      if (activeView === "words") renderWordbook();
      if (activeView === "study") renderWordStudy();
    }

    function wordTurkish(item) {
      return item?.turkish || item?.meaning || "";
    }

    function wordMeaningNote(item) {
      return item?.meaningNote || "";
    }

    function wordPartOfSpeech(item) {
      const value = String(item?.category || item?.source || "").toLowerCase();
      if (value.includes("fiil") || value.includes("verb")) return "Fiil";
      if (value.includes("sıfat") || value.includes("sifat") || value.includes("adjective")) return "Sıfat";
      if (value.includes("bağlaç") || value.includes("baglac") || value.includes("conjunction")) return "Bağlaç";
      if (value.includes("preposition") || value.includes("edat")) return "Edat";
      return "Kelime";
    }

    function wordExample(item) {
      return item?.example || item?.exampleSentence || item?.sentence || "";
    }

    function wordTabsHtml(activeTab, showAddButton = true) {
      const tabClass = tab =>
        activeTab === tab
          ? "rounded-xl bg-blue-600 px-4 py-2 text-sm font-bold text-white shadow-lg shadow-blue-200"
          : "rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-50";
      return '<div class="mb-3 rounded-2xl border border-slate-200 bg-white p-3 shadow-sm">' +
        '<div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">' +
          '<div class="flex flex-wrap gap-2">' +
            '<button class="word-tab-btn ' + tabClass("list") + '" data-tab="list">Kelime Defteri</button>' +
            '<button class="word-tab-btn ' + tabClass("cards") + '" data-tab="cards">Kart Çalışması</button>' +
            '<button class="word-tab-btn ' + tabClass("quiz") + '" data-tab="quiz">Çoktan Seçmeli</button>' +

        '</div>' +

      document.querySelectorAll(".word-tab-btn").forEach(button => {
        button.addEventListener("click", () => {

          else {
            startWordStudy(button.dataset.tab === "quiz" ? "quiz" : "cards", true);
          }
        });
      });
      const addButton = document.getElementById("wordPrimaryAddBtn");
      if (addButton) addButton.addEventListener("click", openBlankWordModal);
    }

    function startWordStudy(mode = "cards", fresh = false) {
      wordStudyMode = mode === "quiz" ? "quiz" : "cards";
      wordStudyIndex = 0;
      wordCardRevealed = false;
      wordQuizQuestion = null;
      if (wordStudyMode === "quiz") resetWordQuizSessionResults();
      if (fresh) buildWordSession(true, wordStudyMode);
      setView("study");
    }

    function filteredWordbook() {
      let items = [...wordbook];
      const query = normalizeLookup(wordSearchQuery);
      if (query) {
        items = items.filter(item =>
          normalizeLookup(item.word).includes(query) ||
          normalizeLookup(wordTurkish(item)).includes(query) ||
          normalizeLookup(wordMeaningNote(item)).includes(query)
        );
      }
      if (wordStatusFilter !== "all") {
        items = items.filter(item => wordStatus(item).key === wordStatusFilter);
      }
      items.sort((a, b) => {
        if (wordSortMode === "shuffle") return Math.random() - 0.5;
        if (wordSortMode === "za") return String(b.word || "").localeCompare(String(a.word || ""), "tr");
        if (wordSortMode === "created") return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
        if (wordSortMode === "review") return new Date(a.updatedAt || 0) - new Date(b.updatedAt || 0);
        return String(a.word || "").localeCompare(String(b.word || ""), "tr");
      });
      return items;
    }

      renderMenu();
      renderStats();
      if (!wordbook.length) {
        appArea.innerHTML =
          wordTabsHtml("list") +

          '</div>';

            '<label class="sr-only" for="wordSearchInput">Kelime ara</label>' +
            '<input id="wordSearchInput" class="h-11 rounded-xl border border-slate-200 bg-slate-50 px-3 text-sm font-semibold text-slate-800 outline-none placeholder:text-slate-400 focus:border-blue-500 focus:bg-white" placeholder="Kelime ara..." value="' + escapeHtml(wordSearchQuery) + '" />' +

              '<option value="new"' + (wordStatusFilter === "new" ? " selected" : "") + '>Yeni</option>' +
              '<option value="learning"' + (wordStatusFilter === "learning" ? " selected" : "") + '>Öğreniliyor</option>' +
              '<option value="learned"' + (wordStatusFilter === "learned" ? " selected" : "") + '>Bildiklerim</option>' +
              '<option value="review"' + (wordStatusFilter === "review" ? " selected" : "") + '>Tekrar Edilecekler</option>' +
            '</select>' +

              '<option value="az"' + (wordSortMode === "az" ? " selected" : "") + '>A-Z</option>' +
              '<option value="za"' + (wordSortMode === "za" ? " selected" : "") + '>Z-A</option>' +
              '<option value="created"' + (wordSortMode === "created" ? " selected" : "") + '>Son Eklenen</option>' +

            '</select>' +
            '<button id="shuffleWordsBtn" class="h-11 rounded-xl border border-slate-200 bg-white px-3 text-sm font-bold text-slate-700 hover:bg-slate-50">Karıştır</button>' +
            '<button id="startWordStudyBtn" ' + (canStudy ? "" : "disabled ") + 'class="h-11 rounded-xl bg-blue-600 px-3 text-sm font-black text-white shadow-lg shadow-blue-200 hover:bg-blue-500 disabled:bg-slate-300 disabled:text-slate-500 disabled:shadow-none">Çalışmaya Başla</button>' +
          '</div>' +
          '<p class="mt-2 text-xs font-bold text-slate-500">' + visibleWords.length + ' kelime gösteriliyor</p>' +

                  '<button class="word-menu-toggle flex h-9 w-9 items-center justify-center rounded-xl border border-slate-200 bg-slate-50 text-xl font-black text-slate-500 hover:bg-white" aria-label="' + escapeHtml(item.word) + ' işlemleri" data-id="' + escapeHtml(item.id) + '">⋯</button>' +
                  '<div class="word-action-menu absolute right-0 top-10 z-10 min-w-32 rounded-xl border border-slate-200 bg-white p-1 shadow-xl shadow-slate-200">' +
                    '<button class="edit-word block w-full rounded-lg px-3 py-2 text-left text-sm font-bold text-slate-700 hover:bg-slate-50" data-id="' + escapeHtml(item.id) + '">Düzenle</button>' +
                    '<button class="delete-word block w-full rounded-lg px-3 py-2 text-left text-sm font-bold text-red-700 hover:bg-red-50" data-id="' + escapeHtml(item.id) + '">Sil</button>' +

              '<button class="show-meaning mt-3 w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-left text-sm font-bold text-blue-700 hover:bg-blue-50" data-id="' + escapeHtml(item.id) + '">Anlamı Göster</button>' +
              '<div class="meaning mt-3 hidden grid gap-2">' +
                '<div class="rounded-xl border border-blue-200 bg-blue-50 p-3">' +
                  '<span class="inline-flex rounded-lg bg-blue-600 px-2.5 py-1 text-[11px] font-black uppercase tracking-wide text-white">TÜRKÇE</span>' +
                  '<p class="mt-1 text-sm font-black text-blue-950">' + escapeHtml(wordTurkish(item)) + '</p>' +
                '</div>' +
                (wordMeaningNote(item) ? '<div class="rounded-xl border border-slate-200 bg-white p-3"><span class="inline-flex rounded-lg bg-blue-600 px-2.5 py-1 text-[11px] font-black uppercase tracking-wide text-white">YAKIN ANLAM</span><p class="mt-2 text-sm font-semibold text-slate-800">' + escapeHtml(wordMeaningNote(item)) + '</p></div>' : '') +
                (wordExample(item) ? '<div class="rounded-xl border border-slate-200 bg-white p-3"><span class="inline-flex rounded-lg bg-blue-600 px-2.5 py-1 text-[11px] font-black uppercase tracking-wide text-white">ÖRNEK CÜMLE</span><p class="mt-2 text-sm font-semibold leading-relaxed text-slate-700">' + escapeHtml(wordExample(item)) + '</p></div>' : '') +
              '</div>' +
            '</article>';
          }).join("") +
        '</div>' : '<div class="rounded-2xl border border-dashed border-slate-300 bg-white p-8 text-center text-slate-500"><p class="font-bold">Bu filtreye uygun kelime bulunamadı.</p></div>');

        });

          event.stopPropagation();
          const card = button.closest(".word-card");
          toggleWordMeaning(card);
        });
      });

          document.querySelectorAll(".word-action-menu.is-open").forEach(menu => {
            if (menu !== button.nextElementSibling) menu.classList.remove("is-open");
          });
          button.nextElementSibling.classList.toggle("is-open");
        });
      });
      document.querySelectorAll(".edit-word").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          const item = wordbook.find(word => word.id === button.dataset.id);
          if (item) openWordModal(item.word, { id: item.questionId || null });
        });
      });
      document.querySelectorAll(".delete-word").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          wordbook = wordbook.filter(item => item.id !== button.dataset.id);
          saveJson(STORAGE_WORDS, wordbook);
          renderWordbook();
        });
      });
      document.getElementById("shuffleWordsBtn").addEventListener("click", () => {
        wordSortMode = "shuffle";
        renderWordbook();
      });
    }

    function toggleWordMeaning(card) {
      const meaning = card.querySelector(".meaning");
      const button = card.querySelector(".show-meaning");
      meaning.classList.toggle("hidden");
      if (button) button.textContent = meaning.classList.contains("hidden") ? "Anlamı Göster" : "Anlamı Gizle";
    }

    function shuffleArray(items) {
      return [...items].sort(() => Math.random() - 0.5);
    }

    function wordPracticeWords() {
      return wordbook.filter(item => item.word && wordTurkish(item));
    }

    function isWordDueForStudy(item) {
      if (!item?.dueAt) return true;
      if (item?.needsReview) return true;
      const dueTime = new Date(item.dueAt).getTime();
      if (!Number.isFinite(dueTime)) return true;
      return dueTime <= Date.now();
    }

    function studyWords() {
      return wordPracticeWords().filter(isWordDueForStudy);
    }

    function dueRank(item) {
      const status = wordStatus(item).key;
      if (status === "review") return 0;
      if (status === "new") return 1;
      if (status === "learning") return 2;
      return 3;
    }

    function allStudyWords() {
      return studyWords().sort((a, b) =>
        dueRank(a) - dueRank(b) ||
        new Date(a.dueAt || a.updatedAt || a.createdAt || 0) - new Date(b.dueAt || b.updatedAt || b.createdAt || 0) ||
        String(a.word || "").localeCompare(String(b.word || ""), "tr")
      );
    }

    function sessionSizeValue() {
      if (wordSessionSize === "custom") return Math.max(1, Math.min(200, Number(wordCustomSessionSize) || 20));
      return Math.max(1, Number(wordSessionSize) || 20);
    }

    function activeWordSessionSize(poolLength = allStudyWords().length) {
      if (!poolLength) return 0;
      return Math.max(1, Math.min(sessionSizeValue(), poolLength));
    }

    function wordSessionLimitMessage(poolLength = allStudyWords().length) {
      return sessionSizeValue() > poolLength && poolLength > 0
        ? "Havuzda yalnızca " + poolLength + " uygun kelime bulundu."
        : "";
    }

    function wordSessionOptionsHtml(poolLength) {
      const activeSize = activeWordSessionSize(poolLength);
      const options = [10, 20, 30].filter(size => size <= poolLength);
      if (activeSize && !options.includes(activeSize)) options.unshift(activeSize);
      return options.map(size =>
        '<option value="' + size + '"' + (String(wordSessionSize) !== "custom" && activeSize === size ? " selected" : "") + '>' + size + (wordStudyMode === "quiz" ? " soru" : "") + '</option>'
      ).join("") +
      '<option value="custom"' + (String(wordSessionSize) === "custom" ? " selected" : "") + '>Özel</option>';
    }

    function buildWordSession(force = false, mode = wordStudyMode) {
      const orderedPool = allStudyWords();
      const pool = force ? shuffleArray(orderedPool) : orderedPool;
      const poolIds = new Set(pool.map(item => item.id));
      const size = activeWordSessionSize(pool.length);
      const validIds = wordSessionIds.filter(id => poolIds.has(id));
      const targetLength = Math.min(size, pool.length);
      if (!force && validIds.length === targetLength) {
        wordSessionIds = validIds.slice(0, size);
      } else {
        wordSessionIds = pool.slice(0, size).map(item => item.id);
      }
      if (wordSessionIds.length > size) wordSessionIds = wordSessionIds.slice(0, size);
      saveJson("yds-word-session-ids-v1", wordSessionIds);
      keepWordStudyIndexInRange(currentSessionWords());
    }

    function resetWordQuizSessionResults() {
      wordQuizSessionResults = {};
      saveJson("yds-word-quiz-session-results-v1", wordQuizSessionResults);
    }

    function recordWordQuizResult(wordId, correct) {
      if (!wordId) return;
      wordQuizSessionResults[wordId] = {
        correct: !!correct,
        markedHard: !correct,
        answeredAt: new Date().toISOString(),
      };
      saveJson("yds-word-quiz-session-results-v1", wordQuizSessionResults);
    }

    function wordQuizSessionSummary(words) {
      const answered = words.map(item => wordQuizSessionResults[item.id]).filter(Boolean);
      const correct = answered.filter(item => item.correct).length;
      const wrong = answered.filter(item => !item.correct).length;
      const hard = answered.filter(item => item.markedHard).length;
      const rate = answered.length ? Math.round((correct / answered.length) * 100) : 0;
      return { answered: answered.length, correct, wrong, hard, rate };
    }

    function currentSessionWords() {
      const byId = new Map(wordPracticeWords().map(item => [item.id, item]));
      const selected = wordSessionIds.map(id => byId.get(id)).filter(Boolean);
      return selected.length ? selected : allStudyWords().slice(0, activeWordSessionSize());
    }

    function nextReviewText(minutes) {
      if (minutes < 60) return minutes + " dk sonra";
      if (minutes < 1440) return Math.round(minutes / 60) + " saat sonra";
      return Math.round(minutes / 1440) + " gün sonra";
    }

    const srsOptions = [
      { key: "easy", label: "Kolay", minutes: 10080, className: "border-emerald-200 bg-emerald-50 text-emerald-800 hover:bg-emerald-100" },
      { key: "good", label: "Orta", minutes: 4320, className: "border-blue-200 bg-blue-50 text-blue-800 hover:bg-blue-100" },
      { key: "hard", label: "Zor", minutes: 1440, className: "border-amber-300 bg-amber-50 text-amber-900 hover:bg-amber-100" },
    ];

    function applySrsRating(id, rating) {
      const option = srsOptions.find(item => item.key === rating) || srsOptions[1];
      const item = wordbook.find(word => word.id === id);
      if (!item) return;
      item.seen = (item.seen || 0) + 1;
      item.lastRating = rating;
      item.needsReview = false;
      item.dueAt = new Date(Date.now() + option.minutes * 60000).toISOString();
      item.updatedAt = new Date().toISOString();
      saveJson(STORAGE_WORDS, wordbook);
    }

    function keepWordStudyIndexInRange(words) {
      if (!words.length) {
        wordStudyIndex = 0;
        return;
      }
      if (wordStudyIndex < 0) wordStudyIndex = words.length - 1;
      if (wordStudyIndex >= words.length) wordStudyIndex = 0;
    }

    function markWordSeenById(id, options = {}) {
      const item = wordbook.find(word => word.id === id);
      if (item) {
        item.seen = (item.seen || 0) + 1;
        if ("needsReview" in options) item.needsReview = !!options.needsReview;
        item.updatedAt = new Date().toISOString();
        saveJson(STORAGE_WORDS, wordbook);
      }
    }

    function renderStudyEmpty(message) {
      appArea.innerHTML =
        wordTabsHtml(wordStudyMode === "quiz" ? "quiz" : "cards", false) +

          '<h3 class="text-2xl font-bold text-slate-950">' + escapeHtml(message) + '</h3>' +

      let words = currentSessionWords();

    function buildWordQuizQuestion(words) {
      const target = words[wordStudyIndex];
      const targetPart = wordPartOfSpeech(target);
      const samePart = wordbook.filter(item => item.id !== target.id && wordTurkish(item) && wordPartOfSpeech(item) === targetPart);
      const closeLevel = samePart.filter(item => Math.abs((Number(item.seen || 0)) - (Number(target.seen || 0))) <= 2);
      const distractorPool = closeLevel.length >= 3 ? closeLevel : samePart.length >= 3 ? samePart : wordbook.filter(item => item.id !== target.id && wordTurkish(item));
      const distractors = shuffleArray(distractorPool).slice(0, 3);
      const choices = shuffleArray([target, ...distractors]).map(item => ({
        id: item.id,
        label: wordTurkish(item),
        part: wordPartOfSpeech(item),
      }));
      wordQuizQuestion = {
        targetId: target.id,
        selectedId: null,
        checked: false,
        choices,
      };
    }

      studyArea.innerHTML =

          '<div class="mt-5 grid gap-3">' +
            wordQuizQuestion.choices.map((choice, index) => {

              const stateClass = !wordQuizQuestion.checked
                ? "border-slate-200 bg-white text-slate-800 hover:border-blue-300 hover:bg-blue-50"
                : isCorrect
                  ? "border-emerald-600 bg-emerald-50 text-emerald-950"
                  : isSelected
                    ? "border-red-500 bg-red-50 text-red-950"
                    : "border-slate-200 bg-slate-50 text-slate-800";
              const stateIcon = wordQuizQuestion.checked && isCorrect ? "✓" : wordQuizQuestion.checked && isSelected ? "×" : "";
              return '<button class="quiz-choice rounded-2xl border p-4 text-left text-base font-bold transition ' + stateClass + '" data-id="' + escapeHtml(choice.id) + '">' +
                '<span class="mr-2 inline-flex h-7 w-7 items-center justify-center rounded-lg bg-slate-100 text-sm font-black text-blue-700">' + String.fromCharCode(65 + index) + '</span>' +
                '<span>' + escapeHtml(choice.label) + '</span>' +
                (stateIcon ? '<span class="ml-3 inline-flex h-7 w-7 items-center justify-center rounded-full ' + (isCorrect ? 'bg-emerald-600 text-white' : 'bg-red-600 text-white') + '">' + stateIcon + '</span>' : '') +

          renderStats();
          renderWordStudy();
        });

    function articleVocabularyMap(article) {
      const map = {};
      (article?.vocabulary || []).forEach(item => {
        if (item.word) map[normalizeLookup(item.word)] = item;
      });
      wordbook.forEach(item => {
        const key = normalizeLookup(item.word);
        if (!key) return;
        map[key] = { ...(map[key] || {}), ...item, isInWordbook: true };
      });
      return map;
    }

    function splitArticleSections(text) {
      const normalizedText = String(text || "")
        .replace(/\r\n?/g, "\n")
        .replace(/\u00a0/g, " ")
        .replace(/[“”]/g, '"')
        .replace(/[‘’]/g, "'")
        .replace(/[–—]/g, "-");
      const lines = normalizedText.split(/\n+/).map(line => line
        .replace(/[ \t]+/g, " ")
        .replace(/\s+([,.!?;:])/g, "$1")
        .trim()
      ).filter(Boolean);
      const vocabulary = [];
      const mainLines = [];
      let inVocabulary = false;
      let current = null;

      lines.forEach(line => {
        const lower = line.toLowerCase();
        if (/vocabulary\b|^kelime\b/.test(lower)) {
          inVocabulary = true;
          return;
        }
        if (!inVocabulary) {
          mainLines.push(line);
          return;
        }

        const header = line.match(/^([A-Za-z][A-Za-z'’\- ]{1,50})\s*\(([^)]*)\)/);
        if (header && !/^türkçe|^eş\s*anlam/i.test(line)) {
          if (current?.word) vocabulary.push(current);
          current = { word: normalizeWord(header[1]), turkish: "", meaningNote: "", examples: [] };
          return;
        }
        if (!current) return;
        const turkish = line.match(/Türkçe\s*Anlam[ıi]\s*:\s*(.+)$/i);
        if (turkish) {
          current.turkish = turkish[1].trim();
          return;
        }
        const synonyms = line.match(/Eş\s*Anlamlıları\s*\(Synonyms\)\s*:\s*(.+)$/i);
        if (synonyms) {
          current.meaningNote = synonyms[1].trim();
          return;
        }
        if (!/dilkocum\.com/i.test(line)) current.examples.push(line);
      });
      if (current?.word) vocabulary.push(current);

      const cleanMain = mainLines
        .filter(line => !/^(reading|vocabulary)\b/i.test(line))
        .filter(line => !/dilkocum\.com/i.test(line))
        .join("\n\n");
      return { text: normalizeArticleTextForReading(cleanMain || lines.join("\n\n")), vocabulary };
    }

    async function extractPdfText(file, status = null) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const pages = [];
      for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
        if (status) status.textContent = "PDF okunuyor: " + pageNumber + " / " + pdf.numPages;
        const page = await pdf.getPage(pageNumber);
        const content = await page.getTextContent();
        pages.push(content.items.map(item => item.str).join(" "));
      }
      return pages.join("\n\n");
    }

    function exportArticle(article) {
      const title = articleDisplayTitle(article);
      const content = title + "\n\n" + normalizeArticleTextForReading(article.text || "");
      const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = title.replace(/[^A-Za-z0-9ÇĞİÖŞÜçğıöşü_-]+/g, "-").replace(/^-+|-+$/g, "") + ".txt";
      document.body.appendChild(link);
      link.click();
      URL.revokeObjectURL(link.href);
      link.remove();
    }

      const left = Math.min(Math.max(12, rect.left), window.innerWidth - popover.offsetWidth - 12);
      let top = rect.bottom + 10;
      if (top + popover.offsetHeight > window.innerHeight - 12) top = Math.max(12, rect.top - popover.offsetHeight - 10);

      if (!existing) input.focus();

          turkish,

      const validation = validatePdfImport(parsedQuestions, { sets: pdfAnswerSets, manual: manualAnswerMap }, lastPdfImportReport);
      const answerCount = parsedQuestions.filter(question => question.correctAnswer).length;

        : "";

          (validation.canSave
            ? '<button id="importPdfBtn" class="mt-4 rounded-2xl bg-emerald-600 px-6 py-3 font-semibold text-white hover:bg-emerald-500">' + (validation.ok ? "Bu PDF’yi Kaydet" : "Bulunan Soruları Kaydet") + '</button>'
            : '<div class="mt-4 rounded-2xl border border-amber-400/40 bg-amber-950/30 p-3 text-sm font-semibold text-amber-100">Beş şıkkı olmayan veya aynı set içinde tekrarlanan sorular var. Kaydetmeden önce manuel kontrol etmelisin.</div>') +

    function formatSetIssues(issues) {
      return issues.length ? issues.map(item => {
        const visible = item.values.slice(0, 12).join(", ");
        const hidden = item.values.length > 12 ? " ... +" + (item.values.length - 12) + " daha" : "";
        return item.setLabel + ": " + visible + hidden;
      }).join(" | ") : "Yok";
    }

    function validatePdfImport(parsedQuestions, answerSource, pageReport) {
      const answerSets = answerSource?.sets || [];
      const manualAnswers = answerSource?.manual || {};
      const groups = [];
      parsedQuestions.forEach(question => {
        let group = groups.find(item => item.setId === question.setId);
        if (!group) {
          group = { setId: question.setId, questions: [] };
          groups.push(group);
        }
        group.questions.push(question);
      });
      const duplicateQuestions = [];
      const incompleteQuestions = [];
      const missingAnswers = [];
      groups.forEach((group, groupIndex) => {
        const setLabel = "Set " + String(groupIndex + 1).padStart(2, "0");
        const numbers = group.questions.map(question => question.questionNumber);
        const answerNumbers = Object.keys(answerSets[groupIndex] || {}).map(Number).filter(Boolean);
        const duplicate = [...new Set(numbers.filter((number, index) => numbers.indexOf(number) !== index))];
        const incomplete = group.questions
          .filter(question => Object.keys(question.options || {}).length !== 5 || ["A", "B", "C", "D", "E"].some(key => !String(question.options?.[key] || "").trim()))
          .map(question => question.questionNumber);
        const missingAnswer = group.questions
          .filter(question => !question.correctAnswer && (answerNumbers.length || Object.keys(manualAnswers).length))
          .map(question => question.questionNumber);
        if (duplicate.length) duplicateQuestions.push({ setLabel, values: duplicate });
        if (incomplete.length) incompleteQuestions.push({ setLabel, values: incomplete });
        if (missingAnswer.length) missingAnswers.push({ setLabel, values: missingAnswer });
      });
      const answerCount = parsedQuestions.filter(question => question.correctAnswer).length;
      return {
        expectedQuestions: parsedQuestions.length,
        foundQuestions: parsedQuestions.length,
        answerCount,
        duplicateQuestions,
        incompleteQuestions,
        missingAnswers,
        ocrPages: pageReport?.ocrPages || [],
        failedPages: pageReport?.failedPages || [],
        manualReviewQuestions: [...incompleteQuestions, ...missingAnswers],
        canSave: parsedQuestions.length > 0 && !duplicateQuestions.length && !incompleteQuestions.length,
        ok: parsedQuestions.length > 0 && !duplicateQuestions.length && !incompleteQuestions.length && !missingAnswers.length,
      };
    }

    function renderImportValidation(report) {
      const toneClass = tone => ({
        emerald: "text-emerald-200",
        amber: "text-amber-200",

      }[tone] || "text-slate-200");
      const row = (label, value, tone = "slate") => '<div class="rounded-xl border border-slate-800 bg-slate-900 p-3"><p class="text-xs font-bold uppercase tracking-wide text-slate-500">' + label + '</p><p class="mt-1 text-sm font-bold ' + toneClass(tone) + '">' + escapeHtml(value) + '</p></div>';
      return '<div class="mt-3 grid gap-2 md:grid-cols-2">' +
        row("Bulunan soru", report.foundQuestions, "emerald") +
        row("Cevap anahtarı", report.answerCount ? (report.missingAnswers.length ? report.answerCount + " cevap eşleşti, bazıları boş" : report.answerCount + " cevap uyumlu") : "Yok (opsiyonel)", report.missingAnswers.length ? "amber" : "emerald") +
        row("Beş şıkkı olmayan", formatSetIssues(report.incompleteQuestions), report.incompleteQuestions.length ? "amber" : "emerald") +
        row("Tekrarlanan soru", formatSetIssues(report.duplicateQuestions), report.duplicateQuestions.length ? "amber" : "emerald") +
        row("Cevapsız soru", formatSetIssues(report.missingAnswers), report.missingAnswers.length ? "amber" : "emerald") +
        row("OCR kullanılan sayfalar", report.ocrPages.length ? report.ocrPages.join(", ") : "Yok") +
        row("Hatalı sayfalar", report.failedPages.length ? report.failedPages.map(item => item.page).join(", ") : "Yok", report.failedPages.length ? "red" : "emerald") +
      '</div>';
    }

    async function extractQuestionPdfText(file, status = null) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const pageNumbers = Array.from({ length: pdf.numPages }, (_, index) => index + 1);
      lastPdfImportReport = {
        expectedQuestions: null,
        pageCount: pdf.numPages,
        ocrPages: [],
        failedPages: [],
        incompletePages: [],
      };
      const settled = await Promise.allSettled(pageNumbers.map(pageNumber => processQuestionPdfPage(pdf, pageNumber, status)));
      const pages = settled.map((result, index) => {
        const pageNumber = pageNumbers[index];
        if (result.status === "fulfilled") return result.value;
        lastPdfImportReport.failedPages.push({ page: pageNumber, error: result.reason?.message || String(result.reason) });
        return { page: pageNumber, text: "", extraction: "error" };
      });
      if (status) status.textContent = "Sonuç doğrulanıyor...";
      return pages.sort((a, b) => a.page - b.page).map(page => page.text).join("\n");
    }

    async function processQuestionPdfPage(pdf, pageNumber, status = null) {
      if (status) status.textContent = "Sayfa " + pageNumber + " / " + pdf.numPages + " okunuyor";
      const page = await pdf.getPage(pageNumber);
      const viewport = page.getViewport({ scale: 1 });
      const content = await page.getTextContent();
      const items = content.items
        .map(item => ({
          text: normalizePdfImportText(String(item.str || "").trim()),
          x: item.transform?.[4] || 0,
          y: item.transform?.[5] || 0,
        }))
        .filter(item => item.text);
      const midpoint = viewport.width / 2;
      const leftItems = items.filter(item => item.x < midpoint - 8);
      const rightItems = items.filter(item => item.x >= midpoint - 8);
      const hasTwoColumns = leftItems.length > 20 && rightItems.length > 20;
      let text = hasTwoColumns ? layoutPdfItems(leftItems) + "\n" + layoutPdfItems(rightItems) : layoutPdfItems(items);
      let extraction = "text";
      if (isIncompletePdfPageText(text) && !/answer\s*key|cevap\s*anahtar|\banswer\b/i.test(text)) {
        lastPdfImportReport.incompletePages.push(pageNumber);
        if (window.Tesseract) {
          if (status) status.textContent = "Sayfa " + pageNumber + " / " + pdf.numPages + " OCR uygulanıyor";
          text = await ocrQuestionPdfPage(page);
          extraction = "ocr";
          lastPdfImportReport.ocrPages.push(pageNumber);
        }
      }
      if (status) status.textContent = "Sayfa " + pageNumber + " / " + pdf.numPages + " ayrıştırılıyor";
      return { page: pageNumber, text: normalizePdfImportText(text), extraction };
    }

    async function ocrQuestionPdfPage(page) {
      const viewport = page.getViewport({ scale: 2.2 });
      const canvas = document.createElement("canvas");
      canvas.width = Math.ceil(viewport.width);
      canvas.height = Math.ceil(viewport.height);
      const context = canvas.getContext("2d", { willReadFrequently: true });
      await page.render({ canvasContext: context, viewport }).promise;
      const result = await Tesseract.recognize(canvas, "eng");
      return result?.data?.text || "";
    }

    function normalizePdfImportText(value) {
      return String(value || "")
        .replace(/[‘’]/g, "'")
        .replace(/[“”]/g, '"')
        .replace(/[‐‑‒–—−]/g, "-")
        .replace(/\u00a0/g, " ")
        .replace(/\bO\s*\)/g, "D)")
        .replace(/[¢€]\s*\)/g, "C)")
        .replace(/([A-E])\s*[\).]\s*/g, " $1) ")
        .replace(/\s+([,.!?;:])/g, "$1")
        .replace(/[ \t]+/g, " ")
        .trim();
    }

    function isIncompletePdfPageText(text) {
      const clean = normalizePdfImportText(text);
      if (clean.length < 150) return true;
      if (!/(?:Soru\s*No\s*:?)?\s*\b\d{1,2}\b/i.test(clean)) return true;
      return (clean.match(/\b[A-E]\)/g) || []).length < 5;
    }

    function layoutPdfItems(items) {
      const lines = [];
      [...items].sort((a, b) => b.y - a.y || a.x - b.x).forEach(item => {
        let line = lines.find(candidate => Math.abs(candidate.y - item.y) < 3);
        if (!line) {
          line = { y: item.y, items: [] };
          lines.push(line);
        }
        line.items.push(item);
      });
      return lines
        .sort((a, b) => b.y - a.y)
        .map(line => line.items.sort((a, b) => a.x - b.x).map(item => item.text).join(" "))
        .join("\n")
        .replace(/[ \t]+/g, " ")
        .replace(/\s+([,.!?;:])/g, "$1");
    }

    function parseAnswerKey(value) {
      const map = {};
      const matches = String(value || "").matchAll(/(\d{1,3})\s*[-:.\)]?\s*([A-E])/gi);
      for (const match of matches) map[Number(match[1])] = match[2].toUpperCase();
      return map;
    }

    function compactAnswerKeySlice(raw, start, end) {
      const selected = [];
      let pairCount = 0;
      String(raw || "").slice(start, end).split(/\n+/).forEach(line => {
        const normalized = normalizePdfImportText(line);
        if (!normalized) return;
        const pairs = [...normalized.matchAll(/\b\d{1,3}\s*[-:.\)]?\s*[A-E]\b/gi)].length;
        const markerLike = /answer\s*key|\banswers?\b|cevap\s*anahtar[ıi]|\bcevap(?:lar[ıi])?\b|\byan[ıi]t(?:lar[ıi])?\b|doğru\s*cevap/i.test(normalized);
        if (markerLike || pairs) {
          selected.push(normalized);
          pairCount += pairs;
          return;
        }
        if (pairCount && normalized.length > 35) return;
        if (!pairCount && selected.length < 2) selected.push(normalized);
      });
      return selected.join("\n");
    }

    function parseAnswerKeySetsFromPdfText(text) {
      const raw = String(text || "");
      const markerRegex = /answer\s*key|\banswers?\b|cevap\s*anahtar[ıi]|\bcevap(?:lar[ıi])?\b|\byan[ıi]t(?:lar[ıi])?\b|doğru\s*cevap(?:lar[ıi])?/gi;
      const markers = [...raw.matchAll(markerRegex)];
      const sets = [];
      markers.forEach((marker, index) => {
        const nextMarker = markers[index + 1]?.index ?? raw.length;
        const sliceEnd = Math.min(nextMarker, marker.index + 4500);
        const keySlice = compactAnswerKeySlice(raw, marker.index, sliceEnd);
        const map = parseAnswerKey(keySlice);
        if (Object.keys(map).length >= 3) sets.push(map);
      });
      return sets;
    }

    function parseAnswerKeyFromPdfText(text) {
      const raw = String(text || "");
      const markers = [...raw.matchAll(/answer\s*key|\banswer\b|cevap\s*anahtar[ıi]|\bcevap\b/gi)];
      const marker = markers[markers.length - 1];
      if (!marker || marker.index < raw.length * 0.5) return {};
      return parseAnswerKey(raw.slice(marker.index));
    }

    function resolveQuestionAnswer(answerSource, setIndex, number) {
      const answerSets = answerSource?.sets || [];
      const manualAnswers = answerSource?.manual || {};
      return answerSets[setIndex]?.[number] || manualAnswers[number] || null;
    }

    function parseQuestionsFromText(text, title, answerSource) {
      const docId = "upload-" + Date.now();
      const clean = String(text || "").replace(/\r/g, "\n").replace(/[ \t]+/g, " ");
      const markers = [...clean.matchAll(/(?:^|[\n\s])(?:Soru\s*(?:No\s*)?[:\-]?\s*)?(\d{1,3})(?:\s*[\).\-]\s+|\s+(?=[A-ZÇĞİÖŞÜ]))/gi)]
        .filter(match => {
          const number = Number(match[1]);
          if (number < 1 || number > 120) return false;
          const before = clean.slice(Math.max(0, match.index - 8), match.index);
          return !/\d\s*$/.test(before);
        });
      const questions = [];
      let setIndex = 0;
      let lastQuestionNumber = 0;
      for (let index = 0; index < markers.length; index++) {
        const start = markers[index].index;
        const end = index + 1 < markers.length ? markers[index + 1].index : clean.length;
        const block = clean.slice(start, end).trim();
        const number = Number(markers[index][1]);
        const positions = [...block.matchAll(/(?:^|\s)(?:\(([A-EOaeo])\)|([A-EOaeo])\s*[\).\-])\s*/g)];
        if (positions.length < 5) continue;
        const optionParts = positions.slice(0, 5);
        const promptStart = block.indexOf(markers[index][0].trim()) + markers[index][0].trim().length;
        const prompt = block.slice(promptStart, optionParts[0].index)
          .replace(/^\d{4}\s+[A-Za-zÇĞİÖŞÜçğıöşü]+\s+YDS\s*/i, "")
          .trim();
        const options = {};
        for (let optionIndex = 0; optionIndex < 5; optionIndex++) {
          const current = optionParts[optionIndex];
          const next = optionParts[optionIndex + 1];
          const rawKey = (current[1] || current[2]).toUpperCase();
          const key = rawKey === "O" ? "D" : rawKey;
          const valueStart = current.index + current[0].length;
          const valueEnd = next ? next.index : block.length;
          options[key] = block.slice(valueStart, valueEnd).trim();
        }
        if (!prompt || Object.keys(options).length !== 5) continue;
        if (questions.length && number <= lastQuestionNumber) {
          setIndex += 1;
          lastQuestionNumber = 0;
        }
        const setId = docId + "-set-" + String(setIndex + 1).padStart(2, "0");
        const localOrder = questions.filter(question => question.setId === setId).length + 1;
        questions.push({
          id: setId + "-q-" + String(number || localOrder).padStart(3, "0"),
          documentId: docId,
          setId,
          category: title,
          questionNumber: number || localOrder,
          sourcePage: null,
          question: prompt,
          options,
          correctAnswer: resolveQuestionAnswer(answerSource, setIndex, number || localOrder),
          builtIn: false,
        });
        lastQuestionNumber = number || localOrder;
      }
      questions.documentId = docId;
      return questions;
    }

    function importParsedPdf(title, parsedQuestions) {
      const docId = parsedQuestions.documentId || parsedQuestions[0]?.documentId || ("upload-" + Date.now());
      const documentRecord = {
        id: docId,
        title,
        questionCount: parsedQuestions.length,
        builtIn: false,
      };
      uploadedBank.documents = (uploadedBank.documents || []).filter(doc => doc.id !== docId);
      uploadedBank.questions = (uploadedBank.questions || []).filter(question => question.documentId !== docId);
      uploadedBank.documents.push(documentRecord);
      uploadedBank.questions.push(...parsedQuestions);
      saveJson(STORAGE_UPLOADS, uploadedBank);
      rebuildBank();
      activeDocumentId = docId;
      currentIndex = 0;
      answered = false;
      solveMode = "document";
      wrongReviewIds = [];
      setView("solve");
      renderMenu();
    }

      if (event.key === "Escape") {

        closeSentencePanel();
        closeArticleEditModal();

          event.preventDefault();
          setArticleFocusMode(false);

        }

      if (!typing && activeView === "articles") {
        const article = currentArticle();
        if ((event.metaKey || event.ctrlKey) && (event.key === "+" || event.key === "=")) {
          event.preventDefault();

          localStorage.setItem("yds-article-font-size-v1", String(articleFontSize));
          if (article) renderArticleReader(article);
          return;
        }
        if ((event.metaKey || event.ctrlKey) && (event.key === "-" || event.key === "_")) {

          localStorage.setItem("yds-article-font-size-v1", String(articleFontSize));

          event.preventDefault();
          setQuestionFocusMode(false);
          renderQuestion();
          return;

          event.preventDefault();
          questionFontSize = Math.max(17, Math.max(17, questionFontSize || 19) - 1);
          localStorage.setItem("yds-question-font-size-v1", String(questionFontSize));
          renderQuestion();
          return;
        }
        if (event.key.toLowerCase() === "f") {
          event.preventDefault();
          setQuestionFocusMode(!questionFocusMode);
          renderQuestion();
          return;
        }
      }
      if (typing || activeView !== "study") return;
      if (event.code === "Space" && wordStudyMode === "cards") {
        event.preventDefault();
        if (!wordCardRevealed) {
          wordCardRevealed = true;
          renderWordStudy();
        }
        return;
      }
      if (wordStudyMode === "cards" && wordCardRevealed && ["1", "2", "3"].includes(event.key)) {
        event.preventDefault();
        const ratingButton = document.querySelectorAll(".srs-rating")[Number(event.key) - 1];
        if (ratingButton) ratingButton.click();
        return;
      }
      if (wordStudyMode === "quiz" && ["1", "2", "3", "4"].includes(event.key) && wordQuizQuestion && !wordQuizQuestion.checked) {
        event.preventDefault();
        const choice = document.querySelectorAll(".quiz-choice")[Number(event.key) - 1];
        if (choice) choice.click();
        return;
      }
      if (wordStudyMode === "cards" && event.key === "ArrowLeft") {
        const prev = document.getElementById("prevStudyWordBtn");
        if (prev && !prev.disabled) {
          event.preventDefault();
          prev.click();
        }
        return;
      }
      if (event.key === "Enter" || (wordStudyMode === "cards" && event.key === "ArrowRight")) {
        const next = document.getElementById("nextQuizWordBtn") || document.getElementById("nextStudyWordBtn");
        if (next && !next.disabled) {
          event.preventDefault();
          next.click();
        }
      }
    });
    document.getElementById("closeWordModal").addEventListener("click", closeWordModal);
    document.getElementById("saveWordBtn").addEventListener("click", saveWord);
    wordModal.addEventListener("click", event => {
      if (event.target === wordModal) closeWordModal();
    });

    removeBundledVocabularyOnce();
    mergeVocabularySeed();
    rebuildBank();
    applyTheme(initialThemePreference());
    renderMenu();
    renderHomePage();
  </script>
</body>
</html>
