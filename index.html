  <script>
    (function () {
      try {
        var stored = localStorage.getItem("yds-theme-v1");
        var theme = stored || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
      } catch {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>

/* Ana sayfa: kartlar ayni dilde, ancak islevlerine gore hafif ton farklariyla ayrilir. */
.home-card-task,
.home-card-week,
.home-card-recent,
.home-card-daily-words,
.home-card-daily-words-empty,
.home-card-warning {
  border-color: var(--border-color) !important;
  box-shadow: 0 8px 20px rgba(15, 23, 42, 0.035) !important;
}

.home-card-task { background-color: var(--home-task-surface) !important; }
.home-card-week { background-color: var(--home-week-surface) !important; }
.home-card-recent { background-color: var(--home-recent-surface) !important; }
.home-card-daily-words { background-color: var(--home-daily-words-surface) !important; }
.home-card-daily-words-empty { background-color: var(--home-daily-words-empty) !important; }
.home-card-warning {
  background-color: var(--home-warning-surface) !important;
  border-color: var(--danger-border) !important;
}

.home-task-pending,
.home-week-stat,
.home-recent-word,
.home-daily-word {
  border-color: var(--border-color) !important;
}

.home-task-pending { background-color: var(--home-task-item-surface) !important; }
.home-task-completed { background-color: var(--home-complete-surface) !important; }
.home-week-stat { background-color: var(--home-week-item-surface) !important; }
.home-recent-word { background-color: var(--home-recent-item-surface) !important; }
.home-daily-word { background-color: var(--home-daily-word-item-surface) !important; }

[data-theme="dark"] .home-card-task,
[data-theme="dark"] .home-card-week,
[data-theme="dark"] .home-card-recent,
[data-theme="dark"] .home-card-daily-words,

  box-shadow: none !important;
}

[data-theme="dark"] .home-card-warning .text-red-700,
[data-theme="dark"] .home-card-warning .text-red-800 {
  color: #fecaca !important;
}

      let progress = examProgress.exams[key];
      if (!progress && create) {
        progress = { examId: String(question?.documentId || activeDocumentId || "unknown"), currentQuestionId: null, answers: {}, updatedAt: new Date().toISOString() };
        examProgress.exams[key] = progress;
      }
      return progress || null;
    }

    function selectedAnswerForQuestion(question) {
      const value = progressForQuestion(question)?.answers?.[question?.id];
      return isAnswerKey(value) ? value : null;
    }

    function saveExamProgress() {
      saveJson(STORAGE_EXAM_PROGRESS, examProgress);
    }

    function rememberCurrentQuestion(question) {
      if (!question?.id) return;
      const progress = progressForQuestion(question, true);
      if (progress.currentQuestionId === question.id) return;
      progress.currentQuestionId = question.id;
      progress.updatedAt = new Date().toISOString();
      saveExamProgress();
    }

    function saveSelectedAnswer(question, selectedKey) {
      if (!question?.id || !isAnswerKey(selectedKey)) return;
      const progress = progressForQuestion(question, true);
      progress.answers = { ...(progress.answers || {}), [question.id]: selectedKey };
      progress.updatedAt = new Date().toISOString();
      saveExamProgress();
    }

    function selectedAnswerSummary(questions = getCategoryQuestions()) {
      return questions.reduce((summary, question) => {
        const selectedKey = selectedAnswerForQuestion(question);
        if (!selectedKey) summary.blank++;
        else if (question.correctAnswer && selectedKey === question.correctAnswer) summary.correct++;
        else if (question.correctAnswer) summary.wrong++;
        return summary;
      }, { correct: 0, wrong: 0, blank: 0 });
    }

    function removeBundledVocabularyOnce() {
      if (localStorage.getItem(STORAGE_REMOVE_BUILTIN_SEEDS) === "done") return;
      const bundledSources = [
        "Son_3_Yilda_Sorulmus_Tum_Kelimeler",
        "KELİME_KARTLARI",
        "KELİME_KARTLARI",
        "kamilhoca",
        "bolkelime",
        "PDF kelime listesi",
      ];
      const before = wordbook.length;
      wordbook = wordbook.filter(item => {
        const id = String(item?.id || "");
        const source = String(item?.source || "");
        if (id.startsWith("seed-") || id.startsWith("seed-word-")) return false;
        return !bundledSources.some(marker => source.includes(marker));
      });
      if (wordbook.length !== before) {
        saveJson(STORAGE_WORDS, wordbook);
        wordSessionIds = wordSessionIds.filter(id => wordbook.some(item => item.id === id));
        saveJson("yds-word-session-ids-v1", wordSessionIds);
      }
      localStorage.setItem(STORAGE_REMOVE_BUILTIN_SEEDS, "done");
      localStorage.removeItem(STORAGE_WORD_SEED_VERSION);
    }

    function mergeVocabularySeed() {
      if (!vocabularySeed.length || localStorage.getItem(STORAGE_WORD_SEED_VERSION) === VOCABULARY_SEED_VERSION) return;
      const existingByWord = new Map(wordbook.map(item => [String(item.word || "").toLowerCase(), item]));
      const now = new Date().toISOString();
      let added = 0;
      let updated = 0;
      vocabularySeed.forEach(item => {
        const key = String(item.word || "").toLowerCase();
        if (!key) return;
        const existing = existingByWord.get(key);
        if (existing) {
          let changed = false;
          if (!wordExample(existing) && (item.example || item.exampleSentence || item.sentence)) {
            existing.example = item.example || item.exampleSentence || item.sentence;
            changed = true;
          }
          if (!wordMeaningNote(existing) && item.meaningNote) {
            existing.meaningNote = item.meaningNote;
            changed = true;
          }
          if (!wordTurkish(existing) && (item.turkish || item.meaning)) {
            existing.turkish = item.turkish || item.meaning;
            existing.meaning = item.turkish || item.meaning;
            changed = true;
          }
          if (changed) {
            existing.updatedAt = now;
            updated++;
          }
          return;
        }
        added++;
        const record = {
          id: item.id || "seed-word-" + added + "-" + Date.now(),
          word: item.word,
          turkish: item.turkish || item.meaning || "",
          meaning: item.turkish || item.meaning || "",
          meaningNote: item.meaningNote || "",
          example: item.example || item.exampleSentence || item.sentence || "",
          source: item.source || "PDF kelime listesi",
          category: item.category || "PDF kelimeleri",
          questionId: null,
          createdAt: now,
          updatedAt: now,
          seen: item.seen || 0,
        };
        existingByWord.set(key, record);
        wordbook.push(record);
      });
      localStorage.setItem(STORAGE_WORD_SEED_VERSION, VOCABULARY_SEED_VERSION);
      if (added || updated) saveJson(STORAGE_WORDS, wordbook);
    }

      documents = [...baseBank.documents, ...(uploadedBank.documents || [])];

      const validQuestionIds = new Set(questionBank.map(item => item.id));

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeWord(value) {
      return String(value || "").trim().replace(/^['"“”‘’.,;:!?()[\]{}]+|['"“”‘’.,;:!?()[\]{}]+$/g, "");
    }

    function normalizeLookup(value) {
      return normalizeWord(value).toLowerCase();
    }

    function todayKey() {
      const now = new Date();
      const offset = now.getTimezoneOffset() * 60000;
      return new Date(now.getTime() - offset).toISOString().slice(0, 10);
    }

    function defaultDailyGoals() {
      return {
        flashcards: 50,
        multipleChoice: 50,
        pastExamReading: 1,
        externalReading: 1,
        difficultWords: 25,
        streakMode: "all",
      };
    }

    function normalizeDailyGoals(value = {}) {
      const base = defaultDailyGoals();
      const clamp = (raw, min, max, fallback) => {
        const number = Number(raw);
        if (!Number.isFinite(number)) return fallback;
        return Math.max(min, Math.min(max, Math.round(number)));
      };
      return {
        flashcards: clamp(value.flashcards, 10, 200, base.flashcards),
        multipleChoice: clamp(value.multipleChoice, 10, 200, base.multipleChoice),
        pastExamReading: clamp(value.pastExamReading, 0, 5, base.pastExamReading),
        externalReading: clamp(value.externalReading, 0, 5, base.externalReading),
        difficultWords: clamp(value.difficultWords, 1, 200, base.difficultWords),
        streakMode: value.streakMode === "80" ? "80" : "all",
      };
    }

    function dailyTaskLabels() {
      return {
        flashcards: { icon: "K", title: "Kelime Kartları", action: "Devam Et", view: "flashcards" },
        multipleChoice: { icon: "T", title: "Çoktan Seçmeli", action: "Devam Et", view: "quiz" },
        pastExamReading: { icon: "Y", title: "Okuma", action: "Parça Seç", view: "yds-reading" },
        difficultWords: { icon: "S", title: "Soru Çözümü", action: "Devam Et", view: "question-solving" },
      };
    }

    function createDailyTaskProgress(key, target) {
      return {
        completedIds: [],
        count: 0,
        target: Math.max(0, Number(target) || 0),
        completed: Math.max(0, Number(target) || 0) === 0,
      };
    }

    function taskProgressCount(task) {
      return Math.max(Number(task?.count || 0), Array.isArray(task?.completedIds) ? task.completedIds.length : 0);
    }

    function createDailyProgress(date = todayKey()) {
      return {
        date,
        flashcards: createDailyTaskProgress("flashcards", dailyGoals.flashcards),
        multipleChoice: createDailyTaskProgress("multipleChoice", dailyGoals.multipleChoice),
        pastExamReading: createDailyTaskProgress("pastExamReading", dailyGoals.pastExamReading),
        externalReading: createDailyTaskProgress("externalReading", dailyGoals.externalReading),
        difficultWords: createDailyTaskProgress("difficultWords", dailyGoals.difficultWords),
        updatedAt: new Date().toISOString(),
      };
    }

    function normalizeDailyTask(value, key) {
      const target = Number(dailyGoals?.[key] ?? defaultDailyGoals()[key] ?? 0);
      const task = value && typeof value === "object" ? value : {};
      const completedIds = Array.isArray(task.completedIds) ? [...new Set(task.completedIds.filter(Boolean).map(String))] : [];
      const count = Math.max(Number(task.count || 0), completedIds.length);
      return {
        completedIds,
        count,
        target,
        completed: target === 0 || count >= target,
      };
    }

    function normalizeDailyProgress(value) {
      const date = todayKey();
      if (!value || value.date !== date) {
        if (value?.date) archiveDailyProgress(value);
        return createDailyProgress(date);
      }
      const normalized = {
        date,
        flashcards: normalizeDailyTask(value.flashcards, "flashcards"),
        multipleChoice: normalizeDailyTask(value.multipleChoice, "multipleChoice"),
        pastExamReading: normalizeDailyTask(value.pastExamReading, "pastExamReading"),
        externalReading: normalizeDailyTask(value.externalReading, "externalReading"),
        difficultWords: normalizeDailyTask(value.difficultWords, "difficultWords"),
        updatedAt: value.updatedAt || new Date().toISOString(),
      };
      return normalized;
    }

    function archiveDailyProgress(progress) {
      if (!progress?.date) return;
      const normalized = {
        ...progress,
        flashcards: progress.flashcards || createDailyTaskProgress("flashcards", 0),
        multipleChoice: progress.multipleChoice || createDailyTaskProgress("multipleChoice", 0),
        pastExamReading: progress.pastExamReading || createDailyTaskProgress("pastExamReading", 0),
        externalReading: progress.externalReading || createDailyTaskProgress("externalReading", 0),
        difficultWords: progress.difficultWords || createDailyTaskProgress("difficultWords", 0),
        archivedAt: new Date().toISOString(),
      };
      const existingIndex = dailyHistory.findIndex(item => item.date === normalized.date);
      if (existingIndex >= 0) dailyHistory[existingIndex] = normalized;
      else dailyHistory.unshift(normalized);
      dailyHistory = dailyHistory.slice(0, 120);
      saveJson(STORAGE_DAILY_HISTORY, dailyHistory);
    }

    function saveDailyGoals() {
      dailyGoals = normalizeDailyGoals(dailyGoals);
      saveJson(STORAGE_DAILY_GOALS, dailyGoals);
      dailyProgress = normalizeDailyProgress(dailyProgress);
      saveDailyProgress(false);
    }

    function saveDailyProgress(queueCloud = true) {
      dailyProgress.updatedAt = new Date().toISOString();
      saveJson(STORAGE_DAILY_PROGRESS, dailyProgress);
      if (queueCloud) queueSupabaseAutoBackup();
    }

    function ensureDailyProgress() {
      const previousDate = dailyProgress?.date || "";
      dailyProgress = normalizeDailyProgress(dailyProgress);
      if (previousDate !== dailyProgress.date) saveDailyProgress(false);
      return dailyProgress;
    }

    function taskCompletionRatio(progress = dailyProgress) {
      const keys = Object.keys(dailyTaskLabels());
      const active = keys.filter(key => Number(progress?.[key]?.target || 0) > 0);
      if (!active.length) return 100;
      const completed = active.filter(key => progress[key]?.completed).length;
      return Math.round((completed / active.length) * 100);
    }

    function dailyTaskSummary(progress = dailyProgress) {
      const keys = Object.keys(dailyTaskLabels()).filter(key => Number(progress?.[key]?.target || 0) > 0);
      const completed = keys.filter(key => progress[key]?.completed).length;
      const percent = keys.length ? Math.round((completed / keys.length) * 100) : 100;
      return { total: keys.length, completed, percent };
    }

    function dailySuccess(progress) {
      if (!progress) return false;
      const ratio = taskCompletionRatio(progress);
      return dailyGoals.streakMode === "80" ? ratio >= 80 : ratio >= 100;
    }

    function calculateStreak() {
      const byDate = new Map(dailyHistory.map(item => [item.date, item]));
      byDate.set(dailyProgress.date, dailyProgress);
      let streak = 0;
      const cursor = new Date(todayKey() + "T12:00:00");
      for (let i = 0; i < 365; i += 1) {
        const key = cursor.toISOString().slice(0, 10);
        const progress = byDate.get(key);
        if (!progress || !dailySuccess(progress)) break;
        streak += 1;
        cursor.setDate(cursor.getDate() - 1);
      }
      return streak;
    }

    function formatTurkishDate(dateKey = todayKey()) {
      return new Date(dateKey + "T12:00:00").toLocaleDateString("tr-TR", {
        day: "numeric",
        month: "long",
        year: "numeric",
        weekday: "long",
      });
    }

    function markDailyTaskItem(taskKey, rawId) {
      ensureDailyProgress();
      const task = dailyProgress[taskKey];
      if (!task || Number(task.target || 0) <= 0) return;
      const id = String(rawId || taskKey + "-" + Date.now());
      if (task.completedIds.includes(id)) return;
      const wasCompleted = task.completed;
      task.completedIds.push(id);
      task.count = taskProgressCount(task);
      task.completed = task.count >= task.target;
      saveDailyProgress();
      if (!wasCompleted && task.completed) {
        const title = dailyTaskLabels()[taskKey]?.title || "Günlük görev";
        showToast(title + " görevi tamamlandı: " + task.target + " / " + task.target);

    }

    function titleCaseFromSlug(value) {
      return String(value || "")
        .replace(/\.[a-z0-9]+$/i, "")
        .replace(/^upload-\d+-?/i, "")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .split(" ")
        .filter(Boolean)
        .map(part => {
          const lower = part.toLocaleLowerCase("tr");
          if (/^yds$/i.test(part)) return "YDS";
          if (/^e$/i.test(part)) return "e";
          if (/^pdf$/i.test(part)) return "PDF";
          if (/^\d+$/.test(part)) return part;
          return lower.charAt(0).toLocaleUpperCase("tr") + lower.slice(1);
        })
        .join(" ")
        .replace(/Academic Vocabulary\s+(\d+)\s+Test/i, "Academic Vocabulary – $1 Questions")
        .replace(/Academis Vocabulary\s+(\d+)\s+Test/i, "Academic Vocabulary – $1 Questions")
        .replace(/Ankara Dil Akademisi\s+/i, "");
    }

    function friendlyDocumentDisplay(doc, questionCount = 0) {
      const rawTitle = doc?.title || "Kelime Çalışması";
      const cleanTitle = titleCaseFromSlug(rawTitle);
      const source = /ankara[\s_\-]*dil[\s_\-]*akademisi/i.test(rawTitle) ? "Ankara Dil Akademisi" : "";
      const count = questionCount || doc?.questionCount || 0;
      return {
        title: cleanTitle || "Soru Kaynağı",
        meta: [source, count ? count + " soru" : ""].filter(Boolean).join(" · "),
      };
    }

    function documentDisplayTitle(doc) {

        .replace(/_/g, " ")

        .trim() || "Soru Kaynağı";
    }

    function documentAddedAtLabel(doc) {
      const value = doc?.createdAt || doc?.addedAt || doc?.importedAt || doc?.updatedAt || doc?.lastModified;
      if (!value) return "—";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "—";
      return date.toLocaleDateString("tr-TR", { day: "numeric", month: "short", year: "numeric" });

    function documentSolvedCount(doc) {
      const stored = Number(documentProgress?.[doc?.id]);
      const legacy = Number(doc?.solvedCount ?? doc?.progress ?? doc?.completedQuestions ?? 0);
      const count = Number.isFinite(stored) ? stored : legacy;
      return Math.max(0, Math.min(Number(doc?.questionCount || 0), Number.isFinite(count) ? count : 0));
    }

    function rememberDocumentProgress(documentId, solvedCount) {
      if (!documentId) return;
      const current = Number(documentProgress?.[documentId] || 0);
      const next = Math.max(current, Number(solvedCount || 0));
      if (next === current) return;
      documentProgress = { ...documentProgress, [documentId]: next };
      saveJson(STORAGE_DOCUMENT_PROGRESS, documentProgress);
    }

    function documentSourceText(doc) {
      const savedText = doc?.sourceText || doc?.rawText || doc?.text || doc?.extractedText;
      if (String(savedText || "").trim()) return String(savedText);
      return questionBank
        .filter(question => question.documentId === doc?.id)
        .sort((a, b) => Number(a.questionNumber || 0) - Number(b.questionNumber || 0))
        .map(question => {
          const options = ["A", "B", "C", "D", "E"]
            .filter(key => question.options?.[key])
            .map(key => key + ") " + question.options[key])
            .join("\n");
          return String(question.questionNumber || "") + ". " + String(question.question || "") + "\n" + options;
        })
        .join("\n\n");
    }

    function documentAnswerMap(documentId) {
      return questionBank
        .filter(question => question.documentId === documentId && question.correctAnswer)
        .reduce((answers, question) => {
          answers[question.questionNumber] = question.correctAnswer;
          return answers;
        }, {});
    }

          status.textContent = "Başlık ve kaynak metin zorunludur.";
          return;
        }
        const parsedQuestions = parseQuestionsFromText(sourceText, title, { sets: [], manual: documentAnswerMap(doc.id) }, doc.id);
        if (!parsedQuestions.length) {
          status.textContent = "Metinden soru çıkarılamadı. Soru ve A)–E) seçenek biçimini kontrol et.";
          return;
        }
        doc.title = title;
        doc.sourceText = sourceText;
        doc.questionCount = parsedQuestions.length;
        doc.updatedAt = new Date().toISOString();
        uploadedBank.questions = (uploadedBank.questions || []).filter(question => question.documentId !== doc.id);
        uploadedBank.questions.push(...parsedQuestions);
        const solvedCount = documentSolvedCount(doc);
        documentProgress = { ...documentProgress, [doc.id]: Math.min(solvedCount, parsedQuestions.length) };
        saveJson(STORAGE_DOCUMENT_PROGRESS, documentProgress);
        saveJson(STORAGE_UPLOADS, uploadedBank);
        rebuildBank();
        closeDocumentEditModal();
        renderHub(activeView);
      });
    }

    function dailyWordItems() {
      const date = todayKey();
      const dailyLimit = 3;
      const hardWords = wordbook.filter(isHardDailyWord);
      const hardById = new Map(hardWords.map(item => [item.id, item]));
      const stored = loadJson(STORAGE_DAILY_HARD_WORDS, null);
      if (stored?.date === date) {
        const existing = (stored.wordIds || []).map(id => hardById.get(id)).filter(Boolean).slice(0, dailyLimit);
        if (existing.length || !hardWords.length) return existing;
      }
      if (!hardWords.length) {
        saveJson(STORAGE_DAILY_HARD_WORDS, { date, wordIds: [], completedIds: [], shownAt: stored?.shownAt || {} });
        return [];
      }
      const shownAt = { ...(stored?.shownAt || {}) };
      const previousIds = new Set(stored?.wordIds || []);
      const sorted = [...hardWords].sort((a, b) => {
        const aShown = shownAt[a.id] || "";
        const bShown = shownAt[b.id] || "";
        if (aShown !== bShown) return aShown.localeCompare(bShown);
        return new Date(a.dueAt || a.updatedAt || a.createdAt || 0) - new Date(b.dueAt || b.updatedAt || b.createdAt || 0) ||
          String(a.word || "").localeCompare(String(b.word || ""), "tr");
      });
      const nonRepeats = sorted.filter(item => !previousIds.has(item.id));
      const source = nonRepeats.length >= Math.min(dailyLimit, hardWords.length) ? nonRepeats : sorted;
      const selected = source.slice(0, Math.min(dailyLimit, hardWords.length));
      selected.forEach(item => { shownAt[item.id] = date; });
      saveJson(STORAGE_DAILY_HARD_WORDS, {
        date,
        wordIds: selected.map(item => item.id),
        completedIds: [],
        shownAt,
      });
      return selected;
    }

    function downloadBackupJson() {
      const payload = backupPayload();
      const fileName = "yds-calisma-yedek-" + new Date().toISOString().slice(0, 10) + ".json";
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = fileName;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
      const status = document.getElementById("backupStatus");
      if (status) status.textContent = "Yedek dosyası hazırlandı: " + fileName;
    }

    function normalizeBackupPayload(payload) {
      const data = payload?.data || payload || {};
      return {
        uploadedBank: data.uploadedBank || data.uploads || { documents: [], questions: [] },
        wordbook: Array.isArray(data.wordbook) ? data.wordbook : [],
        articles: Array.isArray(data.articles) ? data.articles : [],
        notes: Array.isArray(data.notes) ? data.notes.map(normalizeNote) : [],
        wrongQuestionIds: Array.isArray(data.wrongQuestionIds) ? data.wrongQuestionIds : [],
        dailyGoals: normalizeDailyGoals(data.dailyGoals || {}),
        dailyProgress: data.dailyProgress || null,
        dailyHistory: Array.isArray(data.dailyHistory) ? data.dailyHistory : [],
        dailyHardWords: data.dailyHardWords || null,
        preferences: data.preferences || {},
      };
    }

    function restoreBackupPayload(payload) {
      const normalized = normalizeBackupPayload(payload);
      const confirmed = window.confirm("Bu yedek mevcut PDF, kelime, makale ve yanlış soru verilerinin üzerine yazacak. Devam edilsin mi?");
      if (!confirmed) return;
      uploadedBank = normalized.uploadedBank;
      wordbook = normalized.wordbook;
      articles = normalized.articles.map(normalizeArticleRecord);
      notes = normalized.notes;
      wrongQuestionIds = normalized.wrongQuestionIds;
      dailyGoals = normalizeDailyGoals(normalized.dailyGoals);
      dailyHistory = normalized.dailyHistory;
      dailyProgress = normalizeDailyProgress(normalized.dailyProgress);
      if (normalized.preferences.theme) localStorage.setItem(STORAGE_THEME, normalized.preferences.theme);
      if (normalized.preferences.wordSessionSize) {
        wordSessionSize = normalized.preferences.wordSessionSize;
        localStorage.setItem("yds-word-session-size-v1", String(wordSessionSize));

        syncId: String(config.syncId || "").trim(),

    function saveSupabaseConfig(config) {
      const normalized = {

      };
      saveJson(STORAGE_SUPABASE_CONFIG, normalized);

    let supabaseAutoSyncTimer = null;

    function queueSupabaseAutoBackup() {
      const config = loadSupabaseConfig();
      if (!config.url || !config.anonKey || !config.syncId) return;
      clearTimeout(supabaseAutoSyncTimer);
      supabaseAutoSyncTimer = setTimeout(() => {

    function currentSupabaseFormConfig() {
      return saveSupabaseConfig({

      });

    function supabaseStatus(message, tone = "info") {
      const status = document.getElementById("supabaseStatus");
      if (!status) return;
      const toneClass = tone === "error"
        ? "border-red-200 bg-red-50 text-red-700"
        : tone === "success"
          ? "border-emerald-200 bg-emerald-50 text-emerald-700"
          : "border-slate-200 bg-slate-50 text-slate-600";
      status.className = "mt-4 rounded-xl border p-3 text-sm font-semibold " + toneClass;
      status.textContent = message;
    }

    function validateSupabaseConfig(config) {
      if (!config.url || !config.anonKey || !config.syncId) {
        throw new Error("Supabase URL, anon public key ve eşitleme kodu birlikte doldurulmalı.");
      }
      if (!/^https:\/\/.+\.supabase\.co$/i.test(config.url)) {
        throw new Error("Supabase URL şu biçimde olmalı: https://proje-ref.supabase.co");
      }
      if (config.syncId.length < 8) {
        throw new Error("Eşitleme kodu en az 8 karakter olmalı. Bunu küçük bir parola gibi düşün.");
      }
      return config;
    }

    function supabaseHeaders(config, extra = {}) {
      return {
        apikey: config.anonKey,
        Authorization: "Bearer " + config.anonKey,
        "Content-Type": "application/json",
        ...extra,
      };
    }

    async function testSupabaseConnection() {
      try {
        const config = validateSupabaseConfig(currentSupabaseFormConfig());
        supabaseStatus("Bağlantı test ediliyor...");
        const response = await fetch(config.url + "/rest/v1/yds_cloud_backups?select=sync_id&limit=1", {
          headers: supabaseHeaders(config),
        });
        if (!response.ok) throw new Error(await response.text() || "Supabase bağlantısı başarısız.");
        supabaseStatus("Bağlantı başarılı. Artık buluta yedek alabilirsin.", "success");
      } catch (error) {
        supabaseStatus(error.message || "Bağlantı test edilemedi.", "error");
      }
    }

    async function uploadSupabaseBackup(silent = false) {
      try {
        const config = validateSupabaseConfig(silent ? loadSupabaseConfig() : currentSupabaseFormConfig());
        if (!silent) supabaseStatus("Veriler buluta yedekleniyor...");
        const response = await fetch(config.url + "/rest/v1/yds_cloud_backups?on_conflict=sync_id", {
          method: "POST",
          headers: supabaseHeaders(config, { Prefer: "resolution=merge-duplicates,return=representation" }),
          body: JSON.stringify([{
            sync_id: config.syncId,
            payload: backupPayload(),
            updated_at: new Date().toISOString(),
          }]),
        });
        if (!response.ok) throw new Error(await response.text() || "Buluta yedek alınamadı.");
        if (!silent) supabaseStatus("Bulut yedeği güncellendi.", "success");
      } catch (error) {
        if (!silent) supabaseStatus(error.message || "Buluta yedek alınamadı.", "error");
      }
    }

    async function restoreSupabaseBackup() {
      try {
        const config = validateSupabaseConfig(currentSupabaseFormConfig());
        supabaseStatus("Bulut yedeği okunuyor...");
        const response = await fetch(config.url + "/rest/v1/yds_cloud_backups?sync_id=eq." + encodeURIComponent(config.syncId) + "&select=payload,updated_at&limit=1", {
          headers: supabaseHeaders(config),
        });
        if (!response.ok) throw new Error(await response.text() || "Bulut yedeği okunamadı.");
        const rows = await response.json();
        if (!rows.length || !rows[0].payload) throw new Error("Bu eşitleme koduyla kayıtlı bulut yedeği bulunamadı.");
        restoreBackupPayload(rows[0].payload);
      } catch (error) {
        supabaseStatus(error.message || "Bulut yedeği geri yüklenemedi.", "error");
      }
    }

    function wordStatus(item) {
      const dueAt = item?.dueAt ? new Date(item.dueAt).getTime() : null;
      if (item?.needsReview || item?.lastRating === "again" || item?.lastRating === "hard" || (dueAt && dueAt <= Date.now())) return { key: "review", label: "Zor", className: "border-amber-200 bg-amber-50 text-amber-800" };
      const seen = Number(item?.seen || 0);
      if (seen >= 2) return { key: "learned", label: "Öğrenildi", className: "border-emerald-200 bg-emerald-50 text-emerald-800" };
      if (seen === 1) return { key: "learning", label: "Öğreniliyor", className: "border-blue-200 bg-blue-50 text-blue-800" };
      return { key: "new", label: "Yeni", className: "border-slate-200 bg-slate-100 text-slate-700" };
    }

    function wordStats() {
      const learned = wordbook.filter(item => wordStatus(item).key === "learned").length;
      const learning = wordbook.filter(item => ["learning", "review"].includes(wordStatus(item).key)).length;
      const fresh = wordbook.filter(item => wordStatus(item).key === "new").length;
      return { learned, learning, fresh, dailyTarget: activeWordSessionSize(studyWords().length) };
    }
