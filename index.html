    function bindArticleLibraryControls() {
      const toggle = document.getElementById("toggleArticleFormBtn");
      if (toggle) toggle.addEventListener("click", () => {
        const panel = document.getElementById("articleFormPanel");
        if (panel) panel.classList.toggle("hidden");
      });
      const kindSelect = document.getElementById("articleFormKindSelect");
      if (kindSelect) {
        const updateArticleFormKind = () => {
          articleFormMode = kindSelect.value === "yds" ? "yds" : "external";
        };
        kindSelect.addEventListener("change", updateArticleFormKind);
        updateArticleFormKind();
      }
      const saveButton = document.getElementById("saveArticleBtn");
      if (saveButton) saveButton.addEventListener("click", saveArticleFromInputs);
      const search = document.getElementById("articleSearchInput");
      if (search) search.addEventListener("input", () => {
        articleSearchQuery = search.value;
        activeArticleId = "__list__";
        if (articleSearchRenderTimer) clearTimeout(articleSearchRenderTimer);
        articleSearchRenderTimer = setTimeout(renderArticleResultsOnly, 80);
      });
      const bindSelect = (id, setter, value) => {
        const select = document.getElementById(id);
        if (!select) return;
        select.value = value;
        select.addEventListener("change", () => {
          setter(select.value);
          activeArticleId = "__list__";
          renderArticlesPage();
        });
      };
      bindSelect("articleStatusFilter", value => articleStatusFilter = value, articleStatusFilter);
      bindSelect("articleTypeFilter", value => articleTypeFilter = value, articleTypeFilter);
      bindSelect("articleLanguageFilter", value => articleLanguageFilter = value, articleLanguageFilter);
      bindSelect("articleSortMode", value => articleSortMode = value, articleSortMode);
      bindArticleResultControls();
    }

    function updateArticleKind(article, nextKind) {
      if (!article) return;
      article.kind = nextKind === "yds" ? "yds" : "external";
      article.updatedAt = new Date().toISOString();
      if (article.kind === "yds") {
        article.sourceType = "YDS";
        article.examType = article.examType || "YDS";
        article.questions = Array.isArray(article.questions) ? article.questions : [];
        article.answerKey = article.answerKey && typeof article.answerKey === "object" ? article.answerKey : {};
        article.userAnswers = article.userAnswers && typeof article.userAnswers === "object" ? article.userAnswers : {};
        article.lastStudiedAt = article.lastStudiedAt || article.lastReadAt || "";
      } else {
        article.sourceType = article.sourceType || "Serbest Okuma";
        article.sourceName = article.sourceName || "";
        article.sourceUrl = article.sourceUrl || "";
        article.notes = article.notes || "";
        article.lastReadAt = article.lastReadAt || article.lastStudiedAt || "";
      }
      saveArticles();
      renderMenu();
      renderArticlesPage();
    }

    function bindArticleResultControls() {
      document.querySelectorAll(".article-list-card").forEach(button => {
        button.addEventListener("click", () => {
          activeArticleId = button.dataset.id;
          articleLanguageView = "en";
          const article = articles.find(item => item.id === activeArticleId);
          if (article) {
            if (articleReadingStatus(article).key === "new") article.status = "reading";
            if (articleKind(article) === "yds") article.lastStudiedAt = new Date().toISOString();
            else article.lastReadAt = new Date().toISOString();
            saveArticles();
          }
          renderArticlesPage();
        });
      });
      document.querySelectorAll(".article-card-menu-btn").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          document.querySelectorAll(".article-card-menu.is-open").forEach(menu => {
            if (menu.dataset.id !== button.dataset.id) menu.classList.remove("is-open");
          });
          const menu = document.querySelector('.article-card-menu[data-id="' + CSS.escape(button.dataset.id || "") + '"]');
          if (menu) menu.classList.toggle("is-open");
        });
      });
      document.querySelectorAll(".article-card-rename").forEach(button => {
        button.addEventListener("click", () => {
          const article = articles.find(item => item.id === button.dataset.id);
          if (!article) return;
          const nextTitle = window.prompt("Yeni içerik adı", articleDisplayTitle(article));
          if (!nextTitle || !nextTitle.trim()) return;
          article.title = nextTitle.trim();
          article.updatedAt = new Date().toISOString();
          saveArticles();
          renderMenu();
          renderArticlesPage();
        });
      });
      document.querySelectorAll(".article-card-edit").forEach(button => {
        button.addEventListener("click", () => {
          const article = articles.find(item => item.id === button.dataset.id);
          if (article) openArticleEditModal(article);
        });
      });
      document.querySelectorAll(".article-card-translation").forEach(button => {
        button.addEventListener("click", () => {
          const article = articles.find(item => item.id === button.dataset.id);
          if (article) openArticleTranslationEditor(article);
        });
      });
      document.querySelectorAll(".article-card-change-kind").forEach(button => {
        button.addEventListener("click", () => {
          const article = articles.find(item => item.id === button.dataset.id);
          updateArticleKind(article, button.dataset.kind);
        });
      });
      document.querySelectorAll(".article-card-mark-read").forEach(button => {
        button.addEventListener("click", () => {
          const article = articles.find(item => item.id === button.dataset.id);
          if (!article) return;
          article.status = "completed";
          article.readingProgress = 100;
          if (articleKind(article) === "external" || isYdsArticleWorkComplete(article)) markArticleDailyCompletion(article);
          article.updatedAt = new Date().toISOString();
          saveArticles();
          renderMenu();
          renderArticlesPage();
        });
      });
      document.querySelectorAll(".article-card-delete").forEach(button => {
        button.addEventListener("click", () => {
          const article = articles.find(item => item.id === button.dataset.id);
          if (!article) return;
          if (!window.confirm('"' + articleDisplayTitle(article) + '" içeriğini silmek istiyor musun?')) return;
          articles = articles.filter(item => item.id !== article.id);
          if (activeArticleId === article.id) activeArticleId = "__list__";
          saveArticles();
          renderMenu();
          renderArticlesPage();
        });
      });
    }

    async function saveArticleFromInputs() {
      const titleInput = document.getElementById("articleTitleInput");
      const textInput = document.getElementById("articleTextInput");
      const file = document.getElementById("articlePdfInput")?.files?.[0];
      const status = document.getElementById("articleStatus");
      const saveButton = document.getElementById("saveArticleBtn");
      const previewPanel = document.getElementById("articlePreviewPanel");
      const previewText = document.getElementById("articlePreviewText");
      const previewSummary = document.getElementById("articlePreviewSummary");
      if (!saveButton || !status) return;
      if (saveButton.dataset.previewReady !== "1") {
        if (!file && !textInput.value.trim()) {
          status.textContent = "Önce PDF seç veya metin yapıştır.";
          return;
        }
        if (file && !window.pdfjsLib) {
          status.textContent = "PDF okuma kütüphanesi yüklenemedi.";
          return;
        }
        status.textContent = "Metin çıkarılıyor...";
        const rawText = file ? await extractPdfText(file, status) : textInput.value;
        const sections = splitArticleSections(rawText);
        const cleanText = normalizeArticleTextForReading(sections.text);
        previewText.value = cleanText;
        previewPanel.classList.remove("hidden");
        const paragraphCount = cleanText.split(/\n{2,}/).map(item => item.trim()).filter(Boolean).length;
        previewSummary.textContent = paragraphCount + " paragraf · " + articleWordCount(cleanText) + " kelime bulundu. Gerekirse metni düzenleyip onayla.";
        saveButton.dataset.previewReady = "1";
        saveButton.textContent = "Onayla ve Kaydet";
        status.textContent = "Ön izleme hazır. Kullanıcı onayı olmadan kayıt oluşturulmadı.";
        return;
      }

      const now = new Date().toISOString();
      const cleanText = normalizeArticleTextForReading(previewText.value);
      if (!cleanText) {
        status.textContent = "Kaydedilecek metin bulunamadı.";
        return;
      }
      const sections = splitArticleSections(cleanText);
      const kind = articleFormMode === "yds" ? "yds" : "external";
      const base = {
        id: "article-" + Date.now(),
        kind,
        title: titleInput.value.trim() || file?.name?.replace(/\.pdf$/i, "") || (kind === "yds" ? "YDS Okuma Parçası" : "Yeni Metin"),
        topic: document.getElementById("articleTopicInput")?.value?.trim() || "",
        level: document.getElementById("articleLevelInput")?.value?.trim() || "",
        text: normalizeArticleTextForReading(sections.text || cleanText),
        vocabulary: sections.vocabulary,
        sourceFile: file?.name || "",
        status: "new",
        readingProgress: 0,
        savedWords: [],
        createdAt: now,
        updatedAt: now,
      };
      const article = kind === "yds"
        ? normalizeArticleRecord({
            ...base,
            examType: document.getElementById("articleExamTypeInput")?.value || "YDS",
            year: document.getElementById("articleYearInput")?.value?.trim() || "",
            session: document.getElementById("articleSessionInput")?.value?.trim() || "",
            passageNumber: document.getElementById("articlePassageNumberInput")?.value?.trim() || "",
            questions: parseReadingQuestions(document.getElementById("articleQuestionsInput")?.value || ""),
            answerKey: parseReadingAnswerKey(document.getElementById("articleAnswerKeyInput")?.value || ""),
            userAnswers: {},
          })
        : normalizeArticleRecord({
            ...base,
            sourceName: document.getElementById("articleSourceNameInput")?.value?.trim() || "",
            sourceUrl: document.getElementById("articleSourceUrlInput")?.value?.trim() || "",
            publicationDate: "",
            notes: "",
      });
      articles.unshift(article);
      activeArticleId = article.id;
      saveArticles();
      renderArticlesPage();
    }

    function parseReadingAnswerKey(raw) {
      const answers = {};
      String(raw || "").replace(/(\d{1,3})\s*[-.:)]?\s*([A-E])/gi, (_, number, key) => {
        answers[String(Number(number))] = key.toUpperCase();
        return "";
      });
      return answers;
    }

    function parseReadingQuestions(raw) {
      const normalized = normalizeArticleTextForReading(raw || "")
        .replace(/\s+([A-E])\)/g, "\n$1)")
        .replace(/(^|\n)\s*(\d{1,3})[.)-]\s*/g, "\n$2. ");
      const blocks = normalized.split(/\n(?=\d{1,3}\.\s+)/).map(item => item.trim()).filter(Boolean);
      return blocks.map(block => {
        const numberMatch = block.match(/^(\d{1,3})\.\s*/);
        const number = numberMatch ? Number(numberMatch[1]) : 0;
        const withoutNumber = block.replace(/^\d{1,3}\.\s*/, "");
        const optionMatches = [...withoutNumber.matchAll(/([A-E])\)\s*([\s\S]*?)(?=\n[A-E]\)|$)/g)];
        const options = {};
        optionMatches.forEach(match => {
          options[match[1]] = match[2].replace(/\s+/g, " ").trim();
        });
        const prompt = withoutNumber.split(/\nA\)/)[0].replace(/\s+/g, " ").trim();
        return {
          id: "reading-q-" + (number || Date.now()) + "-" + Math.random().toString(16).slice(2),
          questionNumber: number || "",
          prompt,
          options,
        };
      }).filter(question => question.prompt && Object.keys(question.options).length >= 2);
    }

    function markArticleDailyCompletion(article) {
      if (!article?.id) return;
      const kind = articleKind(article);
      const taskKey = kind === "yds" ? "pastExamReading" : "externalReading";
      markDailyTaskItem(taskKey, article.id);
    }

    function isYdsArticleWorkComplete(article) {
      const questions = Array.isArray(article?.questions) ? article.questions : [];
      if (articleKind(article) !== "yds") return false;
      if (!questions.length) return article.status === "completed";
      const answers = article.userAnswers || {};
      return questions.every(question => answers[question.questionNumber]);
    }

    function renderYdsReadingQuestions(article) {
      if (articleKind(article) !== "yds") return "";
      const questions = Array.isArray(article.questions) ? article.questions : [];
      if (!questions.length) {
        return '<section class="mx-auto mt-4 max-w-[900px] rounded-2xl border p-4" style="border-color: var(--border-color); background: var(--bg-surface-secondary)"><h4 class="text-lg font-black" style="color: var(--text-primary)">Sorular</h4><p class="mt-2 text-sm font-semibold" style="color: var(--text-secondary)">Bu parçaya henüz soru eklenmedi.</p></section>';
      }
      const answers = article.userAnswers || {};
      return '<section class="mx-auto mt-4 max-w-[900px] rounded-2xl border p-4" style="border-color: var(--border-color); background: var(--bg-surface-secondary)">' +

    function bindArticleReadingProgress(article) {
      if (articleReadingScrollCleanup) articleReadingScrollCleanup();
      const body = document.getElementById("articleReadingBody");
      const toolbar = document.getElementById("articleReaderToolbar");
      const progress = document.getElementById("articleReadingProgressValue");
      if (!body || !toolbar || !progress) return;
      const storageKey = articleScrollStorageKey(article);
      const savedScroll = Number(localStorage.getItem(storageKey) || 0);
      let lastScrollY = window.scrollY;
      let frame = 0;
      let saveTimer = 0;
      const update = () => {
        frame = 0;
        const maxScroll = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
        const currentScroll = Math.max(0, window.scrollY);
        const percent = Math.max(0, Math.min(100, Math.round((currentScroll / maxScroll) * 100)));
        progress.style.width = percent + "%";
        progress.parentElement?.setAttribute("aria-valuenow", String(percent));
        toolbar.classList.toggle("is-compact", currentScroll > 140 && currentScroll > lastScrollY);
        lastScrollY = currentScroll;
      };
      const onScroll = () => {
        if (!frame) frame = window.requestAnimationFrame(update);
        if (saveTimer) window.clearTimeout(saveTimer);
        saveTimer = window.setTimeout(() => localStorage.setItem(storageKey, String(Math.round(window.scrollY))), 160);
      };
      window.addEventListener("scroll", onScroll, { passive: true });
      window.addEventListener("resize", onScroll);
      window.requestAnimationFrame(() => {
        const maxScroll = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
        if (savedScroll > 0) window.scrollTo({ top: Math.min(savedScroll, maxScroll), behavior: "auto" });
        update();
      });
      articleReadingScrollCleanup = () => {
        window.removeEventListener("scroll", onScroll);
        window.removeEventListener("resize", onScroll);
        if (frame) window.cancelAnimationFrame(frame);
        if (saveTimer) window.clearTimeout(saveTimer);
        articleReadingScrollCleanup = null;
      };
    }

    function articleLocatorFromToken(token, article) {
      const normalizedText = normalizeArticleTextForReading(article?.text || "");
      const start = Number(token?.dataset?.start || 0);
      const end = Number(token?.dataset?.end || start);
      const selectedText = token?.dataset?.selectedText || normalizedText.slice(start, end) || token?.textContent || "";
      return makeArticleSourceLocator(article, selectedText, start, end, normalizedText);
    }

    function articleLocatorFromSelection(article) {
      const selection = window.getSelection();
      if (!selection || selection.isCollapsed) return null;
      const body = document.getElementById("articleReadingBody");
      if (!body || !body.contains(selection.anchorNode) || !body.contains(selection.focusNode)) return null;
      const range = selection.getRangeAt(0);
      const tokens = Array.from(body.querySelectorAll(".word-token")).filter(token => range.intersectsNode(token));
      if (!tokens.length) return null;
      const starts = tokens.map(token => Number(token.dataset.start)).filter(Number.isFinite);
      const ends = tokens.map(token => Number(token.dataset.end)).filter(Number.isFinite);
      if (!starts.length || !ends.length) return null;
      const start = Math.min(...starts);
      const end = Math.max(...ends);
      const normalizedText = normalizeArticleTextForReading(article?.text || "");
      const selectedText = normalizedText.slice(start, end).trim() || selection.toString().trim();
      if (!/[A-Za-z]/.test(selectedText)) return null;
      return makeArticleSourceLocator(article, selectedText, start, end, normalizedText);
    }

          if (!locator || normalizeLookup(locator.selectedText).length < 2) return;
          const target = event.target?.closest?.(".word-token") || body;
          const key = normalizeLookup(locator.selectedText.split(/\s+/)[0] || locator.selectedText);
          openArticleWordPopover(target, locator.selectedText, article, vocabMap[key] || null, locator);
        }, 0);
      };
      body.addEventListener("mouseup", openFromSelection);
      body.addEventListener("keyup", event => {
        if (event.key === "Shift" || event.key.startsWith("Arrow")) openFromSelection(event);
      });
    }

    function parseBilingualTxt(raw) {
      const text = String(raw || "").replace(/\r\n?/g, "\n");
      const errors = [];
      if (!/^\s*BILINGUAL ARTICLE\s*$/mi.test(text)) errors.push("BILINGUAL ARTICLE başlığı bulunamadı.");
      const titleEn = (text.match(/^TITLE_EN:\s*(.+)$/mi) || [])[1]?.trim() || "";
      const titleTr = (text.match(/^TITLE_TR:\s*(.+)$/mi) || [])[1]?.trim() || "";
      if (!titleEn || !titleTr) errors.push("TITLE_EN ve TITLE_TR alanları dolu olmalı.");
      const markers = [...text.matchAll(/^\[PARAGRAPH\s+(\d+)\]\s*$/gmi)], seen = new Set();
      const pairs = markers.map((marker, index) => { const number = Number(marker[1]); if (seen.has(number)) errors.push(number + ". paragraf numarası tekrar ediyor."); seen.add(number); const block = text.slice(marker.index + marker[0].length, markers[index + 1]?.index || text.length); const en = (block.match(/^EN:\s*\n?([\s\S]*?)(?=^TR:\s*$)/mi) || [])[1]?.trim() || ""; const tr = (block.match(/^TR:\s*\n?([\s\S]*)$/mi) || [])[1]?.trim() || ""; if (!en || !tr) errors.push(number + ". paragrafın EN ve TR alanları dolu olmalı."); return { id: "paragraph-" + number, number, en, tr }; });
      if (!pairs.length) errors.push("En az bir [PARAGRAPH n] bölümü gerekli.");
      if (pairs.map(pair => pair.number).sort((a, b) => a - b).some((number, index) => number !== index + 1)) errors.push("Paragraf numaraları 1’den başlayarak sıralı olmalı.");
      return { titleEn, titleTr, pairs, errors };
    }

    function openBilingualTxtImportModal(preselectedId = "") {

    function parseTextSource(raw) {
      const text = String(raw || "").replace(/^\uFEFF/, "").replace(/\r\n?/g, "\n").replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F]/g, "").trim();
      const questions = [], blocks = [], errors = [];
      let block = null, question = null, part = "stem", readingShared = false;
      const add = (object, key, value) => { const clean = String(value || "").trim(); if (clean) object[key] = object[key] ? object[key] + "\n" + clean : clean; };
      const closeQuestion = () => {
        if (!question) return;
        ["A", "B", "C", "D", "E"].forEach(key => { if (!question.options[key]) errors.push("Soru " + question.questionNumber + ": " + key + " seçeneği bulunamadı."); });
        if (!/[A-E]/.test(question.correctAnswer || "")) errors.push("Soru " + question.questionNumber + ": Doğru cevap geçersiz veya eksik.");
        if (!question.question && !block) errors.push("Soru " + question.questionNumber + ": soru kökü bulunamadı.");
        questions.push(question); question = null; part = "stem";
      };
      const closeBlock = () => {
        if (!block) return;
        const count = questions.filter(item => item.blockId === block.id).length;
        if (!block.sharedText) errors.push(block.title + ": ortak metin/pasaj bulunamadı.");
        if (count !== block.endQuestion - block.startQuestion + 1) errors.push(block.title + ": " + block.startQuestion + "–" + block.endQuestion + " bekleniyordu, " + count + " soru bulundu.");
        blocks.push(block); block = null; readingShared = false;
      };
      text.split("\n").forEach(rawLine => {
        const line = rawLine.trim();
        const heading = line.replace(/^#{1,6}\s*/, "");
        const range = heading.match(/(?:sorular?\s*)?(\d+)\s*[-–—]\s*(\d+)/i);
        const type = /cloze\s*test/i.test(heading) ? "cloze_test" : /(reading\s*passage|okuma\s*parçası)/i.test(heading) ? "reading_passage" : "";
        if (type && range) {
          closeQuestion(); closeBlock();
          block = { id: "block-" + range[1] + "-" + range[2], type, title: heading, startQuestion: Number(range[1]), endQuestion: Number(range[2]), sharedText: "" };
          return;
        }
        const questionHeader = heading.match(/^soru\s+(\d+)\s*$/i);
        if (questionHeader) {
          closeQuestion();
          const number = Number(questionHeader[1]);
          if (block && (number < block.startQuestion || number > block.endQuestion)) closeBlock();
          question = { questionNumber: number, type: block?.type === "cloze_test" ? "cloze_question" : block?.type === "reading_passage" ? "reading_question" : "standard", question: "", options: {}, correctAnswer: null, blockId: block?.id || null, blankNumber: block?.type === "cloze_test" ? number : null, passage: block?.sharedText || "" };
          return;
        }
        if (!line) return;
        if (block && !question && /^(metin|pasaj)\s*:/i.test(line)) { readingShared = true; add(block, "sharedText", line.replace(/^(metin|pasaj)\s*:\s*/i, "")); return; }
        if (block && !question && readingShared) { add(block, "sharedText", line); return; }
        if (!question) return;
        const answer = line.match(/^doğru\s*cevap\s*:\s*([A-E])\s*$/i);
        if (answer) { question.correctAnswer = answer[1].toUpperCase(); return; }
        const option = line.match(/^\*?\s*([A-E])\s*(?:\)|\.|-)\s*(.*)$/i);
        if (option) { part = option[1].toUpperCase(); question.options[part] = option[2].trim(); return; }
        if (part === "stem") add(question, "question", line.replace(/^soru\s*kökü\s*:\s*/i, ""));
        else add(question.options, part, line);
      });
      closeQuestion(); closeBlock();
      const seen = new Set(), duplicates = [];
      questions.forEach(item => { if (seen.has(item.questionNumber)) duplicates.push(item.questionNumber); seen.add(item.questionNumber); });
      [...new Set(duplicates)].forEach(number => errors.push("Soru " + number + " iki kez bulundu."));
      const expectedTotal = Math.max(...seen, 0);
      const missing = Array.from({ length: expectedTotal }, (_, index) => index + 1).filter(number => !seen.has(number));
      if (!expectedTotal) errors.push("Hiç soru bulunamadı.");
      if (missing.length) errors.push("Eksik soru numaraları: " + missing.join(", ") + ".");
      return { text, questions, blocks, report: { expectedTotal, foundTotal: questions.length, missing, errors, valid: !errors.length } };
    }

      preview.innerHTML = '<div class="rounded-2xl border border-slate-800 bg-slate-950 p-4"><h4 class="font-semibold text-white">Ön izleme ve doğrulama</h4><div class="mt-3 grid gap-2 text-sm md:grid-cols-2"><p class="rounded-xl bg-slate-900 p-3 text-slate-300">Beklenen toplam: <b class="text-white">' + parsed.report.expectedTotal + '</b></p><p class="rounded-xl bg-slate-900 p-3 text-slate-300">Bulunan toplam: <b class="text-white">' + parsed.report.foundTotal + '</b></p><p class="rounded-xl bg-slate-900 p-3 text-slate-300">Eksik sorular: <b class="text-white">' + (parsed.report.missing.length ? parsed.report.missing.join(", ") : "Yok") + '</b></p><p class="rounded-xl bg-slate-900 p-3 text-slate-300">Bloklar: <b class="text-white">' + (parsed.blocks.length || "Yok") + '</b></p></div>' + (parsed.blocks.length ? '<div class="mt-3 grid gap-2">' + parsed.blocks.map(block => '<p class="rounded-xl bg-slate-900 p-3 text-sm text-slate-300"><b class="text-white">' + escapeHtml(block.title) + '</b> · ' + block.startQuestion + '–' + block.endQuestion + '</p>').join("") + '</div>' : '') + (parsed.report.errors.length ? '<ul class="mt-3 list-disc space-y-1 rounded-xl border border-red-500/50 bg-red-950/30 p-4 pl-8 text-sm text-red-100">' + parsed.report.errors.map(error => '<li>' + escapeHtml(error) + '</li>').join("") + '</ul>' : '<p class="mt-3 rounded-xl border border-emerald-500/40 bg-emerald-950/30 p-3 text-sm font-semibold text-emerald-100">Eksik veya hatalı kayıt yok.</p>') + (parsed.report.valid ? '<button id="saveTextImportBtn" class="mt-4 rounded-2xl bg-emerald-600 px-6 py-3 font-semibold text-white hover:bg-emerald-500">Doğrulanmış Kaynağı Kaydet</button>' : '') + '</div>';
      document.getElementById("saveTextImportBtn")?.addEventListener("click", saveTextSource);
    }

    function compactUploadedSourcesForStorage(bank) {
      return {
        ...bank,
        documents: (Array.isArray(bank?.documents) ? bank.documents : []).map(document => {
          // Sorular zaten ayrı kaydedilir; ham metin yalnızca düzenleme kolaylığı sağlar.
          // Kota dolduğunda ham metni kaldırmak mevcut kaynakları silmeden yer açar.
          const { sourceText, rawText, extractedText, ...compactDocument } = document;
          return compactDocument;
        }),
      };
    }

    function saveTextSource() {
      if (!lastTextImport?.report.valid || isSavingTextImport) return;
      isSavingTextImport = true;
      const title = document.getElementById("textTitle").value.trim() || "Adsız TXT Kaynağı";
      const docId = "text-" + Date.now();
      const collection = uploadTargetModule === "yds" ? "yds" : "exams";
      const blocks = lastTextImport.blocks.map(block => ({ ...block, id: docId + "-" + block.id }));
      const blockMap = new Map(lastTextImport.blocks.map((block, index) => [block.id, blocks[index]]));
      const questions = lastTextImport.questions.map(item => {
        const block = blockMap.get(item.blockId);
        return { ...item, id: docId + "-q-" + String(item.questionNumber).padStart(3, "0"), documentId: docId, setId: block ? block.id : docId + "-standard", category: title, sourcePage: null, builtIn: false, importMethod: "text", blockId: block?.id || null, passage: block?.sharedText || item.passage || "" };
      });
      const now = new Date().toISOString();
      const sourceRecord = { id: docId, title, questionCount: questions.length, totalQuestions: questions.length, blocks, collection, builtIn: false, importMethod: "text", sourceText: lastTextImport.text, createdAt: now, updatedAt: now };
      const nextUploadedBank = {
        ...uploadedBank,
        documents: [...(Array.isArray(uploadedBank?.documents) ? uploadedBank.documents : []), sourceRecord],
        questions: [...(Array.isArray(uploadedBank?.questions) ? uploadedBank.questions : []), ...questions],
      };
      let savedBank = nextUploadedBank;
      try {
        saveJson(STORAGE_UPLOADS, savedBank);
      } catch (error) {
        try {
          savedBank = compactUploadedSourcesForStorage(nextUploadedBank);
          saveJson(STORAGE_UPLOADS, savedBank);
        } catch (retryError) {
          const status = document.getElementById("textImportStatus");
          if (status) status.textContent = "Kaynak kaydedilemedi: cihaz belleği dolu. Ayarlar'dan yedek aldıktan sonra kullanılmayan kaynakları silip tekrar deneyin.";
          isSavingTextImport = false;
          return;
        }
      }
      uploadedBank = savedBank;
      rebuildBank();
      activeDocumentId = docId;
      currentIndex = 0;
      answered = false;
      solveMode = "document";
      wrongReviewIds = [];
      setView(collection);
      const sourceList = appArea.querySelector("section");
      if (sourceList) sourceList.insertAdjacentHTML("afterbegin", '<p role="status" class="mb-3 rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-bold text-emerald-800">“' + escapeHtml(title) + '” kaydedildi ve bu bölüme eklendi (' + questions.length + ' soru).</p>');
      isSavingTextImport = false;
    }

    async function parseSelectedPdf() {
      const file = document.getElementById("pdfInput").files[0];
      const title = document.getElementById("uploadTitle").value.trim() || file?.name?.replace(/\.pdf$/i, "") || "Yüklenen PDF";

        status.textContent = "PDF okuma kütüphanesi yüklenemedi. İnternet bağlantısı gerekiyorsa bağlantıyı kontrol edip tekrar dene.";
        return;
      }
      status.textContent = "PDF okunuyor, birkaç saniye sürebilir...";
      preview.innerHTML = "";
      const text = await extractQuestionPdfText(file, status);
      const extractedPreview = text.replace(/\s+/g, " ").trim().slice(0, 700);
      const pdfAnswerSets = parseAnswerKeySetsFromPdfText(text);
      const manualAnswerMap = parseAnswerKey(document.getElementById("answerKeyInput").value);
      const parsedQuestions = parseQuestionsFromText(text, title, { sets: pdfAnswerSets, manual: manualAnswerMap });
      const validation = validatePdfImport(parsedQuestions, { sets: pdfAnswerSets, manual: manualAnswerMap }, lastPdfImportReport);
      const answerCount = parsedQuestions.filter(question => question.correctAnswer).length;
      const partialWarning = /yds/i.test(title) && parsedQuestions.length > 0 && parsedQuestions.length < 70
        ? " Bu çıkmış YDS PDF’si kısmi okunmuş olabilir; yine de bulunan soruları kaydedebilirsin."
        : "";
      status.textContent = parsedQuestions.length + " soru bulundu" + (answerCount ? ", " + answerCount + " cevap anahtarı eşleşti." : ".") + (validation.ok ? " Kaydetmeye hazır." : " Bazı alanlar manuel kontrol gerektiriyor.");
      if (!parsedQuestions.length) {
        preview.innerHTML =
          '<div class="rounded-2xl border border-amber-500/50 bg-amber-950/30 p-4 text-amber-100">' +
            '<p class="font-semibold">Bu PDF’den metin okundu ama soru kalıbı yakalanamadı.</p>' +
            '<p class="mt-2 text-sm">Uygulama şu kalıplara yakın testleri otomatik çıkarır: 1. soru metni A) ... B) ... C) ... D) ... E) ... veya A. / (A) biçimi. Bu PDF farklı dizilmiş, tablo gibi aktarılmış ya da taranmış görsel olabilir.</p>' +
            (extractedPreview ? '<div class="mt-4 rounded-xl border border-amber-400/30 bg-slate-950/40 p-3 text-sm text-amber-50"><p class="mb-2 font-semibold">PDF’den okunan ilk metin:</p>' + escapeHtml(extractedPreview) + '</div>' : '<p class="mt-3 text-sm">PDF’den seçilebilir metin de okunamadı. Bu dosya taranmış görsel PDF olabilir.</p>') +
          '</div>';
        return;
      }
      preview.innerHTML =
        '<div class="mt-4 rounded-2xl border border-slate-800 bg-slate-950 p-4">' +

          renderImportValidation(validation) +
          '<div class="mt-3 rounded-xl bg-slate-900 p-3 text-sm text-slate-300">' + escapeHtml(parsedQuestions[0].question.slice(0, 300)) + '...</div>' +
          (validation.canSave
            ? '<button id="importPdfBtn" class="mt-4 rounded-2xl bg-emerald-600 px-6 py-3 font-semibold text-white hover:bg-emerald-500">' + (validation.ok ? "Bu PDF’yi Kaydet" : "Bulunan Soruları Kaydet") + '</button>'
            : '<div class="mt-4 rounded-2xl border border-amber-400/40 bg-amber-950/30 p-3 text-sm font-semibold text-amber-100">Beş şıkkı olmayan veya aynı set içinde tekrarlanan sorular var. Kaydetmeden önce manuel kontrol etmelisin.</div>') +
        '</div>';
      const importPdfBtn = document.getElementById("importPdfBtn");
      if (importPdfBtn) importPdfBtn.addEventListener("click", () => importParsedPdf(title, parsedQuestions, text));

    function formatSetIssues(issues) {
      return issues.length ? issues.map(item => {
        const visible = item.values.slice(0, 12).join(", ");
        const hidden = item.values.length > 12 ? " ... +" + (item.values.length - 12) + " daha" : "";
        return item.setLabel + ": " + visible + hidden;
      }).join(" | ") : "Yok";
    }

    function validatePdfImport(parsedQuestions, answerSource, pageReport) {
      const answerSets = answerSource?.sets || [];
      const manualAnswers = answerSource?.manual || {};
      const groups = [];
      parsedQuestions.forEach(question => {
        let group = groups.find(item => item.setId === question.setId);
        if (!group) {
          group = { setId: question.setId, questions: [] };
          groups.push(group);
        }
        group.questions.push(question);
      });
      const duplicateQuestions = [];
      const incompleteQuestions = [];
      const missingAnswers = [];
      groups.forEach((group, groupIndex) => {
        const setLabel = "Set " + String(groupIndex + 1).padStart(2, "0");
        const numbers = group.questions.map(question => question.questionNumber);
        const answerNumbers = Object.keys(answerSets[groupIndex] || {}).map(Number).filter(Boolean);
        const duplicate = [...new Set(numbers.filter((number, index) => numbers.indexOf(number) !== index))];
        const incomplete = group.questions
          .filter(question => Object.keys(question.options || {}).length !== 5 || ["A", "B", "C", "D", "E"].some(key => !String(question.options?.[key] || "").trim()))
          .map(question => question.questionNumber);
        const missingAnswer = group.questions
          .filter(question => !question.correctAnswer && (answerNumbers.length || Object.keys(manualAnswers).length))
          .map(question => question.questionNumber);
        if (duplicate.length) duplicateQuestions.push({ setLabel, values: duplicate });
        if (incomplete.length) incompleteQuestions.push({ setLabel, values: incomplete });
        if (missingAnswer.length) missingAnswers.push({ setLabel, values: missingAnswer });
      });
      const answerCount = parsedQuestions.filter(question => question.correctAnswer).length;
      return {
        expectedQuestions: parsedQuestions.length,
        foundQuestions: parsedQuestions.length,
        answerCount,
        duplicateQuestions,
        incompleteQuestions,
        missingAnswers,
        ocrPages: pageReport?.ocrPages || [],
        failedPages: pageReport?.failedPages || [],
        manualReviewQuestions: [...incompleteQuestions, ...missingAnswers],
        canSave: parsedQuestions.length > 0 && !duplicateQuestions.length && !incompleteQuestions.length,
        ok: parsedQuestions.length > 0 && !duplicateQuestions.length && !incompleteQuestions.length && !missingAnswers.length,
      };
    }

    function renderImportValidation(report) {
      const toneClass = tone => ({
        emerald: "text-emerald-200",
        amber: "text-amber-200",
        red: "text-red-200",
        slate: "text-slate-200",
      }[tone] || "text-slate-200");
      const row = (label, value, tone = "slate") => '<div class="rounded-xl border border-slate-800 bg-slate-900 p-3"><p class="text-xs font-bold uppercase tracking-wide text-slate-500">' + label + '</p><p class="mt-1 text-sm font-bold ' + toneClass(tone) + '">' + escapeHtml(value) + '</p></div>';
      return '<div class="mt-3 grid gap-2 md:grid-cols-2">' +
        row("Bulunan soru", report.foundQuestions, "emerald") +
        row("Cevap anahtarı", report.answerCount ? (report.missingAnswers.length ? report.answerCount + " cevap eşleşti, bazıları boş" : report.answerCount + " cevap uyumlu") : "Yok (opsiyonel)", report.missingAnswers.length ? "amber" : "emerald") +
        row("Beş şıkkı olmayan", formatSetIssues(report.incompleteQuestions), report.incompleteQuestions.length ? "amber" : "emerald") +
        row("Tekrarlanan soru", formatSetIssues(report.duplicateQuestions), report.duplicateQuestions.length ? "amber" : "emerald") +
        row("Cevapsız soru", formatSetIssues(report.missingAnswers), report.missingAnswers.length ? "amber" : "emerald") +
        row("OCR kullanılan sayfalar", report.ocrPages.length ? report.ocrPages.join(", ") : "Yok") +
        row("Hatalı sayfalar", report.failedPages.length ? report.failedPages.map(item => item.page).join(", ") : "Yok", report.failedPages.length ? "red" : "emerald") +
      '</div>';
    }

    async function extractQuestionPdfText(file, status = null) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const pageNumbers = Array.from({ length: pdf.numPages }, (_, index) => index + 1);
      lastPdfImportReport = {
        expectedQuestions: null,
        pageCount: pdf.numPages,
        ocrPages: [],
        failedPages: [],
        incompletePages: [],
      };
      const settled = await Promise.allSettled(pageNumbers.map(pageNumber => processQuestionPdfPage(pdf, pageNumber, status)));
      const pages = settled.map((result, index) => {
        const pageNumber = pageNumbers[index];
        if (result.status === "fulfilled") return result.value;
        lastPdfImportReport.failedPages.push({ page: pageNumber, error: result.reason?.message || String(result.reason) });
        return { page: pageNumber, text: "", extraction: "error" };
      });
      if (status) status.textContent = "Sonuç doğrulanıyor...";
      return pages.sort((a, b) => a.page - b.page).map(page => page.text).join("\n");
    }

    async function processQuestionPdfPage(pdf, pageNumber, status = null) {
      if (status) status.textContent = "Sayfa " + pageNumber + " / " + pdf.numPages + " okunuyor";
      const page = await pdf.getPage(pageNumber);
      const viewport = page.getViewport({ scale: 1 });
      const content = await page.getTextContent();
      const items = content.items
        .map(item => ({
          text: normalizePdfImportText(String(item.str || "").trim()),
          x: item.transform?.[4] || 0,
          y: item.transform?.[5] || 0,
        }))
        .filter(item => item.text);
      const midpoint = viewport.width / 2;
      const leftItems = items.filter(item => item.x < midpoint - 8);
      const rightItems = items.filter(item => item.x >= midpoint - 8);
      const hasTwoColumns = leftItems.length > 20 && rightItems.length > 20;
      let text = hasTwoColumns ? layoutPdfItems(leftItems) + "\n" + layoutPdfItems(rightItems) : layoutPdfItems(items);
      let extraction = "text";
      if (isIncompletePdfPageText(text) && !/answer\s*key|cevap\s*anahtar|\banswer\b/i.test(text)) {
        lastPdfImportReport.incompletePages.push(pageNumber);
        if (window.Tesseract) {
          if (status) status.textContent = "Sayfa " + pageNumber + " / " + pdf.numPages + " OCR uygulanıyor";
          text = await ocrQuestionPdfPage(page);
          extraction = "ocr";
          lastPdfImportReport.ocrPages.push(pageNumber);
        }
      }
      if (status) status.textContent = "Sayfa " + pageNumber + " / " + pdf.numPages + " ayrıştırılıyor";
      return { page: pageNumber, text: normalizePdfImportText(text), extraction };
    }

    async function ocrQuestionPdfPage(page) {
      const viewport = page.getViewport({ scale: 2.2 });
      const canvas = document.createElement("canvas");
      canvas.width = Math.ceil(viewport.width);
      canvas.height = Math.ceil(viewport.height);
      const context = canvas.getContext("2d", { willReadFrequently: true });
      await page.render({ canvasContext: context, viewport }).promise;
      const result = await Tesseract.recognize(canvas, "eng");
      return result?.data?.text || "";
    }

    function normalizePdfImportText(value) {
      return String(value || "")
        .replace(/[‘’]/g, "'")
        .replace(/[“”]/g, '"')
        .replace(/[‐‑‒–—−]/g, "-")
        .replace(/\u00a0/g, " ")
        .replace(/\bO\s*\)/g, "D)")
        .replace(/[¢€]\s*\)/g, "C)")
        .replace(/([A-E])\s*[\).]\s*/g, " $1) ")
        .replace(/\s+([,.!?;:])/g, "$1")
        .replace(/[ \t]+/g, " ")
        .trim();
    }

    function isIncompletePdfPageText(text) {
      const clean = normalizePdfImportText(text);
      if (clean.length < 150) return true;
      if (!/(?:Soru\s*No\s*:?)?\s*\b\d{1,2}\b/i.test(clean)) return true;
      return (clean.match(/\b[A-E]\)/g) || []).length < 5;
    }

    function layoutPdfItems(items) {
      const lines = [];
      [...items].sort((a, b) => b.y - a.y || a.x - b.x).forEach(item => {
        let line = lines.find(candidate => Math.abs(candidate.y - item.y) < 3);
        if (!line) {
          line = { y: item.y, items: [] };
          lines.push(line);
        }
        line.items.push(item);
      });
      return lines
        .sort((a, b) => b.y - a.y)
        .map(line => line.items.sort((a, b) => a.x - b.x).map(item => item.text).join(" "))
        .join("\n")
        .replace(/[ \t]+/g, " ")
        .replace(/\s+([,.!?;:])/g, "$1");
    }

    function parseAnswerKey(value) {
      const map = {};
      const matches = String(value || "").matchAll(/(\d{1,3})\s*[-:.\)]?\s*([A-E])/gi);
      for (const match of matches) map[Number(match[1])] = match[2].toUpperCase();
      return map;
    }

    function compactAnswerKeySlice(raw, start, end) {
      const selected = [];
      let pairCount = 0;
      String(raw || "").slice(start, end).split(/\n+/).forEach(line => {
        const normalized = normalizePdfImportText(line);
        if (!normalized) return;
        const pairs = [...normalized.matchAll(/\b\d{1,3}\s*[-:.\)]?\s*[A-E]\b/gi)].length;
        const markerLike = /answer\s*key|\banswers?\b|cevap\s*anahtar[ıi]|\bcevap(?:lar[ıi])?\b|\byan[ıi]t(?:lar[ıi])?\b|doğru\s*cevap/i.test(normalized);
        if (markerLike || pairs) {
          selected.push(normalized);
          pairCount += pairs;
          return;
        }
        if (pairCount && normalized.length > 35) return;
        if (!pairCount && selected.length < 2) selected.push(normalized);
      });
      return selected.join("\n");
    }

    function parseAnswerKeySetsFromPdfText(text) {
      const raw = String(text || "");
      const markerRegex = /answer\s*key|\banswers?\b|cevap\s*anahtar[ıi]|\bcevap(?:lar[ıi])?\b|\byan[ıi]t(?:lar[ıi])?\b|doğru\s*cevap(?:lar[ıi])?/gi;
      const markers = [...raw.matchAll(markerRegex)];
      const sets = [];
      markers.forEach((marker, index) => {
        const nextMarker = markers[index + 1]?.index ?? raw.length;
        const sliceEnd = Math.min(nextMarker, marker.index + 4500);
        const keySlice = compactAnswerKeySlice(raw, marker.index, sliceEnd);
        const map = parseAnswerKey(keySlice);
        if (Object.keys(map).length >= 3) sets.push(map);
      });
      return sets;
    }

    function parseAnswerKeyFromPdfText(text) {
      const raw = String(text || "");
      const markers = [...raw.matchAll(/answer\s*key|\banswer\b|cevap\s*anahtar[ıi]|\bcevap\b/gi)];
      const marker = markers[markers.length - 1];
      if (!marker || marker.index < raw.length * 0.5) return {};
      return parseAnswerKey(raw.slice(marker.index));
    }

    function resolveQuestionAnswer(answerSource, setIndex, number) {
      const answerSets = answerSource?.sets || [];
      const manualAnswers = answerSource?.manual || {};
      return answerSets[setIndex]?.[number] || manualAnswers[number] || null;
    }

    function cleanImportedQuestionText(value) {
      return normalizePdfImportText(value)
        .replace(/^\d{4}\s+[A-Za-zÇĞİÖŞÜçğıöşü]+\s+YDS\s*/i, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function parseOptionBlock(block) {
      const markers = [...String(block || "").matchAll(/\b([A-EOaeo])\)/g)]
        .map(match => ({
          key: (match[1].toUpperCase() === "O" ? "D" : match[1].toUpperCase()),
          start: match.index,
          end: match.index + match[0].length,
        }))
        .filter(marker => ["A", "B", "C", "D", "E"].includes(marker.key));
      const firstFive = [];
      for (const key of ["A", "B", "C", "D", "E"]) {
        const next = markers.find(marker => marker.key === key && (!firstFive.length || marker.start > firstFive[firstFive.length - 1].start));
        if (!next) return null;
        firstFive.push(next);
      }
      const options = {};
      firstFive.forEach((marker, index) => {
        const next = firstFive[index + 1];
        const end = next ? next.start : block.length;
        options[marker.key] = cleanImportedQuestionText(block.slice(marker.end, end).replace(/\b\d{1,3}\s*[\).]?\s*$/g, ""));
      });
      return ["A", "B", "C", "D", "E"].every(key => options[key]) ? options : null;
    }

    function parseNumberedOptionGroups(segment, rangeStart, rangeEnd) {
      const starts = [...segment.matchAll(/\b(\d{1,3})\s*[\).]?\s*A\)/g)]
        .map(match => ({ number: Number(match[1]), start: match.index }))
        .filter(item => item.number >= rangeStart && item.number <= rangeEnd)
        .sort((a, b) => a.start - b.start);
      const groups = new Map();
      starts.forEach((item, index) => {
        const end = starts[index + 1]?.start ?? segment.length;
        const block = segment.slice(item.start, end).replace(/^\s*\d{1,3}\s*[\).]?\s*/, "");
        const options = parseOptionBlock(block);
        if (options) groups.set(item.number, { options, start: item.start });
      });
      return groups;
    }

    function parseGroupedQuestionsFromText(text, title, answerSource, docId) {
      const clean = String(text || "").replace(/\r/g, "\n").replace(/[ \t]+/g, " ");
      const rangeHeaders = [...clean.matchAll(/\b(\d{1,3})\s*-\s*(\d{1,3})\s*:\s*([^\n]+)/gi)]
        .map(match => ({
          startNumber: Number(match[1]),
          endNumber: Number(match[2]),
          label: match[3],
          start: match.index,
          end: match.index + match[0].length,
        }))
        .filter(header => header.startNumber >= 1 && header.endNumber <= 120 && header.endNumber > header.startNumber);
      if (!rangeHeaders.length) return [];

      const questions = [];
      const setId = docId + "-set-01";
      rangeHeaders.forEach((header, headerIndex) => {
        const segmentEnd = rangeHeaders[headerIndex + 1]?.start ?? clean.length;
        const segment = clean.slice(header.start, segmentEnd);
        const body = segment.slice(header.end - header.start);
        const headerLabel = header.label.toLowerCase();
        const isClozeGroup = /fill\s+the\s+spaces|fill\s+in\s+the\s+blanks|choose\s+the\s+best\s+word|expression\s+to\s+fill/i.test(headerLabel);
        const isReadingGroup = /according\s+to\s+the\s+passage|passage\s+below|answer\s+these\s+questions/i.test(headerLabel);

        if (isClozeGroup) {
          const optionGroups = parseNumberedOptionGroups(body, header.startNumber, header.endNumber);
          const firstOptionStart = Math.min(...[...optionGroups.values()].map(group => group.start));
          if (!Number.isFinite(firstOptionStart)) return;
          const passage = cleanImportedQuestionText(body.slice(0, firstOptionStart));
          for (let number = header.startNumber; number <= header.endNumber; number++) {
            const group = optionGroups.get(number);
            if (!group || !passage) continue;
            questions.push({
              id: setId + "-q-" + String(number).padStart(3, "0"),
              documentId: docId,
              setId,
              category: title,
              questionNumber: number,
              sourcePage: null,
              question: passage + "\n\n(" + number + ") numaralı boşluk için en uygun seçeneği seç.",
              options: group.options,
              correctAnswer: resolveQuestionAnswer(answerSource, 0, number),
              builtIn: false,
            });
          }
          return;
        }

        if (isReadingGroup) {
          const questionStarts = [];
          for (let number = header.startNumber; number <= header.endNumber; number++) {
            const match = body.match(new RegExp("\\b" + number + "\\s*[\\).]\\s+"));
            if (match && match.index !== undefined) questionStarts.push({ number, start: match.index, end: match.index + match[0].length });
          }
          questionStarts.sort((a, b) => a.start - b.start);
          if (!questionStarts.length) return;
          const passage = cleanImportedQuestionText(body.slice(0, questionStarts[0].start));
          questionStarts.forEach((item, index) => {
            const end = questionStarts[index + 1]?.start ?? body.length;
            const block = body.slice(item.start, end);
            const aMarker = block.search(/\bA\)/);
            if (aMarker < 0) return;
            const questionStem = cleanImportedQuestionText(block.slice(item.end - item.start, aMarker));
            const options = parseOptionBlock(block.slice(aMarker));
            if (!passage || !questionStem || !options) return;
            questions.push({
              id: setId + "-q-" + String(item.number).padStart(3, "0"),
              documentId: docId,
              setId,
              category: title,
              questionNumber: item.number,
              sourcePage: null,
              question: passage + "\n\n" + questionStem,
              options,
              correctAnswer: resolveQuestionAnswer(answerSource, 0, item.number),
              builtIn: false,
            });
          });
        }
      });
      return questions;
    }

    function parseQuestionsFromText(text, title, answerSource, existingDocumentId = "") {
      const docId = existingDocumentId || ("upload-" + Date.now());
      const clean = String(text || "").replace(/\r/g, "\n").replace(/[ \t]+/g, " ");
      const groupedQuestions = parseGroupedQuestionsFromText(clean, title, answerSource, docId);
      const groupedNumbers = new Set(groupedQuestions.map(question => question.questionNumber));
      const markers = [...clean.matchAll(/(?:^|[\n\s])(?:Soru\s*(?:No\s*)?[:\-]?\s*)?(\d{1,3})(?:\s*[\).\-]\s+|\s+(?=[A-ZÇĞİÖŞÜ]))/gi)]
        .filter(match => {
          const number = Number(match[1]);
          if (number < 1 || number > 120) return false;
          const before = clean.slice(Math.max(0, match.index - 8), match.index);
          return !/\d\s*$/.test(before);
        });
      const questions = [];
      let setIndex = 0;
      let lastQuestionNumber = 0;
      for (let index = 0; index < markers.length; index++) {
        const start = markers[index].index;
        const end = index + 1 < markers.length ? markers[index + 1].index : clean.length;
        const block = clean.slice(start, end).trim();
        const number = Number(markers[index][1]);
        if (groupedNumbers.has(number)) continue;
        const positions = [...block.matchAll(/(?:^|\s)(?:\(([A-EOaeo])\)|([A-EOaeo])\s*[\).\-])\s*/g)];
        if (positions.length < 5) continue;
        const optionParts = positions.slice(0, 5);
        const promptStart = block.indexOf(markers[index][0].trim()) + markers[index][0].trim().length;
        const prompt = block.slice(promptStart, optionParts[0].index)
          .replace(/^\d{4}\s+[A-Za-zÇĞİÖŞÜçğıöşü]+\s+YDS\s*/i, "")
          .trim();
        const options = {};
        for (let optionIndex = 0; optionIndex < 5; optionIndex++) {
          const current = optionParts[optionIndex];
          const next = optionParts[optionIndex + 1];
          const rawKey = (current[1] || current[2]).toUpperCase();
          const key = rawKey === "O" ? "D" : rawKey;
          const valueStart = current.index + current[0].length;
          const valueEnd = next ? next.index : block.length;
          options[key] = block.slice(valueStart, valueEnd).trim();
        }
        if (!prompt || Object.keys(options).length !== 5) continue;
        if (questions.length && number <= lastQuestionNumber) {
          setIndex += 1;
          lastQuestionNumber = 0;
        }
        const setId = docId + "-set-" + String(setIndex + 1).padStart(2, "0");
        const localOrder = questions.filter(question => question.setId === setId).length + 1;
        questions.push({
          id: setId + "-q-" + String(number || localOrder).padStart(3, "0"),
          documentId: docId,
          setId,
          category: title,
          questionNumber: number || localOrder,
          sourcePage: null,
          question: prompt,
          options,
          correctAnswer: resolveQuestionAnswer(answerSource, setIndex, number || localOrder),
          builtIn: false,
        });
        lastQuestionNumber = number || localOrder;
      }
      questions.push(...groupedQuestions);
      questions.sort((a, b) => (a.questionNumber || 0) - (b.questionNumber || 0));
      questions.documentId = docId;
      return questions;
    }

    function importParsedPdf(title, parsedQuestions, sourceText = "") {
      const docId = parsedQuestions.documentId || parsedQuestions[0]?.documentId || ("upload-" + Date.now());
      const documentRecord = {
        id: docId,
        title,
        questionCount: parsedQuestions.length,
        builtIn: false,
        createdAt: new Date().toISOString(),
        sourceText: String(sourceText || ""),
      };
      uploadedBank.documents = (uploadedBank.documents || []).filter(doc => doc.id !== docId);
      uploadedBank.questions = (uploadedBank.questions || []).filter(question => question.documentId !== docId);
      uploadedBank.documents.push(documentRecord);
      uploadedBank.questions.push(...parsedQuestions);
      saveJson(STORAGE_UPLOADS, uploadedBank);
      rebuildBank();
      activeDocumentId = docId;
      currentIndex = 0;
      answered = false;
      solveMode = "document";
      wrongReviewIds = [];
      setView("solve");
      renderMenu();
    }

    themeToggleBtn.addEventListener("click", toggleTheme);
    document.getElementById("brandHomeBtn").addEventListener("click", () => {
      openSectionId = "";
      localStorage.setItem("yds-sidebar-open-v2", "");
      setView("home");
      closeSidebarOnMobile();
    });
    mobileMenuBtn.addEventListener("click", openSidebar);
    sidebarOverlay.addEventListener("click", closeSidebar);
    window.addEventListener("resize", () => {
      if (window.innerWidth >= 1024) closeSidebar();
    });
    document.addEventListener("click", event => {
      if (!event.target.closest(".word-menu-toggle") && !event.target.closest(".word-action-menu")) {
        document.querySelectorAll(".word-action-menu.is-open").forEach(menu => menu.classList.remove("is-open"));
      }
      if (!event.target.closest("#articleWordPopover") && !event.target.closest(".word-token")) {
        closeArticleWordPopover();
      }
    });
    document.addEventListener("keydown", event => {
      const typing = event.target.closest("input, textarea, select, [contenteditable='true']");
      if (event.key === "Escape") {
        closeArticleWordPopover();
        closeSentencePanel();
        closeArticleEditModal();
        closeDocumentEditModal();
        if (activeView === "articles" && articleSavedPanelOpen) {
          articleSavedPanelOpen = false;
          const article = currentArticle();
          if (article) renderArticleReader(article);
          return;
        }
        if (activeView === "articles" && articleFocusMode) {
          event.preventDefault();
          setArticleFocusMode(false);
          const article = currentArticle();
          if (article) renderArticleReader(article);
        }
      }
      if (!typing && activeView === "articles") {
        const article = currentArticle();
        if ((event.metaKey || event.ctrlKey) && (event.key === "+" || event.key === "=")) {
          event.preventDefault();
          articleFontSize = Math.min(28, Math.max(22, articleFontSize || 25) + 1);
          localStorage.setItem("yds-article-font-size-v1", String(articleFontSize));
          if (article) renderArticleReader(article);
          return;
        }
        if ((event.metaKey || event.ctrlKey) && (event.key === "-" || event.key === "_")) {
          event.preventDefault();
          articleFontSize = Math.max(22, Math.max(22, articleFontSize || 25) - 1);
          localStorage.setItem("yds-article-font-size-v1", String(articleFontSize));
          if (article) renderArticleReader(article);
          return;
        }
        if (event.key.toLowerCase() === "f") {
          event.preventDefault();
          setArticleFocusMode(!articleFocusMode);
          if (article) renderArticleReader(article);
          return;
        }
      }
      if (!typing && activeView === "solve") {
        if (event.key === "Escape" && questionFocusMode) {
          event.preventDefault();
          setQuestionFocusMode(false);
          renderQuestion();
          return;
        }
        if ((event.metaKey || event.ctrlKey) && (event.key === "+" || event.key === "=")) {
          event.preventDefault();
          questionFontSize = Math.min(23, Math.max(17, questionFontSize || 19) + 1);
          localStorage.setItem("yds-question-font-size-v1", String(questionFontSize));
          renderQuestion();
          return;
        }
        if ((event.metaKey || event.ctrlKey) && (event.key === "-" || event.key === "_")) {
          event.preventDefault();
          questionFontSize = Math.max(17, Math.max(17, questionFontSize || 19) - 1);
          localStorage.setItem("yds-question-font-size-v1", String(questionFontSize));
          renderQuestion();
          return;
        }
        if (event.key.toLowerCase() === "f") {
          event.preventDefault();
          setQuestionFocusMode(!questionFocusMode);
          renderQuestion();
          return;
        }
      }
      if (typing || activeView !== "study") return;
      if (event.code === "Space" && wordStudyMode === "cards") {
        event.preventDefault();
        if (!wordCardRevealed) {
          wordCardRevealed = true;
          renderWordStudy();
        }
        return;
      }
      if (wordStudyMode === "cards" && wordCardRevealed && ["1", "2", "3"].includes(event.key)) {
        event.preventDefault();
        const ratingButton = document.querySelectorAll(".srs-rating")[Number(event.key) - 1];
        if (ratingButton) ratingButton.click();
        return;
      }
      if (wordStudyMode === "quiz" && ["1", "2", "3", "4"].includes(event.key) && wordQuizQuestion && !wordQuizQuestion.checked) {
        event.preventDefault();
        const choice = document.querySelectorAll(".quiz-choice")[Number(event.key) - 1];
        if (choice) choice.click();
        return;
      }
      if (wordStudyMode === "cards" && event.key === "ArrowLeft") {
        const prev = document.getElementById("prevStudyWordBtn");
        if (prev && !prev.disabled) {
          event.preventDefault();
          prev.click();
        }
        return;
      }
      if (event.key === "Enter" || (wordStudyMode === "cards" && event.key === "ArrowRight")) {
        const next = document.getElementById("nextQuizWordBtn") || document.getElementById("nextStudyWordBtn");
        if (next && !next.disabled) {
          event.preventDefault();
          next.click();
        }
      }
    });
    document.getElementById("closeWordModal").addEventListener("click", closeWordModal);
    document.getElementById("saveWordBtn").addEventListener("click", saveWord);
    wordModal.addEventListener("click", event => {
      if (event.target === wordModal) closeWordModal();
    });

    removeBundledVocabularyOnce();
    mergeVocabularySeed();
    rebuildBank();
    setInterval(() => {
      const currentDate = todayKey();
      if (currentDate === lastDailyDateCheck) return;
      lastDailyDateCheck = currentDate;
      ensureDailyProgress();
      if (activeView === "home") renderHomePage();
    }, 60000);
    applyTheme(initialThemePreference());
    renderMenu();
    renderHomePage();
  </script>
</body>
</html>
